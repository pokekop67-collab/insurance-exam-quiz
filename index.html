<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>保險業務員考試 - 精選考題速成</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');

:root {
  --bg: #0f0f13;
  --card: #1a1a24;
  --card2: #222233;
  --accent: #6c5ce7;
  --accent2: #a29bfe;
  --green: #00b894;
  --red: #e17055;
  --orange: #fdcb6e;
  --text: #f0f0f5;
  --text2: #8888aa;
  --border: #2a2a3e;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Noto Sans TC', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

.app { max-width: 800px; margin: 0 auto; padding: 16px; }

/* Header */
.header {
  text-align: center;
  padding: 24px 0 16px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 20px;
}
.header h1 {
  font-size: 1.5em;
  font-weight: 900;
  background: linear-gradient(135deg, var(--accent2), var(--accent), #fd79a8);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 4px;
}
.header .sub { color: var(--text2); font-size: 0.85em; }

/* Stats bar */
.stats-bar {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-bottom: 16px;
}
.stat-box {
  background: var(--card);
  border-radius: 10px;
  padding: 12px 8px;
  text-align: center;
  border: 1px solid var(--border);
}
.stat-box .num { font-size: 1.4em; font-weight: 700; }
.stat-box .label { font-size: 0.7em; color: var(--text2); margin-top: 2px; }
.stat-box.green .num { color: var(--green); }
.stat-box.red .num { color: var(--red); }
.stat-box.orange .num { color: var(--orange); }
.stat-box.purple .num { color: var(--accent2); }

/* Tab navigation */
.tabs {
  display: flex;
  gap: 6px;
  margin-bottom: 16px;
  background: var(--card);
  border-radius: 12px;
  padding: 4px;
}
.tab {
  flex: 1;
  padding: 10px;
  text-align: center;
  border-radius: 10px;
  cursor: pointer;
  font-size: 0.85em;
  font-weight: 500;
  color: var(--text2);
  transition: all 0.2s;
  border: none;
  background: transparent;
}
.tab.active {
  background: var(--accent);
  color: white;
}

/* Filter bar */
.filter-bar {
  display: flex;
  gap: 6px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.filter-btn {
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text2);
  font-size: 0.78em;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
}
.filter-btn.active {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
}
.filter-btn:hover { border-color: var(--accent2); }

/* Question card */
.q-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 20px;
  margin-bottom: 12px;
  transition: all 0.2s;
}
.q-card.correct { border-color: var(--green); }
.q-card.wrong { border-color: var(--red); }

.q-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}
.q-badge {
  display: inline-flex;
  gap: 6px;
  align-items: center;
}
.q-badge span {
  font-size: 0.7em;
  padding: 3px 8px;
  border-radius: 6px;
  background: var(--card2);
  color: var(--text2);
}
.q-progress { font-size: 0.8em; color: var(--text2); }

.q-text {
  font-size: 0.95em;
  line-height: 1.7;
  margin-bottom: 16px;
  color: var(--text);
}

/* Options */
.options { display: flex; flex-direction: column; gap: 8px; }
.option {
  padding: 12px 16px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--card2);
  cursor: pointer;
  font-size: 0.88em;
  line-height: 1.5;
  transition: all 0.15s;
  display: flex;
  align-items: flex-start;
  gap: 10px;
  font-family: inherit;
  color: var(--text);
  text-align: left;
  width: 100%;
}
.option:hover:not(.disabled) {
  border-color: var(--accent2);
  background: #2a2a44;
}
.option .opt-num {
  flex-shrink: 0;
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.75em;
  font-weight: 700;
}
.option.selected { border-color: var(--accent); background: rgba(108,92,231,0.15); }
.option.correct-answer { border-color: var(--green); background: rgba(0,184,148,0.12); }
.option.correct-answer .opt-num { background: var(--green); color: white; }
.option.wrong-answer { border-color: var(--red); background: rgba(225,112,85,0.12); }
.option.wrong-answer .opt-num { background: var(--red); color: white; }
.option.disabled { cursor: default; opacity: 0.7; }

/* Explanation */
.explanation {
  margin-top: 14px;
  padding: 14px;
  border-radius: 10px;
  background: rgba(108,92,231,0.08);
  border-left: 3px solid var(--accent);
  font-size: 0.85em;
  line-height: 1.7;
  color: var(--accent2);
}
.explanation .exp-title {
  font-weight: 700;
  margin-bottom: 4px;
  color: var(--accent);
}

/* Navigation buttons */
.nav-btns {
  display: flex;
  gap: 10px;
  margin-top: 16px;
}
.nav-btn {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: none;
  font-size: 0.9em;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s;
}
.nav-btn.primary { background: var(--accent); color: white; }
.nav-btn.primary:hover { background: #5a4bd6; }
.nav-btn.secondary { background: var(--card2); color: var(--text2); border: 1px solid var(--border); }
.nav-btn.secondary:hover { border-color: var(--accent2); }

/* Study mode - key concepts */
.concept-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 10px;
}
.concept-card h3 {
  font-size: 0.95em;
  color: var(--accent2);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.concept-card p {
  font-size: 0.85em;
  line-height: 1.8;
  color: var(--text2);
}
.concept-card .highlight {
  color: var(--orange);
  font-weight: 500;
}

/* Progress bar */
.progress-wrap {
  background: var(--card2);
  border-radius: 6px;
  height: 6px;
  margin-bottom: 16px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--green));
  border-radius: 6px;
  transition: width 0.3s;
}

/* Scrollable list for study mode */
.q-list {
  max-height: 70vh;
  overflow-y: auto;
  padding-right: 4px;
}
.q-list::-webkit-scrollbar { width: 4px; }
.q-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* Quick answer reference in study mode */
.study-item {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: all 0.2s;
}
.study-item:hover { border-color: var(--accent2); }
.study-item.expanded { border-color: var(--accent); }
.study-item .si-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 10px;
}
.study-item .si-q {
  font-size: 0.85em;
  line-height: 1.6;
  flex: 1;
}
.study-item .si-ans {
  flex-shrink: 0;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--accent);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 0.8em;
}
.study-item .si-exp {
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
  font-size: 0.8em;
  color: var(--accent2);
  line-height: 1.7;
  display: none;
}
.study-item.expanded .si-exp { display: block; }

/* Wrong questions review */
.wrong-indicator {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--red);
  margin-right: 6px;
}

/* Empty state */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text2);
}
.empty-state .emoji { font-size: 3em; margin-bottom: 12px; }
.empty-state p { font-size: 0.9em; }

@media (max-width: 600px) {
  .stats-bar { grid-template-columns: repeat(2, 1fr); }
  .q-text { font-size: 0.88em; }
  .option { font-size: 0.82em; padding: 10px 12px; }
}
</style>
</head>

const DATA = [["實務", "第一章", 1, "有關風險的衡量，下列敘述何者正確?A風險管理的第二個步驟；B 損失發生的頻率指發生風險或意外事故的平均損失金額；C 損失發生的幅度指一定時間內，每一個風險單位發生風險的平均次數；D風險損失的成本等於兩項機率分配的預期值乘積(1)ABCD(2)AD(3)BC(4)BCD", "2", "A.風險管理四步驟:風險確認→風險衡量→風險方法選擇→決策執行與評估B.損失頻率指的是次數。C.幅度指的是金額。"], ["實務", "第一章", 2, "關於風險管理之方法，下列敘述何者為錯誤?(1)避免是一種簡單經濟又安全的風險管理方法(2)投保保險屬於風險移轉方法(3)高血壓患者注意飲食，食物少鹽、少油，屬預防方法(4)保險金額規劃不足，使得損失無法得到充分的補償，屬於風險自留", "3", "當「避免」丶「預防」等措施皆不能發揮功能，而不幸『事故依然發生』時，在處理上應力求減輕損失發生的程度，亦即對損失加以「抑制」。"], ["實務", "第一章", 3, "風險頻率和幅度的定義？A損失頻率：指的是在一定期間內，一危險單位發生一特定危險事故之次；B損失幅度：係指某一特定期間內，每一次損失事故之平均損失金額，也可稱之為損失額度；C 損失頻率：係指某一特定期間內，每一次損失事故之平均損失金額，也可稱之為損失額度；D損失幅度：指的是在一定期間內，一危險單位發生一特定危險事故之次數(1)AB(2)CD(3)ABCD(4)BC", "1", "損失頻率：指的是在一定期間內，一危險單位發生一特定危險事故之次數。損失幅度：係指某一特定期間內，每一次損失事故之平均損失金額，也可稱之為損失額度。"], ["實務", "第一章", 4, "下列何者是「風險」的要件？A造成怎樣的結果必須為確定性；B必須有損失發生的可能；C 損失的金額必須為龐大且可以金錢衡量；D何時發生具有不確定性(1)ABCD(2)BCD(3)BD(4)ABD。", "3", "A造成的結果具有不確定性；C 損失金額不限於龐大且可以金錢衡量。"], ["實務", "第一章", 5, "風險的發生與存在必須具備 A 確定性：B 有損失的可能：C 有獲利的可能：D 屬於將來性的 (1)ABCD (2)BD (3)ABD (4)BCD", "2", "A風險的發生是不確定的；C 風險的發生也有損失的可能。"], ["實務", "第一章", 6, "下列有關損失的定義，何者正確 (1)無形損失非包括在風險本質中 (2)保險可保的損失係指非意外事故造成之損失 (3)僅指有形損失 (4)有形損失可以衡量", "4", "(1)風險的本質包含無形損失；(2)保險可保的損失是指因意外事故造成之損失；(3)損失分有形損失與無形損失。"], ["實務", "第一章", 7, "事故發生時波及範圍大，影響整個大環境且較難以控制的風險為 (1)常屬純粹風險 (2) 基本風險 (3)特定風險 (4)僅第 1、3 選項為是", "2", "事故發生時波及範圍大，較難控制的風險為基本風險。"], ["實務", "第一章", 8, "依損失的性質，下列何者是「投機風險」的意義？ (1)一定無法獲利的風險 (2)可能會導致損失，也可能會產生獲利的風險 (3)一定可以金錢衡量的風險 (4)一定造成損失的風險", "2", "投機風險可能導致損失，也可能產生獲利。"], ["實務", "第一章", 9, "首先根據生命表計算合理的保險費，促使現代人壽保險制度的建立始於何時？ (1)中 世紀歐洲的基爾特組織 (2)法國相互救濟會 (3)英國衡平保險社 (4)德國救濟金庫", "3", "首先根據生命表計算合理保險費，促使現代人壽保險制度建立的為英國衡平保險社。"], ["實務", "第一章", 10, "有關風險的衡量的敘述，何者為是？A一個企業對員工做死亡風險衡量的目的，主要在預估一定期間內員工死亡風險發生所造成的損失金額；B損失發生的頻率係指發生風險或意外事故的平均損失金額；C 損失發生的幅度係指一定期間內，每一個風險單位發生風險的平均次數；D損失成本為損失頻率乘以損失幅度(1)ABCD(2)BCD(3)A(4)AD。", "4", "B損失發生的頻率係指一定期間內，每一個風險單位發生風險的平均次數；C 損失發生的幅度係指發生風險或意外事故的平均損失金額。"], ["實務", "第一章", 11, "有關風險管理的方法，何者為非？(1)事故發生前最簡單、經濟且又安全的風險管理方法是避免(2)事故發生前先購買保險、做好風險控管，屬風險管理方法的移轉(3)高血壓的人不要吃太油膩的食物，屬事故發生前風險管理方法的預防(4)有購買保險但投保的保險金額不足造成自己保留了必須承擔的風險，屬風險管理方法的自留。", "3", "(3)高血壓的人不要吃太油膩的食物，屬事故發生中風險管理方法的抑制。"], ["實務", "第一章", 12, "下列何者正確？A計算風險損失成本屬風險管理步驟之風險確認；B 特別嚴重的風險僅指損失幅度分配非常高的風險；C 不重要的風險僅指損失發生頻率非常小的風險；D風險損失成本指損失發生頻率及幅度二項預期值乘積(1)ABCD(2)BCD(3)AD(4)D。", "4", "風險的衡量，主要是在預估一定期間(如1年)內風險發生所造成的損失金額；B特別嚴重的風險：指損失頻率分配與損失幅度分配皆很高的風險；C 不重要的風險：指損失頻率分配與損失幅度分配皆很低的風險。"], ["實務", "第一章", 13, "下列何者非屬特定風險之特性？(1)不含投機風險(2)僅影響特定之人(3)處理方式以保險為主(4)通常與經濟、政治、社會、及天然災害有關。", "4", "特定風險：指波及範圍小(只影響個人)、較易控制的風險 。基本風險：指波及範圍大、較難控制的風險。"], ["實務", "第一章", 14, "下列何者正確？A主觀風險可能經過一定期間觀察與統計而成為客觀風險；B風險依損失是否可衡量區分為投機風險與純粹風險；C 保險可保的純粹風險僅人身上的風險及財產上的風險兩種；D特定風險在性質上常屬於純粹風險(1)ACD(2)ABCD(3)AD(4)BCD。", "3", "B風險依損失是否可衡量區分為客觀風險與主觀風險；C 保險可保的純粹風險可分為1.人身上的風險2.財產上的風險 3.責任上的風險。"], ["實務", "第一章", 15, "下列何者為「風險自留」的原因：A明知有風險存在而疏忽不予處理；B自己承擔比其他處理方式更划算；C 無適當處理方式；D自己有能力足以承擔損失(1)ABC(2)BCD(3)BC(4)ABCD。", "4", "風險自留：由經濟單位所保留必須承擔的風險皆是。"], ["實務", "第一章", 16, "下列何者正確？(1)損失幅度分配低的風險可能屬於不重要的風險或重要的風險(2)損失幅度分配低的風險可能屬於特別嚴重的風險或不重要的風險(3)損失頻率分配高的風險可能屬於不重要的風險或重要的風險(4)以上皆非。", "1", "依照損失的幅度與頻率可分為：特別嚴重風險/重要的風險/不重要風險頻率高+幅度高屬於特別嚴重風險頻率高+幅度低屬於重要風險頻率低+幅度高屬於重要風險頻率低+幅度高低屬於不重要的風險"], ["實務", "第一章", 17, "某團體員工年平均死亡率為 0.326%，若死亡事故發生時，雇主預期需支付每一位員工一百萬元的撫恤金，何者正確？A雇主預測損失成本係應用主觀風險的觀念；B0.326%即損失幅度的預期值；C 一百萬元即損失頻率的預期值；D每位員工損失成本為 3260 元(1)BCD(2)BC(3)D(4)ABCD。", "3", "A客觀風險；B0.326%損失頻率；C100 萬為損失幅度。"], ["實務", "第一章", 18, "阿華將其最近購買的一棟房子投保財產保險後，就疏忽房子之維護與管理，這種風險因素係屬於(1)心理風險(2)實質風險(3)有形風險(4)道德風險。", "1", "因個人的不小心、冷漠、缺乏注意力，而增加風險發生的機會，稱之為心理風險(無形風險)。"], ["實務", "第一章", 19, "風險的分類，依性質可區分為(1)靜態風險與動態風險(2)純粹風險與投機風險(3)基本風險與特定風險(4)客觀風險與主觀風險。", "2", "風險的分類，依損失的性質可區分為純粹風險與投機風險。"], ["實務", "第一章", 20, "廣義的風險管理，除彌補經濟損失外，尚包含儲蓄投資以備未來所需，此部份之需求就可以利用年金保險、長期壽險等具有下列哪些功能，使個人及家庭的經濟生活更能獲得保障？A儲蓄性質保單；B保單借款；C 保單復效；D身故保險金(1)BC(2)AD(3)AB(4)ABCD。", "3", "題目考的是保險的儲蓄功能，故選項只能選擇 A與B，C 復效係保障的持續擁有；D身故保險金保障家庭經濟生活並未保障個人經濟生活"], ["實務", "第一章", 21, "人身風險事故發生時可能導致 A遺族生活費用增加；B老年退休費用減少；C 醫療費用增加；D收入減少(1)ACD(2)ABCD(3)ABC(4)BCD。", "1", "B老年退休費用會增加，因可能需失能或疾病導致需增添無障礙設施，故退休費用會增加。"], ["實務", "第一章", 22, "下列敘述何者不正確？(1)就全體投保者而言，人壽保險保險費與保險給付間為交換價值不相等的契約(2)人壽保險之保險費計算，須受政府之嚴格管制監督(3)同一種保單對不同的購買者可能收取不同的保險費(4)人壽保險之保險費決定係在實際成本發生之前，採預估方式。", "1", "(1)保險是集合大多數人的力量來分散風險消化損失的社會互助經濟保障制度，它是根據公平合理的制度給予他所需要的補償。"], ["實務", "第一章", 23, "有關因應新型冠狀病毒傳染之風險管理方法，下列何者錯誤？(1)不到人群匯集的夜市或觀光景點係採用「避免」(2)勤洗手、戴口罩並遵守社交安全距離的規定係採用「預防」(3)察覺有發燒、咳嗽等症狀時前往指定醫療院所進行篩檢並自主健康管理係採用「抑制」(4)購買年金型保險商品係採用「移轉」。", "4", "(4)購買年金型保險則屬於儲蓄投資以備未來所需之風險管理方式。"], ["實務", "第一章", 24, "道德風險因素之敘述何者正確？A屬於有形風險因素；B指因個人不小心、冷漠導致增加風險事故發生的機會；C 如為領取保險金而縱火的行為；D如疏忽維護已投保財產保險之保險標的(1)C(2)AC(3)BD(4)ABD。", "1", "道德風險因素：指凡促使被保險人意圖不當得利而故意使損失發生之條件即為道德風險因素。A屬於無形風險；B描述為心理風險；D描述為心理風險。\""], ["實務", "第一章", 25, "下列敘述，何者不正確(1)投機風險係指事件發生的結果可能會產生獲利(2)保險的目的，在於補償因偶然事件的發生所導致經濟上的損失(3)保險所處理的風險，主要是純粹風險(4)純粹風險係指事件的結果不一定只有損失機會。", "4", "純粹風險係指只有損失機會，而無獲利機會。保險所處理的風險，主要是純粹風險。"], ["實務", "第一章", 26, "風險衡量結果屬於重要的風險，則代表(1)損失頻率分配及幅度分配皆很小(2)損失頻率分配及幅度分配皆很高(3)損失頻率分配很高及幅度分配很小(4)以上皆非。", "3", "重要的風險，具備損失頻率分配很高及幅度分配很小的屬性。"], ["實務", "第一章", 27, "天然災害如地震不屬於下列何種風險分類(1)純粹風險(2)靜態風險(3)特定風險(4)客觀風險。", "3", "天然災害/自然風險事故(如地震、海嘯)的風險類別為客觀、純粹、靜態、基本風險。"], ["實務", "第一章", 28, "依風險發生的範圍與影響來看，兼有純粹風險與投機風險雙重性質的風險類別是(1)特定風險(2)靜態風險(3)動態風險(4)基本風險。", "4", "基本風險：波及範圍大，較難控制，性質上純粹風險與投機風險兼而有之。特定風險：波及範圍小(只影響個人)，常屬於純粹風險。\""], ["實務", "第一章", 29, "事故發生時波及範圍小，只會影響個人而不會影響整個大環境且較容易控制的風險為(1)基本風險(2)特定風險(3)常屬純粹風險(4)僅第2 及第3選項為是。", "4", "事故發生時波及範圍小，較易控制的風險為特定風險，性質上常屬於純粹風險。"], ["實務", "第一章", 30, "一種風險不受人為之故意行為因素影響，可以觀察也可以衡量，認定上不會因人而有不同結果之風險稱為(1)主觀風險(2)客觀風險(3)投機風險(4)純粹風險。", "2", "客觀風險的定義係指實際損失經驗與預期損失經驗的可能變量，此種風險通常不受人為之故意行為因素影響。"], ["實務", "第一章", 31, "投保人身保險之個人可獲哪些稅法上優惠(1)在一定金額內之滿期保險金不用課徵遺產稅(2)憑保險費收據可免繳勞保保險費(3)保險費在一定金額內可自其綜合所得額中扣除(4)即使未指定受益人，死亡保險金亦不納入遺產稅計算。", "3", "(1)滿期保險金也不用課徵所得稅(2)繳納的保費可以依法從他的所得額中扣除(4)遺產及贈與稅法也規定，約定之被保險人死亡時，給付其所指定受益人之人壽保險金額，不計入遺產總額課稅。"], ["實務", "第二章", 32, "由內政部以全國國民或地區居民為對象，依人口普查之統計基礎作成 (1)部分居民生 命表 (2)壽險業經驗生命表 (3)國民生命表 (4)簡易生命表", "3", "國民生命表是由內政部以全國國民或地區居民為對象，依人口普查之統計基礎作成。"], ["實務", "第二章", 33, "一個投保人壽保險的人，不論在任何意外事故發生時都有經濟上的保障，這也就是人身保險功能中的(1)後顧無憂，晚景可恃(2)保證信用，有利投資(3)安定就業，穩定發展(4)以上皆是。", "2", "因有經濟上的保障，因此確定了信用和償債能力。"], ["實務", "第二章", 34, "有關保險之敘述何者正確？(1)是一種透過多數人合作以避免風險的經濟保障制度(2)投保人壽保險的人可以確定她的信用和償還能力(3)是一種風險避免的方法(4)以上皆是。", "2", "保險是風險轉移，而非避免風險。"], ["實務", "第二章", 35, "人身保險對國家有哪些功能？A透過再保、拓展外交；B互助共濟、社會安寧；C 健全經營、整合金融；D形成資本、以增國富(1)ACD(2)ABCD(3)BCD(4)ABC。", "1", "人身保險對國家有以下功能形成資本、以增國富穩定經濟，安定政治透過再保、拓展外交健全經營、整合金融。\""], ["實務", "第二章", 36, "人身保險對個人的功能有那些？A安定就業、穩定發展；B享受優惠、稅捐減免；C 保險理財，一舉兩得；D鼓勵儲蓄，平均財富(1)BCD(2)ABC(3)ACD(4)ABCD。", "2", "人身保險對個人的功能：後故無憂，晚景可恃安定就業，穩定發展保證信用，有利投資享受優惠、稅捐減免保險理財，一舉兩得D是對社會的功能"], ["實務", "第二章", 37, "投資型保險商品的設計，可以 A有效對抗通貨膨脹；B使得個人資金運用及退休計畫更具彈性；C 降低壽險公司經營風險；D達到金融市場整合功能 (1)AB(2)ABD(3)BD(4)ABCD。", "4", "結合證券投資的壽險商品(投資型商品)，利用盈虧自負、彈性繳費的特性，可以有效對抗通膨，讓資金運用更彈性，並降低壽險公司的經營風險，且達到金融市場整合的功能。"], ["實務", "第三章", 38, "我國壽險業最新奉准採用作為責任準備金提存標準為 (1)臺灣壽險業第四回經驗生命 表 (2)臺灣壽險業第五回經驗生命表死亡率百分之九十 (3)臺灣壽險業第六回經驗生命表 (4)臺灣壽險業第五回經驗生命表", "3", "我國壽險業最新奉准採用作為責任準備金臺灣壽險業第六回經驗生命表。"], ["實務", "第三章", 39, "家庭模式改變，夫妻皆有所得的家庭持續增加，婦女在家庭經濟上掌握更多權力，婦女壽險市場 (1)躍居主導地位 (2)逐漸受到重視 (3)無多大改變(4)日漸式微", "2", "家庭模式改變，夫妻皆有所得的家庭持續增加，婦女在家庭經濟上掌握更多權力，婦女壽險市場逐漸受到重視。"], ["實務", "第三章", 40, "目前有許多的保險商品是為滿足消費者特殊的需要設計，在消費者的需求上不僅要求足夠的死亡保障，而且必須依年齡、性別、職業等設計的不同的保險商品，壽險公司所需採行的措施是將商品 (1)平均化 (2)統一化 (3)細分化 (4)獨立化", "3", "壽險公司將商品細分化，以滿足消費者特殊的需要設計。"], ["實務", "第三章", 41, "由於科學發達帶來的現代化亦使危險環繞於人們四周，造成公害及一些成年人特有的 疾病如癌症、心臟病、腦血管疾病等死亡率上升．導致何種保障需要增加？A 死亡保障：B 退休保障：C 家庭健康保障：D 意外保障 (1)ACD (2)ABCD (3)ABC (4)AC", "4", "由於科學發達帶來的現代化亦使危險環繞於人們四周，造成公害及一些成年人特有的 疾病如癌症、心臟病、腦血管疾病等死亡率上升．應該要增加死亡保障及家庭健康保障。"], ["實務", "第三章", 42, "為給客戶最大的方便及最高的利益，壽險業在經營上應該特別重視 A 加強人身保險知 識宣導：B 業務員教育訓練：C 提高經營效率，降低成本：D 提高佣金比例，以安定業 務員之生活 (1)ABCD (2)BCD (3)ABC(4)ACD", "3", "為給客戶最大的方便及最高的利益，壽險業在經營上應該特別重視加強人身保險知識宣導、業務員教育訓練、提高經營效率，降低成本。"], ["實務", "第三章", 43, "目前國內保險市場經營壽險業務之組織 (1)除股份有限公司外，亦有相互合作社之組 織型態 (2)目前國內保險市場經營壽險業務之組織 (3)有股份有限公司或合作社兩種 組織型態 (4)均為股份有限公司", "4", "目前國內保險市場經營壽險業務之組織均為股份有限公司。"], ["實務", "第三章", 44, "保險業如何運用金融科技及大數據技術?A 用行動裝置締結保險契約，簡化投保：B 透過數據分析細分客戶，創造差異化商品：C 設計外溢效果的商品，提升保戶健康：D 理賠連線醫院及第三方驗證，迅速理賠減少保險詐欺 (1)ABCD (2)BCD (3)ABC (4)ACD", "1", "保險業利用金融科技與大數據分析來用行動裝置締結保險契約，簡化投保、 透過數據分析細分客戶，創造差異化商品、設計外溢效果的商品，提升保戶健康、理賠連線醫院及第三方驗證，迅速理賠減少保險詐欺。"], ["實務", "第三章", 45, "壽險業總公司下的業務部，通常掌理哪些事項？A契約調查；B財務管理；C 人員監督管理；D承保理賠(1)ABCD(2)C(3)ABD(4)AD。", "4", "業務部：掌理承保、理賠、保費、分保、契約調查及分支機構有關業務事項。"], ["實務", "第三章", 46, "A小額終老保險；B無保單價值準備金之人身保險；C 進入年金給付期間且約定採分期給付的遞延年金保險；D即期年金保險(1)ACD(2)ABD(3)AD(4)ABCD 符合主管機關對於保障型及高齡化保險商品之定義。", "4", "保障型及高齡化保險商品的認定標準共有四大類，包括即期年金保險、進入年金給付期間且約定採分期給付的遞延年金保險、小額終老保險、無保單價值準備金之人身保險、其他具保單價值準備金之非投資型人壽保險(不含萬能人壽保險)與投保年齡在55歲以下之投資型人壽保險(乙型)。"], ["實務", "第三章", 47, "有關金融科技創新及大數據應用何者正確？A科技業者透過法律許可方式進行沙盒實驗不會受到既有法律追訴；B為落實業務員親晤保戶取得其親簽要保文件，可透過保戶證件掃描搭配生物辨識判別其真實身分；C 透過數據分析協助保險公司統一將消費客群導向一致性業務模式；D結合科技可設計外溢效果之保險商品，藉以改變要保人的生活作息(1)AB(2)CD(3)ABCD(4)ABD。", "1", "C 透過數據分析協助保險公司細分消費客群導向更精準的業務模式；D結合科技可設計外溢效果之保險商品，藉以改變被保險人的生活作息。"], ["實務", "第三章", 48, "壽險公司為改善經營技術、培養專業人以適應市場發展趨向，有關公司努力發展之重點何者為非？(1)經客戶同意透過業務員以行動裝置輸入客戶投保資料，以電子文件替代紙本要保書及相關文件與保險公司締結契約(2)運用區塊鏈技術簡化理賠調查，快速支付理賠以服務客戶(3)壽險市場已具備專業人員生存要件，行銷技術將施以個別化的教育訓練以提高行銷效果(4)設計更符合客戶需要商品，加強創新及多樣化商品設計。", "3", "(3)壽險市場已具備專業人員生存要件，行銷技術將施以系統化的教育訓練以提高行銷效果。"], ["實務", "第三章", 49, "目前人身保險業所簽發的保單為(1)僅提供紙本保單(2)可利用網路投保來簽發電子保單(3)不限紙本保單(4)僅選項2、3為真。", "4", "目前人身保險業所簽發的保單可供紙本保單及電子保單。"], ["實務", "第三章", 50, "人壽保險既是長期契約，隨歲月的遽增，保戶生活環境難免變遷，我們應掌握保戶生活情形，即時建議 A增加保額；B 墊繳保險費；C 質押借款；D加購附加險(1)ABD(2)ABCD(3)BC(4)AD。", "4", "消費者現在的需求不僅只是要有足夠的死亡保障，而且必須依年齡、性別、職業等不同設計各種不同的保險商品，以滿足他們特殊的需要。"], ["實務", "第三章", 51, "何者有助於商品創新？A主管機關修正新形態商品認定標準，就部分保險商品改採核准制以縮短新商品審核流程；B運用數據解析人口老化及消費習慣改變以細分客群；C 運用區塊鏈技術共享資料建立標準流程；D 改進經營技術(1)ABCD(2)BCD(3)ABC(4)BC。", "2", "A主管機關修正新形態商品認定標準，就部分保險商品改採「備查」而非「核准」以縮短新商品審核流程。"], ["實務", "第三章", 52, "保險業為適應市場發展的趨向，今後努力的重點有 A設計不符需求的商品；B培養專業人員；C 透過金融科技創新簡化保單作業流程提升客戶體驗；D加強組織的功能(1)BCD(2)ABC(3)ACD(4)BC。", "4", "選項 A應為：設計符合客戶需求的商品選項 D：保險事業的經營著重於業務員訓練、保戶服務、科技的應用以提升經營效率等等，未特別提到加強組織功能，故不選。"], ["實務", "第三章", 53, "有關金融科技發展與創新實驗條例，何者正確？A主管機關為科技部；B創新實驗係指經主管機關核准或特許的金融商務實驗；C 運用金融科技可以提升客戶體驗滿足需求；D創新實驗包含科技創新或經營模式創新(1)ABC(2)BCD(3)ABCD(4)CD。", "2", "A主管機關應為金融監督管理委員會。"], ["實務", "第三章", 54, "透過數據分析及金融科技技術的提升，可以協助保險業(1)業務模式更複雜(2)創造差異化提升競爭力(3)概括消費群(4)以上皆是。", "2", "數據分析即金融科技技術的提升，使業務模式更加簡化，並更精確分析客戶所需。"], ["實務", "第三章", 55, "下列何者錯誤？(1)業務員行銷時應先強調保障型商品之重要性(2)壽險業利用金融科技的目的係為完全取代人的服務以利提升經營效率(3)壽險業應動態配 BCD(4)ACD。", "3", "A醫療費用之給付以實支實付為限。"], ["實務", "第五章", 132, "利率變動型年金於年金給付期間，預定利率不得高於何時之當月的宣告利率？(1)契約到期日(2)給付開始日(3)保費繳完日(4)契約生效日。", "2", "利率變動型年金於年金給付期間，預定利率不得高於年金給付開始日當月的宣告利率，且不得為負數。"], ["實務", "第五章", 133, "有關政府推動的長期照顧保險，何者錯誤？(1)屬於一種福利政策且為基本保障，可考慮加保一般商業長期照顧保險商品(2)由政府、雇主及民眾共同負責保險費(3)屬於強制性社會保險，保險人為衛生福利部(4)目前提供的服務皆屬實物給付。", "3", "長期照顧保險保險人為中央健康保險署。"], ["實務", "第五章", 134, "以下何者為微型保險所指之經濟弱勢或特定身分者？A依農民健康保險條例投保農民健康保險之被保險人；B符合社會救助法規定低收入戶或中低收入戶之家庭成員；C 符合身心障礙者權益保障法定義之身心障礙者；D符合老人福利法規定領取中低收入老人生活津貼之老人(1)ABC(2)ABD(3)ABCD(4)BCD。", "3", "以上皆為微型保險所指之經濟弱勢或特定身分者。"], ["實務", "第五章", 135, "下列何者非團體保險之保險金額決定基礎？(1)職位年資(2)員工的工作性質(3)薪資等級(4)團體定額。", "2", "團體保險之保險金額決定基礎為薪資等級、職位、年資、團體定額。"], ["實務", "第五章", 136, "有關學生團體保險之敘述，何者為非？(1)目前保險費由教育部邀集具獨立性的相關代表組成審議會逐年審議(2)學生團體保險之身故保險金受益人為被保險人之法定繼承人，醫療保險金之受益人為投保之學生(3)設置學生團體保險專戶專款專用，盈虧責任由政府負責(4)幼兒參加本保險，於保險契約訂立時已在疾病中，保險人對該項疾病不負給付保險金責任。", "4", "「高級中等以下學校學生及教保服務機構幼兒團體保險條例」第 13條第3項：學生及幼兒參加本保險，於保險契約訂立時，已在疾病中者，保險人對是項疾病，負給付保險金之責任。但高級中等學校進修部及國民補習學校學生，保險人不負給付保險金額之責任。"], ["實務", "第五章", 137, "有關傳統型年金保險費率計算可使用之預定附加費用率標準，何者正確？(1)繳費期間滿十五年者，費用率不得超過總保費之 15%(2)繳費期間未滿十五年者，費用率不得超過總保費之 15%(3)躉繳者，費用率不得超過總保費之5%(4)繳費期間未滿十年者，費用率不得超過總保費之 10%。", "3", "(1)繳費期間滿十五年者，費用率不得超過總保費之11%(2)繳費期間未滿十五年者，費用率不得超過總保費之 9.5%(4)繳費期間未滿十年者，費用率不得超過總保費之 8.5%。"], ["實務", "第五章", 138, "下列何者屬於投資型保險商品規範，由保險人接受要保人以保險契約委任全權決定運用之投資標的之運用範圍？A公債、國庫券；B台灣存託憑證；C 外國有價證券；D結構型商品 (1)ABC (2)BCD (3)ABD (4)AC。", "1", "D結構型商品非全權委託。"], ["實務", "第五章", 139, "投資型保險商品的相關費用有 A解約費用；B 保費費用；C 申購手續費；D贖回及轉換費用(1)CD(2)BCD(3)ABCD(4)BC。", "3", "投資型保險商品的相關費用一、前置費用：如保費費用二、保單相關費用：如保單管理費、保險成本三、投資相關費用：如投資標的申購手續費、贖回及轉換費用四、後置費用：如解約費用、部分提領費用五、其他費用"], ["實務", "第五章", 140, "由第三人訂立之年金保險契約，未經被保險人書面承諾，並約定保險金額，其保險契約(1)效力未定(2)無效(3)得撤銷(4)有效。", "4", "由第三人訂立之年金保險契約，未經被保險人書面承諾，並約定保險金額，其保險契約有效。"], ["實務", "第五章", 141, "下列敘述何者正確？(1)保險公司承保傷害保險時，需檢查被保險人的身體(2)定期保險通常以1年、5年、10 年為期，亦有以要保人到達終身年齡為約定期限(3)外勤業務員的危險性與每天坐辦公室的行政人員危險性差不多(4)最後生存者年金之受領人有 2 人以上，只要其中1 人仍生存，保險人就繼續依原定金額給付年金至最後 1 位受領人死亡為止。", "4", "(1)保險公司承保傷害保險時，不需檢查被保險人的身體，以被保險人的職業類別為準。(2)定期保險通常以 1年、6年、10年、15年或20 年為期，亦有以要保人到達一定年齡為約定期限(3)舉例：賽車駕駛員或鷹架安裝工人的危險性，都比每天坐辦公室的公務員高很多。"], ["實務", "第五章", 142, "現行長期照顧保險有關認知功能障礙之認定，何者正確？(1)被保險人經專科醫師診斷判定該障礙為終身無法治癒者，仍受限於免責期間的約定(2)認知功能障礙常運用簡易智能測驗（MMSE）進行評估(3)被保險人依臨床失智量表（CDR）評估達嚴重程度以上者(4)被保險人經專科醫師診斷判定達5個月以上仍為持續失智狀態。", "4", "(1)被保險人經專科醫師診斷辦定該障礙為終身無法治癒者，不受限於免責期間的約定(2)認知功能障礙常運用簡易智能測驗（MMSE）進行評估-108 年11月金管會取消(3)被保險人依臨床失智量表（CDR）評估達中度程度以上者(4)被保險人經專科醫師診斷判定達 5個月以上仍為持續失智狀態-不得高於 6個月。"], ["實務", "第五章", 143, "為避免投保微型保險所產生的道德危險，有關該險之風險控管機制何者為非？(1)身故保險金受益人僅以被保險人家屬為限(2)保險業者須對承擔之風險妥善處理或適當安排再保險(3)失能保險金受益人不得受理指定或變更(4)個別被保險人投保微型保險超過累計投保金額限制時，保險業者得自行決定處理方式。", "1", "身故保險金受益人之指定及變更，以被保險人家屬或其法定繼承人為限。"], ["實務", "第五章", 144, "勞工保險之普通事故保險費，被保險人應負擔之比率為(1)0%(2)30%(3)20%(4)10%。", "3", "勞工保險之普通事故保險費之被保險人負擔20%、雇主負擔70%、政府負擔10%。"], ["實務", "第五章", 145, "目前學生團體保險之保險給付項目有 A失能及身故保險金；B燒燙傷及須重建手術保險金；C 集體中毒保險金；D生活補助金(1)BCD(2)ABCD(3)ACD(4)ABC。", "2", "學生團體保險給付項目：失能及身故保險金、燒燙傷及須重建手術保險金、集體中毒保險金、生活補助金 、住院醫療保險金、傷害門診保險金。"], ["實務", "第五章", 146, "依保險法第13條規定，人身保險包含 A傷害保險；B投資型保險；C 健康保險；D年金保險(1)BD(2)ACD(3)CD(4)ABCD。", "2", "人身保險包含：人壽保險、傷害保險、健康保險、年金保險。"], ["實務", "第五章", 147, "台灣地區人口年齡結構因醫藥科學發達，死亡率降低而使得平均壽命延長，近幾年來更因結婚率降低與生育率降低，高齡化人口所佔比例逐漸增加，請問：當生育率降低與高齡化人口增加會帶來什麼樣的影響？(1)就業人口經濟負擔減輕(2)經濟成長率上升(3)延後退休(4)以上皆是。", "3", "(1)就業結構的變化及高齡化導致就業人口經濟負擔增加(2)高齡化人口所佔比例逐漸增加，勞動參與率下降導致經濟成長率下降。"], ["實務", "第五章", 148, "高齡化社會的來臨是目前社會人口發展的趨勢，購買(1)傷害保險(2)年金保險(3)定期保險(4)人壽保險 解決此項嚴重的社會問題。", "2", "年金保險定義：對個人在特定期間或生存期間繼續提供定期性給付金額的制度或契約；因此對老年生活費能彌補社會福利的不足。"], ["實務", "第五章", 149, "就業保險之保險費率，目前為被保險人月投保薪資之(1)5%(2)1%(3)3%(4)4%。", "2", "由勞動部按被保險人之月投保薪資1%至2%擬定，目前為 1%。"], ["實務", "第五章", 150, "年金保險中如被保險人身故，仍有未支領之年金餘額時，該餘額(1)其半數應作為被保險人之遺產(2)應作為被保險人之遺產(3)應作為要保人之遺產(4)不得作為被保險人之遺產。", "4", "一般終身年金只要被保險人死亡，保險人即無給付義務；若是確定年金且被保險人死亡後尚有未領金額，保險人仍應繼續給付年金金額予應得之人。"], ["實務", "第五章", 151, "有關生存保險之敘述，下列何者為是？A僅在被保險人於保險期滿後仍生存時給付保險金；B被保險人在保險期間內死亡，保險公司無給付保險金的責任，但退還所繳保費；C 滿期保險金之來源，部分來自保險公司資本；D保險公司為準備被保險人保險期滿生存時給付保險金，需有責任準備金的提存(1)ABCD(2)AD(3)ABD(4)AB。", "2", "B不退還保費；C 滿期金來源為自身所繳保費及其孽息、保險期間死亡被保險人所繳之保險費。"], ["實務", "第五章", 152, "有關國民年金制度敘述何者有誤？(1)提供老年年金、生育給付、身心障礙年金、遺屬年金及喪葬給付等保障(2)投保對象為年滿20 歲 、團隊年金保險。"], ["實務", "第五章", 172, "依據「保險業辦理微型保險業務應注意事項」規定，微型保險附加費用率上限為(1)純保費之10%(2)總保費之15%(3)純保費之15%(4)總保費之10%。", "2", "依據「保險業辦理微型保險業務應注意事項」規定，微型保險附加費用率上限為總保費之 15%。"], ["實務", "第五章", 173, "有關年金保險之敘述何者錯誤？(1)社會年金保險的種類依保險事故別分為年老、失能及遺屬三種年金(2)年金給付以被保險人生存為條件者即具有保險功能(3)年金給付不以個人或被保險人的生存為條件者，稱為確定年金(4)連生共存年金中多名年金受領人，若僅其中 1 人生存，保險人仍應依約給付年金。", "4", "(4)連生共存年金為年金受領人有 2人以上，各該人皆生存時，保險人依約給付年金。"], ["實務", "第五章", 174, "下列何者為招攬人員銷售優體壽險商品應有之行為？(1)完成優體壽險商品之在職教育訓練始進行銷售(2)於招攬時即承諾消費者可適用優體費率(3)與其他同業之優體壽險費率、核保項目、標準進行不當比較(4)通過優體壽險商品測驗且完成登錄者始進行銷售。", "1", "保險公司應慎選招攬人，事先完成必要之在職訓練，且不得於招攬時即承諾消費者可適用優體費率。也不得與其他同業之優體壽險費率、核保項目、標準進行不當比較(4)無須另行辦理登錄。"], ["實務", "第五章", 175, "利率變動型年金之責任準備金於累計期間，是以何者為基礎提存(1)保單價值準備金全額(2)所繳保費總和(3)純保費總和(4)以上皆是。", "1", "利變年金責任準備金於累積期間，以年金保單價值準備金全額提存。"], ["實務", "第五章", 176, "有關勞工退休金採新制者何者有誤？(1)勞工退休請領時須併入個人綜合所得申報(2)每月提撥率得由勞工自由決定(3)勞工自願提繳的部分得自當年度個人綜合所得總額中全數扣除(4)勞工按月提繳退休金，可選擇儲存於勞保局設立之勞工退休金個人專戶。", "2", "(2)應是雇主每月依「勞工退休條例」負擔勞工退休金提繳率不得低於勞工每月工資 6%。且勞工得在其每月工資 6%範圍內，自願另行提繳退休金。"], ["實務", "第五章", 177, "工業化的結果，各種意外事故劇增，促使人民重視保障，各公司在保險商品設計上亦以提高保障機能為主，其商品種類以(1)生死合險(2)儲蓄保險(3)定期保險及終身保險(4)生存保險 業務成長迅速。", "3", "事故加劇，故以提高保障機能為主，因此需增加死亡保障。死亡保險分為定期保險及終身保險。"], ["實務", "第五章", 178, "年金保險契約之生存年金部分(1)得有除外責任(2)不得有除外責任期間，但得有除外責任原因(3)不得有除外責任原因，但得有除外責任期間(4)不得有除外責任。", "4", "年金保險生存年金為保險人承諾在被保險人生存期間定期支付約定金額的一種契約，故年金保險不得有除外責任。"], ["實務", "第五章", 179, "以下何者為是？(1)人身保險四種類型中包含責任保險(2)人壽保險中包括生存保險、死亡保險及健康保險(3)將保險區分財產保險及人身保險兩類，", "3", "(1)(4)人身保險四種類型：人壽、傷害、健康、年金"], ["實務", "第五章", 180, "年金給付開始日為民國 94年以前之利率變動型年金保險，下列何者可能被引用作為計算保險費之基礎？(1)年金生命表死亡率之 90%(2)年金生命表死亡率之130%(3)年金生命表死亡率之 110%(4)年金生命表死亡率之70%。", "3", "94年以前以年金生命表死亡率之 100%-120%為基礎。"], ["實務", "第五章", 181, "利率變動型年金甲型於給付期間，保戶可領取之年金金額與下列何者有關：A預定死亡率；B 預定附加費用率；C 預定利率；D宣告利率(1)AC(2)AB(3)AD(4)ABC。", "1", "利率變動型年金甲型於給付期間，是以預定死亡率、預定利率來換算定額年金。"], ["實務", "第五章", 182, "團體保險內每位員工對每單位保險金額應繳的保險費通常係以何種費率乘以保險金額總額計算？(1)分級保險費率(2)平均保險費率(3)平衡保險費率(4)團體保險費率。", "2", "團體保險是以每位員工對每單位保險金額應繳的保險費，通常係以平均保險費率乘以保險金額總額來計算。"], ["實務", "第五章", 183, "利率變動型年金保險費率相關規範中，下列何者為不可採行者？(1)預定利率不得高於年金給付開始日當月之宣告利率(2)宣告利率不得超過宣告前中央銀行公 查報告；C 保戶填寫的要保文件；D業務員報告書(1)BCD(2)ABD(3)ABCD(4)ABC。", "3", "保險公司核保的參考依據有醫師的體檢報告書、調查員的調查報告、保戶填寫的要保文件、業務員報告書。"], ["實務", "第六章", 217, "當A被保險人投保的保險金額相當高；B被保險人過去有未能承保的紀錄；C 被保險人過去有增加其他條件仍不能承保的紀錄；D要保人與被保險人非同一人(1)ABC(2)ACD(3)BCD(4)ABCD ，業務員應洽經驗較豐富公司之專任醫師或特約醫師擔任體檢工作。", "1", "D要保人與被保人非同一人，不是體檢必要條件。"], ["實務", "第六章", 218, "壽險業務員招攬必須A親自會晤受益人；B親自會晤被保險人；C 取得由要、被保人親簽之文件；D於要保書上親自簽名；以上何者正確？(1)ABCD (2)ABC (3)CD (4)BCD。", "4", "壽險業務員招攬必須會見本人做登記，有關「要保人」與「被保險人」之簽名應由其本人親簽，以避免日後引起糾紛。"], ["實務", "第六章", 219, "壽險業授權代收保險費之人包括 A保險公司授權之所屬業務員；B保險經紀人或其所屬保險業務員；C 保險公司未登錄之收費員；D保險代理人或其所屬保險業務員(1)AD(2)ABC(3)ABCD(4)ABD。", "1", "壽險業授權代收保險費之人包括保險業務員、保險代理人或其所屬保險業務員。"], ["實務", "第六章", 220, "有關業務員協助保戶填寫要保書之敘述，何者有誤？(1)業務員應事先提供人壽保險投保人須知供保戶閱讀(2)保戶於要保書上所填基本資料應與戶籍上登記資料相同(3)業務員報告書須先會見保戶本人，再由業務員親自填寫(4)要保書中保戶住所或居所地址得先暫填業務員之住所或居所。", "4", "(4)要保書中保戶駐所或居所地址不得為業務員之住所或居所。"], ["實務", "第六章", 221, "依保險業授權代收保險費應注意事項之規定，下列敘述何者為非(1)保險業對於以支票繳納保費者，應限制發票人不得為有權代收保險費之人(2)送金單上不得增列警語增加保戶責任(3)保險業應限制代收保險費人領取送金單之份數(4)保戶繳費後收到的送金單係為已遺失或毀損者，保險業不得付法律責任。", "4", "(4)保戶繳費後收到的送金單係為已遺失或毀損者，仍應對該保戶付法律責任。"], ["實務", "第六章", 222, "何者是防止道德風險之重要資料，應慎重處理 A被保險人體格檢查書；B被保險人告知書；C 被保險人之生存調查單；D業務員填寫的招攬報告書(1)ABCD(2)AD(3)ABC(4)AB。", "1", "全選。"], ["實務", "第六章", 223, "保險業授權代收保險費之人收取以下列何種方式繳納保險費時，應同時交付保戶送金單、預收保費證明或收據？A現金；B信用卡授權書；C 支票；D劃撥匯款單 (1)AC(2)ABCD(3)AB(4)ABC。", "1", "有權代收保險費之人收取以現金或支票方式繳納保險費時，應同時交付保戶送金單、預收保費證明或收據。"], ["實務", "第六章", 224, "下列何者非保險業授權代收保險費之人(1)保險代理人(2)保險代理人所屬業務員(3)保險經紀人所屬業務員(4)保險公司授權之所屬業務員。", "3", "保險業授權代收保險費之人：保險代理人或其所屬業務員、保險公司授權之所屬業務員。"], ["實務", "第六章", 225, "業務員接受客戶投保時，必須(1)親自會晤受益人(2)親自會晤保險人(3)親自會晤被保險人(4)以上皆是。", "3", "業務員接受客戶投保時，必須親自會晤被保險人。"], ["實務", "第七章", 226, "保險存摺的功能,下列何者是錯的?(1)簡易查詢保單資料(2)有實名認證功能,可以申請保險理賠(3)可以登錄各家保險公司官方網站查詢詳細的保單(4)可以幫忙算出保障有哪些缺口。", "4", "保險存摺的功能：輕鬆查詢個人保單、身分驗證功能申請理賠、登入多家保險公司查詢更祥喜的保障資訊"], ["實務", "第七章", 227, "下列關於保單活化何者正確?(1)不會出現領到的總金額低於轉換前的壽險保單(2)轉換後保單預定率變高，保費成本相對較高(3)部分保單透過解約並扣除稅額後可能比保單轉化更划算(4)只需要要保人親自簽章確認即可", "3", "(1)可能出現領到的總金額低於轉換前的壽險保單(2)轉換後預定利率變「低」，保費成本相對提「高」(4)需要要保人及被保人親自簽章確認"], ["實務", "第七章", 228, "保單活化敘述何者錯誤?(1)用原保單的保單價值準備金來計算轉換後的醫療、長照或年金給付(2)它益型保單轉換自益型保單(3)原保單累積達一定保單價值準備金，轉換支付新險種的保單保費(4)保單活化對客戶更為有利", "4", "轉換後保單預定利率變低，保費成本較高，部分保單透過解約並扣除稅額後，可能比保單轉換更划算"], ["實務", "第七章", 229, "保險商業同業公會推出什麼服務,可以方便保戶查詢保單呢?(1)保險存摺(2)保全理賠聯盟鏈(3)電子保單存證(4)保險理賠醫起通", "1", "保險商業同業公會推出保險存摺,可以方便保戶查詢保單"], ["實務", "第七章", 230, "人壽保險行銷過程依序為 A 解決：B 問題：C 決心：D 滿意：Ｅ接近(1)ＥBADC (2)BA ＥCD (3)ＥBACD (4)BＥACD", "3", "人壽保險行銷過程：接近→問題→解決→決心→滿意。"], ["實務", "第七章", 231, "一般家庭的應急預備金不包括 (1)喪亡處理預備金 (2)醫療預備金 (3)子女教育金 (4) 借款償還金", "3", "應急預備金應包含：醫療預備金、喪亡處理預備金、借款償還金、臨時預備金。"], ["實務", "第七章", 232, "保單活化轉換生效後，請問下列何者情況下，不得申請保單轉換回復? (1)轉換後保險契約已開始給付保險金或已有申請理賠紀錄 (2)原保險契約之保險事故已發生始主張撤銷該次轉換 (3)自轉換生效日起三年後始主張撤銷該次轉換 (4)以上皆是", "4", "保單活化轉換生效後，除下列情形，保險公司應提供回復原契約之權利：(1)轉換後保險契約已開始給付保險金或已有申請理賠紀錄 (2)原保險契約之保險事故已發生始主張撤銷該次轉換 (3)自轉換生效日起三年後始主張撤銷該次轉換"], ["實務", "第七章", 233, "有關保單活化之敘述何者正確？A舊保單需投保時間夠長已累積有保單價值準備金；B若舊保單之保單價值準備金不足轉換支付新契約保費時，則無法轉換；C 保單活化制度對保戶百利無一害；D屬於功能性轉換，將他益型保單轉化成自益型保單(1)ACD(2)AD(3)ABD(4)ABC。", "2", "B如產生差額需補繳保費或由保險公司退還差額。；C 保單轉換後保單預定利率變低，保費成本相對較高，部分保單透過解約並扣除稅額後可能比保單轉換更划算，且轉換後的醫療險、年金險或長照險所提供的保障，會因為保戶的生存時間長短，或保單理賠給付的方式不同，可能出現領到的總金額低於轉換前的壽險保單，所以並不是百利無一害。"], ["實務", "第七章", 234, "有關保單轉換前進行變更適合度評估，何者正確？A確認的對象除了要保人還包括被保險人；B 目的係透過保險配置使保單活化更能符合現況需求；C 應考量轉換新保單之預定利率較舊保單高，保費成本相對較高；D舊保單透過解約並扣除稅額後可能比保單轉換更划算(1)ABD(2)BD(3)AB(4)ABCD。", "1", "C 應考量轉換新保單之預定利率較舊保單低，保費成本相對較高。"], ["實務", "第七章", 235, "保單轉換生效後發生何種情事，保險公司不應提供回復契約之權利？(1)保險公司無不實引導轉換，且舊保單之保險事故已發生始主張撤銷該次轉換(2)轉換後新保單已開始給付保險金或已有申請理賠紀錄(3)保險公司無不實引導轉換，且轉換生效日起 3 年後始主張撤銷該次轉換(4)以上皆是。", "4", "以上皆為保單轉換生效後，保險公司不應提供回復契約之情事。"], ["實務", "第七章", 236, "保險規劃書是向顧客說明保險公司提供的保障內容，用來解決顧客家庭經濟問題最有效的方式，該規劃書最少應具備 A契約內容；B保險名稱及特色；C 退佣比例；D給付範圍及金額 (1)BD(2)AB(3)ABD(4)ABCD。", "3", "保險規劃書最少應具備保險名稱及特色、契約內容以及給付範圍及金額。"], ["實務", "第七章", 237, "有關保單活化之敘述，何者錯誤？(1)保戶可考量實際需求僅作部分轉換，但轉換後則無法再轉回舊保單(2)保單活化目的使保戶重新檢視自身保單所需，以提升退休生活的保障(3)利用舊保單之保單價值準備金轉換投保醫療險、長照險或年金保險(4)保戶限向同一壽險公司之舊保單身故保險金轉換成新契約之生前養老金。", "1", "(1)保戶可考量實際需求僅作部分轉換，轉換後除部分情形外，保險公司應提供回復契約之權利。"], ["實務", "第七章", 238, "編製生活規劃書的目的在幫助客戶(1)準備子女所需要的預備金(2)了解父母所需要的費用(3)趁早準備配偶所需要的費用(4)預定目標，估列將來需要的各種費用。", "4", "編製生活規劃書的目的在幫助客戶預定目標，估列將來需要的各種費用。"], ["實務", "第七章", 239, "人身保險業初年度保費收入之行銷通路來源占率由大至小順序為(1)壽險公司、保險經紀人/代理人、銀行保險、其他通路(2)銀行保險、壽險公司、其他通路、保險經紀人/代理人(3)銀行保險、壽險公司、保險經紀人/代理人、其他通路(4)壽險公司、銀行保險、保險經紀人/代理人、其他通路。", "4", "人身保險業初年度保費收入之行銷通路來源占率：壽險公司 49.13%>銀行保險36.58%>保險經紀人/代理人 14.28%>其他通路(截至112/12)。"], ["實務", "第七章", 240, "人身保險行銷過程順序為 A成交；B發現問題；C 解決對策；D接近(1)BDCA(2)DBCA(3)DBAC(4)DABC。", "2", "人身保險行銷過程順序：接近→發現問題→提出解決對策→成交。"], ["實務", "第七章", 241, "一般而言，哪些經濟準備是任何一個家庭不可或缺的？A購買住宅的費用；B子女受教育、結婚費用；C 應急需要的預備金；D遺族生活資金(1)ABD(2)BCD(3)ABCD(4)CD。", "3", "五項經濟準備是不可或缺的：遺族生活資金、晚年生活資金、購屋資金、子女教育及結婚資金、應急的預備金。"], ["實務", "第七章", 242, "下列敘述何者正確？(1)業務員應專為其所屬公司從事保險招攬(2)業務員已登錄於人壽保險公司，因另取得產險資格後，得登錄於財產保險經紀人公司招攬財產保險商品(3)業務員即使同時擁有人身保險及財產保險業務員資格，仍僅得擇一登錄(4)保險從業人員通過壽險公會舉辦之人身保險業務員資格測驗即可開始招攬。", "1", "(2)取得相關資格後，保險業、保險代理人公司之業務員得登錄於另一家非經營同類保險業務之保險業或保險代理人公司；保險經紀人公司之業務員得登錄於另一家非經營同類保險業務之保險經紀人公司。(3)同時擁有人身保險及財產保險業務員資格，得登錄於另一家非經營同類保險業務。(4)保險從業人員通過壽險公會舉辦之人身保險業務員資格測驗，由所屬公司為其辦理登錄，並領得登錄證後，即為該公司從事業務招攬人員。"], ["實務", "第七章", 243, "下列敘述何者錯誤？(1)業務來源全由公司專職員工招攬者，稱為直接通路(2)業務來源僅全由保險代理人或兼營保險代理人業務之銀行所招攬者，稱為間接通路(3)兼採直接、間接通路者稱為混合通路制度(4)目前保險業務行銷方式可分為直接、間接與混合通路等 3 種。", "2", "間接通路：係指業務來源全由保險代理人或兼營保險代理人業務之銀行所招攬者，或經紀人，或兼營保險經紀人業務之銀行代替客戶洽訂之契約。"], ["實務", "第七章", 244, "計算夫婦兩人的養老資金時，夫婦二人共同生活的養老期間，係以何種方式計算(1)以退休時，丈夫的平均餘命計算(2)以退休時，妻子的平均餘命計算(3)以妻子死亡時，丈夫的平均餘命計算(4)以丈夫死亡時，妻子的平均餘命計算。", "1", "晚年生活資金：夫婦兩人的養老金(以丈夫退休時的平均餘命計算)、妻子寡居期間的生活資金(以丈夫死亡時妻子的平均餘命計算)、晚年的生活資金。驗，由所屬公司為其辦理登錄，並領得登錄證後，即為該公司從事業務招攬人員。"], ["實務", "第七章", 245, "業務員售後服務的開端是從(1)客戶繳納初期保險費(2)保險公司完成核保(3)業務員拿到保險單(4)業務員遞交客戶保單 開始。", "4", "業務員售後服務的開端是從遞交客戶保單開始。"], ["實務", "第七章", 246, "何者符合準保戶的選擇標準？A身體不健康的人；B付得起保險費的人；C 便於拜訪的人；D保險保障規劃少的人(1)BD(2)BCD(3)ABD(4)ABCD。", "2", "保險公司會做契約對身體、環境、道德做選擇，因此體況不佳者不予承保。"], ["實務", "第七章", 247, "下列何者正確？A評估保障需求是否足夠係依據保費支出不超過年收入的十分之一為原則；B評估保費負擔能力係依據保險的保障額度約為年收入之10倍；C 保險是透過互助合作來分散風險，所以業務員準保戶的選擇為身體不健康的人；D 因保險行銷需透過面談及詳細說明，所以業務員準保戶的選擇應為便於拜訪的人(1)ABD(2)D(3)ABCD(4)CD。", "2", "A評估保障需求是否足夠係依據保險的保障額度約為年收入之 10倍；B評估保費負擔能力係依據保費支出不超過年收入的十分之一為原則；C 保險是透過互助合作來分散風險，所以業務員準保戶的選擇為身體健康的人。"], ["實務", "第七章", 248, "電話行銷人員行銷保險 A應說明行銷目的及確認要保人身分；B應告知行銷人員姓名、登錄字號及所屬公司名稱；C 依個人資料保護法，電話行銷過程不得錄音並備份存檔；D電話行銷人員若違反辦理電話行銷業務應注意事項，所屬公司應依規定予以懲處(1)ABCD(2)AB(3)ABD(4)BD。", "3", "C 電話行銷過程應該經過要保人同意全程錄音並備份存檔。"], ["實務", "第七章", 249, "完整的人身保險行銷過程，應包含 A蒐集資料、發現問題；B準備、自我介紹；C 提示解決的對策；D成交、售後服務；其行銷順序應為(1)ABCD(2)BCAD(3)ACBD(4)BACD。", "4", "完整的人身保險行銷過程為：準備、自我介紹→蒐集資料、發現問題→提示解決的對策→成交、售後服務。"], ["實務", "第七章", 250, "由於壽命的不斷延長，替客戶安排保險時，應考慮的保障項目為 A醫療費用；B配偶的安葬費用；C 遺族的生活費用；D老年的生活費用(1)ABCD(2)ABD(3)ABC(4)ACD。", "4", "由於壽命的不斷延長，替客戶安排保險時，應考慮的保障項目應有生活規劃的項目：遺族的生活資金、晚年的生活資金、購屋資金、子女教育及結婚資金、應急的預備金。"], ["實務", "第七章", 251, "保險業經營電話行銷業務時，在行銷過程應經要保人同意全程錄音並備份存檔列管，其保存期限不得低於保險契約期滿或通知要保人不同意承保後幾年？(1)永久保存(2)2 年(3)3年(4)5年。", "4", "其保存期限不得低於保險契約期滿或通知要保人不同意承保後 5年。"], ["實務", "第七章", 252, "編製生活規劃書的目的在幫助客戶(1)準備子女所需要的預備金(2)了解父母所需要的費用(3)趁早準備配偶所需要的費用(4)如何利用人壽保險來準備他所需要的各種費用。", "4", "生活規劃書就是利用生命週期表，將家庭未來的經濟需要考慮在內，並配合其時間，做有計畫的準備，可讓客戶了解必要準備的資金，並提供適當的具體準備方式。"], ["實務", "第七章", 253, "人身保險業透過仲介行銷通路販售保險商品，現行仲介行銷通路有 A銀行；B保險業務員；C 保險經紀人；D保險公證人(1)ABC(2)BC(3)AC(4)ABCD。", "1", "仲介行銷通路：保險業務員、經紀人/代理人、銀行賣保險。"], ["實務", "第七章", 254, "開拓企業團體的集體投保，可 A 節省說明時間；B由薪津中代為扣除保險費；C 提高繼續率；D不必經過核保手續的好處，上列何者為正確(1)BCD(2)ABCD(3)ABC(4)ACD。", "3", "透過企業團體的優點是招攬省時、承保條件優渥、保費可自薪津扣除及可提高繼續率。D仍經核保評估後始可生效。"], ["實務", "第七章", 255, "保險代理人及保險經紀人之規定下列何者正確(1)得從事未經主管機關核准之外國保險業經營或介紹保險商品(2)未繳交保證金或投保責任保險得執行業務(3)得為未經主管機關核准之保險業經營或介紹保險商品(4)應有固定業務處所，並設立獨立帳簿記載業務收支。", "4", "保險代理人及保險經紀人應經主管機關許可，(2)繳存保證金並投保相關保險，領有執業證照後，始得執行經營或執行業務。(1)(4)不得經營非經主管機關核准之保險業務或國外保險業務。"], ["實務", "第七章", 256, "壽險行銷通路若分為仲介行銷及直接行銷，下列何者係屬直接行銷通路？A郵寄行銷；B電話行銷；C 職域或關係企業行銷；D架設網路平台行銷(1)AB(2)ABD(3)ABCD(4)BC。", "3", "直接通路：賣方主動-郵寄、電話行銷、職域或關係企業行銷、架設網路平台買方主動-語音電話、網路、櫃台行銷、電視行銷"], ["實務", "第七章", 257, "以下敘述何者正確？A家庭生活資金計算係以老么大學畢業的期間作為必要期間計算；B購屋資金計算係考量一旦家庭斷絕經濟來源後如何繼續繳付剩餘房屋借款；C 借款償還金係以每月償還額乘上償還期間計算償還總額；D臨時預備金一般為現在每個月的生活費用的 6個基數(1)BCD(2)ABD(3)ABC(4)ABCD。", "3", "D臨時預備金一般為現在每個月的生活費用的 3個基數"], ["實務", "第七章", 258, "保險經紀人係基於(1)保險人及被保險人(2)要保人(3)被保險人(4)承保的保險業 之利益，代向保險公司洽訂保險契約或提供服務而收取佣金之人。", "3", "保險經紀人：基於被保險人之利益，代向保險人洽訂保險契約，而向承保之保險業收取佣金之人。(可以是個人、合夥公司或法人)"], ["實務", "第七章", 259, "保險經紀人係基於(1)保險人及被保險人(2)要保人(3)承保的保險業(4)被保險人 之利益，代向保險公司洽定保險契約或提供服務而收取佣金之人", "4", "保險經紀人係基於被保險人之利益，代向保險公司洽定保險契約或提供服務而收取佣金之人。"], ["實務", "附錄", 260, "人壽保險商品死亡給付對保單價值準備金之最低比率規範何者正確？A比率依年齡級距分為六組；B死亡給付對保價金之最低比率随高齡遞增；C保險業需於契約條款明訂不符合最低比率時之保費繳交限制；D招攬時要妥為解說 (1)ABD(2)CD(3)BCD(4)ABCD。", "2", "A比率依年齡級距分為七組；B死亡給付對保價金之最低比率随高齡遞減。"], ["實務", "附錄", 261, "下列哪些保險中途解約時，其已交付未到期之保費應返還？(1)終身壽險、傷害保險、年金保險、團體健康保險(2)一年定期壽險、健康保險、傷害保險(3)養老保險、一年定期壽險、傷害保險、健康保險(4)以上皆是。", "2", "投保長期壽險，在解約時若是契約已經有解約金，則保險公司將於接獲解約通知後，一個月內償付解約金；而意外傷害保險、健康保險或１年期定期壽險部分，保險公司接獲解約通知後，會從當期已繳保險費中扣除已過期的保險費，將未滿期的保險費退還。"], ["實務", "附錄", 262, "實支實付醫療保險副本理賠之控管措施，不適用於何種保險？A傷害保險；B微型保險；C 旅行平安保險；D學生團體保險(1)ABC(2)BD(3)BCD(4)ABCD。", "3", "保險業招攬及核保作業控管自律規範第 21 條各會員應將下列實支實付型醫療保險（含傷害醫療）副本理賠之控管措施納入公司內部之核保處理制度及程序，並確實執行：一、每一被保險人投保實支實付型醫療保險（含日額或實支實付給付擇一之商品）之張數上限三張，上開上限於醫療保險及傷害醫療保險採分別計算。另保戶原已投保一張實支實付型醫療（傷害醫療）商品，另行向同一保險公司投保一張銜接原給付限額之具自負額商品者，該張自負額商品可不列入張數計算，又整體保險業可不計入上開張數計算之自負額商品於醫療保險及傷害醫療保險分別以一張為限。照上述推論，正確答案應是 3"], ["實務", "附錄", 263, "依保險業務員管理規則規定，投資型保險相關專業課程測驗得辦理單位為(1)財團法人保險事業發展中心(2)主管機關認可之保險相關單位(3)壽險公會(4)以上皆可負責辦理。", "4", "財團法人保險事業發展中心、主管機關認可之保險相關單位、壽險公會皆可負責辦理投資型保險相關專業課程測驗。"], ["實務", "附錄", 264, "年金保險中如被保險人身故，仍有未支領之年金餘額時，該餘額(1)其半數應作為被保險人之遺產(2)應作為被保險人之遺產(3)應給付給其他應得之人(4)應作為要保人之遺產。", "3", "年金保險中如被保險人身故，仍有未支領之年金餘額時，該餘額應給付給身故受益人或其他應得之人。"], ["實務", "附錄", 265, "年金保險契約敘述何者為是？A得由本人或第三人訂立之；B未經被保人書面承認並約定保險金額者無效；C 利害關係人均得代要保人交付保險費；D保險人對於保險費得以訴訟請求交付(1)AC(2)ABC(3)ACD(4)BCD。", "1", "B年金保險未經被保人書面承認並約定保險金額者有效；D保險人對於保險費不得以訴訟請求交付。"], ["實務", "附錄", 266, "某甲投保每年複利增值 3%之二十年期養老保險，保額 20 萬元，某甲在投保後第二年死亡，則其可獲得的死亡保險金為(1)206,000(2)20 萬(3)218,545(4)212,180 元。", "4", "保險金算法為 20萬*1.03*1.03=212,180"], ["實務", "附錄", 267, "下列何者不是團體保險條款規定被保險人請領失能保險金應檢具之文件？(1)受益人身份證明 (2)失能診斷書 (3)保險金申請書 (4) 被保險人印鑑證明書", "4", "根據團體一年定期人壽保險單示範條款規定，受益人申領「失能保險金」時，應檢具下列文件：失能診斷書、保險金申請書、受益人身份證明。"], ["法規", "第一章", 1, "有關未滿15歲未成年人，其死亡保險除了法定喪葬費用一半外，其餘死亡給付 (1)不給付，不退保費(2)不給付，全額退加利息(3)不給付，退全額保費(4)不給付，退超過部分已繳保費", "4", "有關未滿 15足歲之被保險人於民國 109年6月12日（含）以後及被保險人於民國 99年2月3日（含）以後所投保之喪葬費用保險金額總和（不限同一保險公司），不得超過遺產及贈與稅法第 17條有關遺產稅喪葬費扣除額之半數，其超過部分保險公司不負給付責任並應無息退還該超過部分之已繳保險費。"], ["法規", "第一章", 2, "張三為要保人，對下列何者生命或身體有保險利益？A借錢給張三的李四；B張三本人；C 欠張三錢的王老五 (1)A (2)BC (3)AB (4)ABC", "2", "要保人對於下列各人之生命或身體有保險利益：1.本人或其家屬2.生活費或教育費所仰給之人3.債務人4.為本人管理財產或利益之人(A)為債權人，對其無生命或身體無保險利益(B)為本人(C)債務人。"], ["法規", "第一章", 3, "依保險法第146條之4 規定保險業辦理國外投資總額最高不得超過各該保險業百分之？(1)35% (2)15% (3)45% (4)30%", "3", "保險法第 146條之4規定：保險業資金依前項規定辦理國外投資總額，由主管機關視各保險業之經營情況核定之，最高不得超過各該保險業資金百分之四十五。"], ["法規", "第一章", 4, "保險業得以共保方式承保情形有 A基於公共利益考量；B配合政策需要；C 能有效提升對投保大眾服務；D有關巨災損失保險 (1)ABC(2)ABCD (3)ABD (4)BCD", "2", "保險法第 144-1條規定：有下列情形之一者，保險業得以共保方式承保：一、有關具災損失之保險者二、配合政策需要者三、基於公共利益之考量者四、能有效提升對投保大眾之服務者五、其他經主管機關核准者"], ["法規", "第一章", 5, "下列何者正確？A要保人如尚未成年時，須經法定代理人簽名同意契約始生效力；B被保險人之職業須確實填寫；C 要保人或被保險人不能親自填寫者，保險契約得由業務員代為填寫再由保戶親自簽名；D保險契約保戶親自簽名處如為保戶親自按指印，其意思表示及效力與親簽一樣 (1)BC(2)ABC (3)ABD (4)BCD", "3", "C 業務員不得代為填寫保險契約及代客戶簽名"], ["法規", "第一章", 6, "以未滿15歲之未成年人投保含死亡給付之傳統型人壽保險契約，於滿 15歲前身故者，保險公司應(1)返還帳戶價值(2)返還保單價值準備金(3)不得超過遺產及贈與稅法第 17條有關遺產稅喪葬費用之一半(4)依約給付保險金", "3", "保險法第 107條規定：以未滿十五歲之未成年人為被保險人訂立之人壽保險契約，除喪葬費用之給付外，其餘死亡給付之約定於被保險人滿十五歲時始生效力。前項喪葬費用之保險金額，不得超過遺產及贈與稅法第十七條有關遺產稅喪葬費扣除額之一半。"], ["法規", "第一章", 7, "有關受益人規定何者正確 A 因保險給付不同可區分為滿期、身故、失能或醫療、年金 及紅利等受益人：B 為人身保險契約關係人：C 保險事故發生時有權受領保險金，而失能保險金之受益人不以被保險人為限：D與要保人對被保險人需有保險利益 (1)ABD (2)ABCD (3)BCD (4)AB", "4", "C 示範條款規定：失能及醫療保險之受益人以被保險本人為限，且事後不得加以更改。D受益人之指定或變更屬要保人之權利，無人數及對象之限制。"], ["法規", "第一章", 8, "受益人謀害被保險人未致死僅致失能，則保險公司給付 (1)保單價值準備金 (2)全額失能保險金 (3)全部已繳保險費 (4)失能保險金 1/2", "2", "保險法第 121條規定：受益人故意致被保險人於死或雖未致死者，喪失其受益權。因此保險公司仍需給付全額失能保險金。"], ["法規", "第一章", 9, "有關保險法之規定何者正確？ (1)人身保險契約得為指示式或無記名式(2)除要保人 外，其餘利害關係人不得向保險人請求保險契約謄本 (3)受益人有疑議時，其保險金額作為被保險人遺產 (4)本法之強制規定不得以契約變更之，但有利於被保險人者不在 此限", "4", "(1)保險法第 49條規定：保險契約除人身保險外，得為指示式或無記名式。(2)保險法第 44條規定：利害關係人，均得向保險人請求保險契約謄本。(3)保險法第 45條規定：受益人有疑義時，推定要保人為自己之利益而訂定。"], ["法規", "第一章", 10, "有關保險利益原則之敘述，何者為非？(1)又稱為可保利益原則(2)存在目的系避免賭博行為發生(3)要保人對於為其管理財產之人具有保險利益(4)債權人對債務人之保險利益沒有限制。", "4", "(4)債務人，債權人僅能於債務人所欠的債務金額內具有保險利益。"], ["法規", "第一章", 11, "下列何者不是限制行為能力人訂定保險契約之生效方式？(1)於限制原因消滅後自己承認(2)經被保險人同意(3)經其法定代理人事後承認(4)經其法定代理人事前允許。", "2", "限制行為能力人訂定保險契約，須經其法定代理人之同意(事前允許或事後承認)，或於限制原因消滅自己承認使有效。"], ["法規", "第一章", 12, "有關保險利益之敘述，何者有誤？(1)凡基於有效契約而生之利益，得為保險利益(2)被保險人死亡，保險契約除另有訂定外，仍為繼承人之利益而存在(3)合夥人為被保險人時，其中一人讓與保險利益於他人者，保險契約失其效力(4)要保人對於因財產上之現有利益而生之期待利益，有保險利益。", "3", "(3)合夥人或共有人聯合為被保險人時，其中一人或數人讓與保險利益於他人者，保險契約不因之而失效。"], ["法規", "第一章", 13, "死亡保險金受益人為被保險人配偶王大華，被保險人亡故前已離婚且再婚，則被保險人死亡時該死亡保險金歸(1)前配偶王大華(2)要保人或其他應得之人(3)被保險人遺產(4)再婚之配偶。", "1", "此案屬於受益人有確定者，則被保險人死亡時該死亡保險金歸此約定受益人。"], ["法規", "第一章", 14, "有關代位原則敘述何者錯誤？(1)財產保險適用(2)因為人身無價，故人壽保險不適用(3)又稱為權利代位(4)保險人於賠償後須經被保險人同意始得代位行使被保險人對於第三人之請求權。", "4", "(4)保險人於賠償後，可直接向加害第三人要求賠償。"], ["法規", "第一章", 15, "各項保險給付之受益人，何者錯誤？(1)滿期保險金受益人由要保人指定，變更時由要保人申請(2)紅利給付之受益人皆為要保人(3)醫療給付之受益人以被保險人為限，且不得事後加以變更(4)身故保險金如作為被保險人遺產，依民法繼承順位分配。", "2", "(2)若紅利未特別指定予何人，紅利原則上應由要保人領取。"], ["法規", "第一章", 16, "有關最大誠信原則何者正確？A契約訂立時要保人或被保險人應將有關的重要事實告訴保險人；B業務員應於親晤被保險人後誠實填報業務員報告書；C 要保人違反告知義務時保險人得解除契約；D為維護契約安定性，如保險事故發生保險人才知要保人違反告知義務時，且危險發生基於未說明事實者，仍不得解除契約(1)ABC(2)ABCD(3)AC(4)ACD", "3", "B業務員於親晤被保險人後誠實填報業務員報告書不屬於最大誠信原則；D為維護契約安定性，如保險事故發生保險人才知要保人違反告知義務時，且危險發生基於未說明事實者，得解除契約"], ["法規", "第一章", 17, "有關要保人何者為非？(1)須投保時填寫要保書並善盡告知、通知保險公司保險事故發生之義務(2)向保險人申請訂立保險契約之人(3)有指定各項保險金受益人、申請保險單借款及聲明保費自動墊繳之權利(4)以上皆是。", "3", "失能保險金、醫療保險金、年金保險金之受益人皆為被保險人本人。"], ["法規", "第一章", 18, "何者非要保人可指定受益人領取之保險金?A 失能保現金；B醫療保險金；C 終身壽險保險金；D年金保險金(1)BCD(2)ACD(3)ABD(4)AB", "3", "失能保險金、醫療保險金、年金保險金之受益人皆為被保險人本人。"], ["法規", "第一章", 19, "有關要保人之敘述何者正確?A保險契約當事人；B自然人；C 機關行號；D對保險對象需具有保險利益(1)CD(2)ABCD(3)ABD(4)BCD。", "2", "ABCD皆正確。"], ["法規", "第一章", 20, "債權人未經債務人書面承認而逕以債務人為被保險人訂立之年金保險契約(1)無效(2)失其效力(3)需債務人同意後才有效(4)有效。", "4", "債權人未經債務人書面承認而逕以債務人為被保險人訂立之年金保險契約有效。"], ["法規", "第一章", 21, "依保險法第20條規定基於有效契約而生之利益(1)得為保險利益(2)僅得對有效契約有保險利益(3)不得為保險利益(4)以上皆是。", "1", "保險法第 20條規定，於有效契約而生之利益，亦得為保險利益。"], ["法規", "第一章", 22, "下列何者錯誤？(1)失能保險金的受益人原則上為被保險人本人，如要變更須在保險事故發生前(2)要保人可隨時終止保險契約(3)受益人應在知悉保險事故發生後，於法定或契約約定期間內通知保險公司，並檢具所需文件申領保險金(4)受益人係經要保人指定，享有保險金請求權的人。", "1", "被保險人若身體遭受失能必須就醫治療時，為使失能保險金能確實作為支應被保險人因失能所引起的各項費用，所以失能保險之受益人以被保險人本人為限，且不得加以變更。"], ["法規", "第一章", 23, "有關主力近因原則之敘述，何者正確？A類似民法上的相當因果關係；B常用於傷害保險與健康保險之賠償責任認定；C 導致被保險人死亡原因有2個以上，而每個原因有因果關係雖有中斷，其最先發生原因仍為主力近因；D即指最直接或最接近被保險人死亡的原因(1)ABD(2)ABCD(3)AB(4)BC。", "3", "主力近因是指致被保險人死亡或受傷最主要或有效的原因，而不是最直接或最接近的原因，類似民法中的因果關係，假設原因有 2個以上，且每個原因之間有因果關係且未中斷時，則以最先發生並造成一連串事故之原因為主力近因。"], ["法規", "第一章", 24, "受益人經指定後(1)經被保險人同意於保險事故發生前得變更受益人(2)不得再變更受益人(3)於保險事故發生前得變更受益人(4)於保險事故發生後得變更受益人。", "1", "受益人經要保人指定後，要保人在保險事故發生前，仍得以契約或遺囑處分之。要保人行使變更受益人之處分權時，應通知保險公司並檢附被保險人同意書。"], ["法規", "第一章", 25, "張三以自己為要保人，對下列何者之生命或身體無保險利益：A 借錢給張三的李四；B張三本人；C 欠張三錢的王老五(1)A(2)AC(3)ABC(4)BC。", "1", "要保人對於下列個人之生命或身體有保險利益：本人或家屬、生活費或教育費養給之人、債務人、為本人管理財產獲利益之人。"], ["法規", "第一章", 26, "依保險法第17條之規定，要保人或被保險人，對於保險標的物無保險利益者，保險契約(1)有效(2)無效(3)失其效力(4)以上皆非。", "3", "要保人或被保險人，對於保險標的物無保險利益者，保險契約失其效力。"], ["法規", "第一章", 27, "依據保險法規定，要保人的權力包含 A變更失能及醫療保險金之受益人；B行使契約撤銷權；C 申請契約變更；D申請保險單借款、聲明續期保險費自動墊繳(1)ABCD(2)ABD(3)ABC(4)BCD。", "4", "A失能及醫療保險金之受益人以被保險人本人為限，且不得事後加以變更。"], ["法規", "第一章", 28, "某甲為支應其子某乙之學費向丙銀行貸款，請問下列何者對某甲具有保險利益？A甲；B乙；C 丙銀行；D某甲投保的保險公司(1)BCD(2)AB(3)ABC(4)A。", "3", "甲提供乙學費，甲即為乙生活費或教育費所仰給之人，則乙對甲有保險利益；丙銀行借款給甲，甲是債務人，丙是債權人，債權人對債務人有保險利益。Ａ甲對自己有保險利益；Ｂ乙對甲有保險利益；Ｃ丙銀行是債權人，對甲也有保險利益"], ["法規", "第一章", 29, "對於要保人的敘述，何者錯誤(1)要保人訂立保險契約不得委由代理人代理(2)要保人可以為自然人或法人(3)要保人負有交付保險費之義務(4)要保人對被保險人須具有保險利益。", "1", "依保險法第 46條：「保險契約由代理人訂立者，應載明代訂之意旨」之規定辦理，故得委由代理人代理。"], ["法規", "第一章", 30, "按照我國保險法條規定，受益人有疑義時，推定誰為受益人？(1)要保人(2)被保險人(3)被保險人之法定繼承人(4)以上三者皆可。", "1", "依保險法第 45條第2項規定：「受益人有疑義時，推定要保人為自己之利益而訂立」即由法律推定以要保人為受益人。"], ["法規", "第一章", 31, "有關保險受益人之規定，何者正確？A因保險給付不同可區分為滿期、身故、失能或醫療、年金及紅利等受益人；B為人身保險契約關係人；C 保險事故發生時有權受領保險金，而失能保險金之受益人不以被保險人為限；D與要保人、被保險人須具有保險利益(1)BCD(2)AB(3)ABCD(4)ABD。", "2", "C 保險事故發生時有權受領保險金，而失能保險金之受益人僅以被保險人為限；D要保人只對被保險人具有保險利益。"], ["法規", "第一章", 32, "人壽保險受益人之指定何者正確？A 除自然人外，得指定法人；B得指定一人或數人；C 可同時指定自然人及法人；D 訂立保險契約時得僅載明確定受益人之方法(1)ABCＤ(2)ABC(C)BD(4)ABD。", "2", "指定時不限於指出受益人之姓名，即以類名指定亦可，如配偶、子女。"], ["法規", "第一章", 33, "下列何者不是保險契約之成立要件(1)受益人與被保險人間須有保險利益(2)意思表示一致(3)要保人須具有行為能力(4)支付對價。", "1", "(1)要保人與被保險人間須有保險利益。"], ["法規", "第一章", 34, "要保人對下列何者之生命或身體，無保險利益(1)債務人(2)本人(3)為本人管理財產或利益之人(4)生活費或教育費所收受之人。", "4", "要保人對於生活費或教育費所仰給之人有保險利益。"], ["法規", "第一章", 35, "依保險法之規定，受益人於請求保險金時，應以(1)有保險利益者(2)生存者(3)有保險利益者且生存者(4)有行為能力者 為限。", "2", "依保險法之規定，受益人於請求保險金時，應以生存者為限。"], ["法規", "第一章", 36, "人壽保險契約是以人的生命或身體為保險標的，所以適用(1)損害填補原則(2)分攤原則(3)保險代位原則(4)以上皆非。", "4", "人身保險契約僅適用保險利益原則、最大誠信原則、主力近因原則。產險除了適用上述三項原則外，另適用損害填補、分攤、保險代位原則。"], ["法規", "第一章", 37, "A人壽保險；B實支實付型的健康保險；C 年金保險；D日額型健康保險，以上何者適用分攤原則(1)AB(2)BD(3)ABCD(4)B。", "4", "分攤原則：指保險人和保險人之間，在保險事故發生後對理賠金額的分攤。除實支實付型的健康險商品較適用損害填補原則及分攤原則外，在人壽保險並不適用分攤原則。"], ["法規", "第一章", 38, "何謂主力近因原則？(1)非民法中的因果關係(2)是指導致被保險人死亡或受傷的最主要或最有效的原因(3)導致保險事故發生的主要近因不一定是保險單上所保的危險，且保險人仍應負責(4)以上皆是。", "2", "主力近因：指導致被保險人死亡或受傷的最主要或最有效的原因，類似我國民法上的相當因果關係，如果導致保險事故發生的主要近因為保單上所保的危險，則保險人自應負責，反之則不必負責。"], ["法規", "第一章", 39, "受益人的產生方式 A約定；B指定；C 確定；D法定(1)AB(2)BCD(3)ABD(4)ABCD。", "3", "受益人的產生方式有約定、指定、法定 3種方式。"], ["法規", "第一章", 40, "要保人以契約或遺囑變更受益人時，非經通知，不得對抗(1)保險人(2)受益人(3)被保險人(4)保險業務員。", "1", "處分保單保單權利，如受益人之指定與變更(需被保險人書面同意)、保單貸款等。"], ["法規", "第一章", 41, "有關分攤原則敘述何者正確？A由保險代位原則延伸而來；B又稱為攤派原則；C 分攤原則指保險費之分攤應公平合理；D人壽保險及年金保險不適用分攤原則(1)ABD(2)BD(3)BC(4)ABC。", "2", "A是從損害填補原則延伸而來；B對於理賠金額之分攤。"], ["法規", "第一章", 42, "甲提供生活費或教育費給乙，則(1)甲與乙互無保險利益(2)乙對甲有保險利益(3)甲與乙互有保險利益(4)甲對乙有保險利益。", "2", "要保人對以下人有保險利益：本人或其家屬、生活費或教育費仰給之人、債務人、為本人管理財產或利益之人。"], ["法規", "第一章", 43, "下列有關受益人產生之敘述何者為是？(1)無人數的限制(2)可為約定、指定、法定(3)受益人有疑義時，推定要保人為自己之利益而訂立(4)以上皆是。", "4", "全選。"], ["法規", "第一章", 44, "下列有關保險人之規定，何者為非？(1)目前國內之保險公司，均為股份有限公司(2)非保險業不得兼營保險業務(3)保險法之規定，保險業之組織以股份有限公司或合作社為限(4)人身保險人可為法人或自然人。", "4", "(4)人身保險人僅能為法人。"], ["法規", "第一章", 45, "下列何者正確？(1)滿7 歲之未成年人皆為限制行為能力人，其所為意思表示及所受意思表示應得法定代理人允許(2)法院依聲請權人聲請其家屬有精神障礙致不能為意思表示者，得為監護宣告或輔助宣告(3)未滿7 歲之未成年人投保時，僅由法定代理人在法定代理人欄位親簽同意已足(4)限制行為能力人為日常生活必需之意思表示，仍應得法定代理人允許。", "2", "(1)滿 7歲之未成年人為限制行為能力人，其所為意思表示及所受意思表示應得法定代理人允許，惟未成年人已婚者，有行為能力(3)子女未滿 7歲，須由法定代理人代簽孩子姓名及在法定代理人簽名欄位上親自簽名同意(4)限制行為能力人為日常生活必需之意思表示，不須得法定代理人允許。"], ["法規", "第一章", 46, "下列敘述何者正確？(1)保險契約有效期間是要保人與保險公司約定，交付保險費的期間(2)受益人是指保險事故發生時身體遭受損害，享有賠償請求權之人(3)受益人是指經要保人指定，享有保險金請求權的人(4)團體保險契約之死亡受益人由要保人指定。", "3", "(1)保險契約有效期間是要保人交付保險費後，保險公司應負保險責任期間(2)受益人是要保人指定或要保人或被保險人約定，保險事故發生時或約定情況發生時，享有賠償請求權之人(4)團體保險契約之死亡受益人被保險人家屬或指定法定繼承人 。"], ["法規", "第一章", 47, "下列何者依保險法規定得代為交付保險費 A信託業；B被保險人；C 受益人；D保險業務員 (1)BCD (2)BC (3)ABCD (4)ABC。", "4", "保險業務員不可代為交付保險費。"], ["法規", "第一章", 48, "下列有關保險代位原則之敘述，何者正確？(1)人壽保險與產物保險依法均得代位行使請求權(2)人壽保險不得代位行使請求權(3)指事故發生時，由保險人代位行使被保險對第三人之請求權(4)以上皆是。", "2", "(1)僅產物保險得行使代位請求權(3)指保險人於給付賠償後，保險人代位行使被保險對第三人之請求權。"], ["法規", "第一章", 49, "有關保險利益原則敘述何者正確？A又稱為可保利益；B指要保人對於被保險人生命身體因具有利害關係而可享有的合法及不合法的經濟利益；C要保人對於為其管理財產或利益之人有保險利益；D保險利益包含現有利", "4", "B保險利益指要保人應對於被保險人之生命或身體因具有利害關係而可享有之合法經濟利益。"], ["法規", "第一章", 50, "保險利益須存在於(1)被保險人與受益人間(2)要保人與受益人間(3)要保人與被保險人間(4)要保人與保險人間。", "3", "保險利益：指要保人應對於被保險人之生命或身體因具有利害關係而可享有之合法經濟利益。"], ["法規", "第一章", 51, "要保人訂立契約須(1)具有行為能力(2)不須具有行為能力(3)限制行為能力於限制原因消滅後自己承認(4)僅1、3 為是。", "4", "訂立契約之雙方當事人必須具有行為能力，若為限制行為能力之人，須經法定代理人同意或於限制原因消滅後自己承認。"], ["法規", "第一章", 52, "要保人對下列何者應付通知保險人之義務(1)為保險人所知者(2)經保險人聲明不必通知者(3)為被保險人所知者(4)依通常注意為保險人所應知，或無法諉為不知者。", "3", "要保人對為被保險人所知者應付通知保險人之義務。"], ["法規", "第一章", 53, "分攤原則其主要目的是(1)確定保險人賠償責任(2)使要保人不致不當得利(3)使被保險人不致不當得利(4)以上皆非。", "3", "分攤原則其主要目的是使被保險人不致不當得利，由損害填補原則延伸而來。"], ["法規", "第一章", 54, "對於損害填補原則之敘述何者正確？A防止被保險人不當得利；B需保險人有二張以上保險單才可能發生；C 僅適用於人身保險；D僅適用於財產保險(1)AD(2)A(3)BD(4)ABC。", "2", "B僅一張即可發生；C 只適用於實支實付健康險；D可適用於實施時付健康險。"], ["法規", "第二章", 55, "有關人身保險契約之保險費何者為非？ (1)信託業依信託契約有交付保險費義務者， 由信託業代為交付 (2)僅應由要保人依保險契約交付 (3)保險契約簽定時保險費能確 定者，應於保險契約生效前交付之 (4)可分一次及分期交付兩種", "2", "保險法第 115條規定：利害關係人，均得代要保人交付保險費。"], ["法規", "第二章", 56, "下列有關電子保單的敘述何者為非？ (1)保險人與要保人共同約定 (2)約定後不能恢復紙本 (3)保費費率應該反映成本 (4)以上皆是", "2", "約定保單型態為電子保單後，仍舊可以與保險公司申請補發紙本保單"], ["法規", "第二章", 57, "有關受益人之一為維持契約效力代繳險費之規定，何者錯誤： (1)受益人領取保險金仍 依保單所載順序及比例給付 (2)受益人待繳保險費屬民法上無因管理 (3)受益人代繳 保費，不影響與其他受益人間對於保險金有連帶債權之關係 (4)代繳保費之受益人得 要求保險人不得將保險金給付給其他受益人", "4", "受益人經指定後，要保人得於保險事故發生前，以契約或遺囑處分。"], ["法規", "第二章", 58, "關於保險費及保險費率之敘述各項何者正確：A 保險費繳納的方式可分為一次繳清及分期交付二種：B 一次繳清的保險費又稱為躉繳保險費：C保險費是保險公司依據保 險金額、保險費率及繳費方式等因素所計算出要保人每期應交付保險公司的金額：D 分期交付保險費又分為每年、每半年、每季及每月交付等四種，按年分期交付的保險費 又稱為年繳保險費 (1)ABD (2)BCD (3)ABC (4)ABCD", "4", "以上選項皆正確"], ["法規", "第二章", 59, "有關「繳費期間」之敘述何者正確？ (1)於繳費期間屆滿後，保險契約持續有效到保險 期間終了 (2)「繳費期間」和「保險期間」一定相同 (3)繳費期間是要保人與保險公司 所約定之保險契約存續期 (4)要保人不得約定交付保險費的繳費期間比保險期間短的 保險契約", "1", "(2)繳費期間與保險期間不一定相同(3)要保人與保險公司所約定之保險契約存續期指的是保險期間(4)無此項規定"], ["法規", "第二章", 60, "契約之解除與契約之終止，對契約效力而言 (1)解除為自解除之日起消滅，終止為自始不存在 (2)解除為自始不存在，終止為自終止之日起消滅(3)自解除或終止之日起不存在 (4)皆為自始不存在", "2", "契約解除一經解除則溯及訂立時自始無效，且保險人無須退還保費。契約終止指的是保險契約的當事人不願讓契約存續，中途使之效力終止，因此終止之契約效力為自終止日起消滅。契約終止前發生之保險事故，保險人仍應付保險責任。"], ["法規", "第二章", 61, "住院醫療費用保險若包含保證續保條款，保險公司可按續保生效當時重新計算保險費 A 陳報主管機關之費率：B 該險種之經驗費率：C 被保險人年齡：D 被保險人身體狀況 (1)AC (2)BD (3)BCD (4)ACD", "1", "根據住院醫療費用保險單示範條款第 12條規定：保證續保適用時，續保時，按續保生效當時依規定陳報主管機關之費率及被保險人年齡重新計算保險費。"], ["法規", "第二章", 62, "要保人自停效日起6個月後申請復效者，保險人得於要保人申請復效日起A日內要求提供可保證明，或於收到前項可保證明後 B日內不為拒絕視為同意復效，請問A、B 應為(1)A為5，B為15(2)A為5，B為10(3)A為10，B為30(4)A為10，B為15。", "1", "要保人自停效日起 6個月後申請復效者，保險人得於要保人申請復效日起 5日內要求提供可保證明，或於收到前項可保證明後 15日內不為拒絕者，視為同意復效。"], ["法規", "第二章", 63, "以受監護宣告尚未撤銷者為被保險人投保之人壽保險契約，其喪葬費用保險金額如超過遺產及贈與稅法有關喪葬費扣除額 1/2 時(1)保險人完全不負給付保險金責任，無須退還已繳保費(2)保險人僅就超過部分不負給付", "2", "以受監護宣告尚未撤銷者為被保險人投保之人壽保險契約，其喪葬費用保險金額如超過遺產及贈與稅法有關喪葬費扣除額 1/2 時，保險人僅就超過部分"], ["法規", "第二章", 64, "保戶以網址取代紙本保單條款之規定，何者正確？(1)保單條款是保險人與被保險人共同遵守的約定(2)保戶同意後不能再向保險人申請紙本保單(3)保險人因此節省的紙張印製成本需於附加費用反映(4)以上皆是。", "3", "(1)保單條款是保險人與要保人共同遵守的約定(2)保戶同意後能再向保險人申請紙本保單。"], ["法規", "第二章", 65, "甲以無體檢保件投保後，發覺保險內容非當初本意，故書面向保險人行使契約撤銷權，其契約(1)自書面送達時起自始無效(2)自書面到達之翌日零時起自始無效(3)因無體檢保件，故甲不得主張撤銷權(4)自書面到達之日零時起自始無效。", "2", "無論有無體檢，要保人得於收到保單翌日起十日內以書面檢同保險單撤銷契約，自書面到達之翌日零時起自始無效。"], ["法規", "第二章", 66, "何者為適用人身保險之法定無效事由？A契約訂立時保險標的危險已發生或已消滅；B由第三人訂立之死亡保險契約，未經被保險人書面同意並約定保險金額；C 被保險人以不實年齡投保，其真實年齡已超過保險人所定保險年齡限度者；D要保人意圖不當得利而為複保險(1)ABD(2)BCD(3)ABCD(4)ABD", "3", "ABCD皆為法定無效事由。"], ["法規", "第二章", 67, "有關利率變動型年金之敘述，何者為非？(1)若採分紅方式設計應明訂計算方式及給付方式(2)甲型於給付期間僅採不分紅方式設計(3)於累積期間不論甲型或乙型，均無紅利給付(4)乙型於給付期間通常無紅利給付。", "2", "(2)甲型於給付期間可採分紅或不分紅方式。"], ["法規", "第二章", 68, "下列何者正確？(1)保險契約因違反告知義務而解除時，保險人應返還所收保費(2)保險契約因保險人破產而中止，其終止後之保費已交付者無須返還(3)保險人對於要保人或被保險人因履行道德上之義務所致之損害，不負賠償責任(4)訂立保險契約時僅要保人知悉危險已發生，保險人得請求償還費用，其已收受之保費無須返還。", "4", "(1)保險契約因違反告知義務而解除時，保險人無須返還所收保費。(2)保險契約因保險人破產而中止，其終止後之保險費，已交付者，保險人應返還之。(3)保險人對於要保人或被保險人因履行道德上之義務所致之損害，負賠償責任。"], ["法規", "第二章", 69, "保險契約法定終止事由有 A保險人破產時；B 要保人任意終止時；C 保險契約停效後且已逾申請復效所訂期限；D保險標的物非因保險契約所載之事故而完全滅失時(1)AD(2)ACD(3)BC(4)ABC。", "1", "保險契約法定終止事由有保險人破產時、保險標的物非因保險契約所載之事故而完全滅失時。"], ["法規", "第二章", 70, "下列何者正確？A要保人得於收到保單翌日起十日內以書面檢同保險單終止契約；B契約撤銷效力自要保人書面意思表示到達保險人翌日零時起生效；C 契約撤銷效力自要保人郵寄郵戳當日零時起生效；D撤銷生效前如發生保險事故，保險人仍應應負保險責任(1)ACD(2)AB(3)BD(4)BCD", "3", "A要保人得於收到保單翌日起十日內以書面檢同保險單撤銷契約；C 契約撤銷效力自要保人郵寄郵戳翌日零時起生效。"], ["法規", "第二章", 71, "保險契約如約定事項顯失公平者，該部分之約定無效，下列何者非無效事由？(1)免除或減輕保險人依保險法應負之義務(2)使要保人、受益人或被保險人拋棄或限制其依保險法所享之權利(3)加重保險人之義務(4)其他於要保人、受益人或被保險人有重大不利益之情事。", "3", "加重保險人之義務非約定無效事由。"], ["法規", "第二章", 72, "有關年金保險敘述，何者為是？A保險費不得以訴訟方式請求交付；B利害關係人得代要保人交付保險費；C 保險費到期未交付不適用寬限期間之規定；D由第三人訂立之契約，未經被保險人書面同意並約定保險金額者契約無效(1)BCD(2)ABC(3)ABD(4)AB。", "2", "D由第三人訂立之年金保險契約，未經被保險人書面同意並約定保險金額者契約仍有效。"], ["法規", "第二章", 73, "有關保險契約之敘述，何者正確？(1)當事人一方違背特約條款時，即使危險已發生，他方仍得解除契約(2)當事人一方對於他方應通知之事項怠於通知者，僅於故意造成，他方始得據為解約之原因(3)非因要保人或被保險人行為致危險增加時，要保人或被保險人如未及時通知，對於保險人因此所受之損失，免負賠償責任(4)以上皆是。", "1", "(2)當事人一方對於他方應通知之事項怠於通知者，如為故意隱匿，或因過失，遺漏或為不實之說明，他方始得據為解約之原因(3)非因要保人或被保險人行為致危險增加時，要保人或被保險人如未及時通知，對於保險人因此所受之損失，應負賠償責任"], ["法規", "第二章", 74, "依保險法規定，傷害保險之保險費(1)到期未交付不適用寬限期間之規定(2)保險人不得以訴訟請求交付(3)利害關係人不得代要保人交付(4)以上皆非。", "4", "(1)到期未交付適用寬限期間之規定(2)保險人得以訴訟請求交付(3)利害關係人得代要保人交付。"], ["法規", "第二章", 75, "主管機關訂定示範條款目的為 A確立保險商品在社會上的信譽；B減少條款文字或解釋上的分歧；C 授權訂定條款的彈性提高市場競爭力；D 使保險業販售同商品時有統一作業處理方式(1)AC(2)ABC(3)ABD(4)BD。", "3", "主管機關訂定示範條款目的為使各人身保險業在販售同一種類的保險單時有統一的作業處理方式，減少因條款文字說明或解釋的分歧與不明而導致無謂的糾紛，確立人身保險商品在社會上的信譽。"], ["法規", "第二章", 76, "有關傷害醫療保險金之敘述，何者為非？(1)實支實付型之保險給付，保險公司僅就符合意外傷害事故，且於登記合格的醫院或診所治療之實際醫療費用，超過全民健康保險部分給付(2)保險公司基於審核保險金需要，", "3", "(3)日額型每次傷害給付日數不得超過 180日，但超過 180日繼續治療者，受益人若能證明被保險人之治療與該意外傷害事故具有因果關係者，不在"], ["法規", "第二章", 77, "要保人在保險契約有效期間內得申請減少保險金額，但不得低於最低承保金額，其減少部分視為(1)解除契約(2)終止契約(3)無效(4)停效。", "2", "要保人在保險契約有效期間內得申請減少保險金額，但不得低於最低承保金額，其減少部分視為終止契約。"], ["法規", "第二章", 78, "下列何者為非?(1)要保人希望投保的金額稱為保險金額(2)保險事故發生後保險公司給付之金額稱為保險金(3)保險公司就平準繳費的保險契約將來可能發生的給付責任所提存的金額稱為責任準備金(4)保險公司同意承保之金額稱為保險金額。", "1", "(1)保險金額是保險公司同意承保的金額。"], ["法規", "第二章", 79, "保險公司於保單申請復效期限屆滿前提供哪些服務?A於申請復效期限屆滿前3個月通知要保人申請復效；B通知以書面、電子郵件、簡訊或其他約定方式擇一方式；C 依要保人最後留存公司聯絡資料通知；D屬於法定義務(1)AD(2)CD(3)ABCD(4)ABC", "4", "D屬強化服務非法定義務。"], ["法規", "第二章", 80, "依保險法規定，保費超過寬限期間而仍未交付，除約定得由保險公司自動墊繳者外，保險單即停止效力，要保人於催告期間繳付保費應(1)以郵局劃撥繳費(2)依原約定方式繳費(3)以網路連線交付(4)於保險公司營業所交付。", "2", "依保險法規定，保險費於催告期間由要保人繳付者，不論原繳費的地點如何約定，保費應於原約定方式繳費交付之。"], ["法規", "第二章", 81, "有自動墊繳的保險契約，給付保險金時(1)應扣還墊繳保費之利息(2)應扣還墊繳保費(3)無需扣還墊繳保費(4)應扣還墊繳保費本息", "4", "有自動墊繳的保險契約，給付保險金時應扣還墊繳保費本息。"], ["法規", "第二章", 82, "人壽保險單示範條款約定，保險契約因保險單借款本息逾保單價值準備金而停效者，要保人於復效時(1)均須經保險公司同意始得復效(2)須清償全部欠繳保險單借款本息始得復效(3)於停效後6個月內之復效申請始得部分清償後復效(4)得部分清償欠繳保險單借款本息後復效，其未償餘額並不得逾保險單借款約定可借金額之上限。", "4", "若因保單借款本息已逾保單價值準備金，而使保單停效，欲恢復效力，須先清償欠款，但清償方式可採部分清償，且未償餘額不可以超過原保單借款可借金額之上限。"], ["法規", "第二章", 83, "年金保險中，不論被保險人生存與否，保險公司保證給付期間的年金保險稱為(1)遞延年金保險(2)即期年金保險(3)保證金額年金保險(4)保證期間年金保險。", "4", "年金保險的給付原則為被保險人生存時給付，但法令另有規定，保險公司須設計保證的給付方式，不論被保險人生存與否，保證給付固定期間的年金，稱為保證期間年金。"], ["法規", "第二章", 84, "保戶違反告知義務時，保險人得(1)解除契約返還已繳保費(2)解除契約並按解約金列表給付(3)解除契約不返還保費(4)終止契約並按解約金列表給付。", "3", "保戶違反告知義務足以變更或減少保險人對危險之估計者，保險人得解除契約，契約自始無效，且保險人無須返還保費。"], ["法規", "第二章", 85, "債權人未經債務人書面承認而逕以債務人為被保險人訂立之年金保險契約(1)停效(2)無效(3)有效(4)視情形而定。", "3", "年金保險契約是生存契約，且年金保險契約無道德風險問題，故仍有效。"], ["法規", "第二章", 86, "失能保險金不論被保險人失能次數及程度如何，受益人得請領之總金額皆不得超過(1)責任準備金(2)保險金額(3)所繳保險費總額(4)保單價值準備金。", "2", "被保險人於本契約有效期間內因不同義務傷害事故申領失能保險金時，保險公司累計給付金額最高以保險金額為限。"], ["法規", "第二章", 87, "遞延年金保險第二期以後保險費如未依約繳付，不適用何者規定？A寬限期；B停效；C 變更為減額繳清保險(1)AB(2)AC(3)BC(4)ABC。", "1", "第二期以後分期保險費到期未交付時，自保險單所載交付日期起三十日仍未交付者，本公司得自翌日起按第十三條規定將本契約變更為減額繳清保險，使本契約繼續有效。"], ["法規", "第二章", 88, "月繳或季繳保險契約第二期以後分期保險費到期未交付，其寬限期間之起算日為(1)保險費應繳日(2)催告到達之翌日(3)保險費應繳日之翌日(4)催告到達之日。", "3", "月繳或季繳者，寬限期限之起算得免經催告之程序，保險契約的寬限期間自保險單所載交付日期的翌日起 OO日(不得低於三十日)。"], ["法規", "第二章", 89, "申請復效時，要保人可以在保險契約停止效力 6個月內清償欠繳保險費扣除停效期間的(1)危險保險費(2)儲蓄保險費(3)純保險費(4)附加保險費後之餘額及保險契約約定之利息後，翌日上午零時起開始恢復其效力。", "1", "保險契約停效後，要保人可以在保險契約停止效力起6 個月內清償保險險費扣除停效期間危險保險費後的餘額及保險契約約定之利息後，翌日上午零時起開始恢復其效力。"], ["法規", "第二章", 90, "保險金的支付除情況特殊外，保險公司應於收齊所需文件後(1)15日(2)5日(3)1個月(4)10日 內給付，逾期保險公司應按年利一分加計利息給付。", "1", "保險金的給付：保險公司應於收齊申請文件後 15日內給付保險金額，逾期保險公司應按年利一分加計利息給付。"], ["法規", "第二章", 91, "下列何者不屬於住院醫療保險所稱醫院？A健檢中心；B安養中心；C 診所；D國術館(1)BD(2)ABCD(3)AB(4)ABD。", "2", "醫院：依照醫療法規定，領有開業執照並設有病房收治病人之公、私立及財團法人醫院。診所、國術館、安養中心等皆不屬於醫院範疇。"], ["法規", "第二章", 92, "保險事故的通知，如要保人或被保險人不於所規定之期限內通知者，除非下列何種情形之一，否則對保險人所受之損失應自負賠償責任(1)為他方所知者(2)依通常注意為他方所應知，或無法諉為不知者(3)一方對於他方經聲明不必通知者(4)以上皆是。", "4", "通知之除外情形，當事人之一對下列各款，不負通知義務：為他方所知者依；通常注意為他方所應知，或無法諉為不知者；一方對於他方經聲明不必通知者。"], ["法規", "第二章", 93, "保險業因業務或財務狀況顯著惡化，不能支付其債務或無法履行契約責任或有損被保險人之權益之虞時，下列何者為主管機關得為之處分 A監管、接管；B勒令停業清理；C 直接處分轉售；D命令解散(1)ABCD(2)AC(3)ABC(4)ABD。", "4", "保險法第 149條，主管機關應依下列規定對保險為監管、接管、勒令停業清理或命令解散之處分。"], ["法規", "第二章", 94, "有關保單價值準備金之計算，除依主管機關規定外並以何者為基礎？A危險發生率；B附加費用率；C 簽單保險費之利率；D4 行庫每月初牌告之2年期定存最高利率平均值(1)ABCD(2)BCD(3)AC(4)ABC。", "3", "保單價值準備金依保險法施行細則之規定，係指人身保險業以計算保險契約簽單保險費之利率及危險發生率為基礎。"], ["法規", "第二章", 95, "下列何者非受益人申領失能保險金應檢具之文件？(1)保險金申請書及受益人之身分證明(2)保險單或其謄本(3)意外傷害事故證明文件(4)失能診斷書。", "3", "受益人申領「失能保險金」時應檢具下列文件：保險金申請書、保險單或其謄本、失能診斷書；但必要時本公司得要求提供意外傷害事故證明文件、受益人的身分證明。"], ["法規", "第二章", 96, "下列何者是旅行平安險與傷害險的不同 A保險期間可否因特殊事故延長；B承保時間計算之標準；C 除外責任項目；D承保事故(1)CD(2)ACD(3)ABC(4)BCD。", "3", "傷害保險契約條款與旅行平安險不同之處：保險期間之延長、承保期間、除外責任。(B)承保時間計算之標準，傷害險同人壽保險，旅平險以保單所載日時為準，且承保期間最長 180天，傷害險都是一年一約)(D)承保事故都是意外事故答案為 ABC"], ["法規", "第二章", 97, "要保人行使契約撤銷權生效後，則(1)契約自行使撤銷權當日起無效(2)保險人應計息退還保險費(3)契約自始無效(4)保險人得扣除手續費。", "3", "要保人行使契約撤銷權生效後，其效力(1)自要保人書面之意思表示到達翌日零時起，該契"], ["法規", "第二章", 98, "為保障被保險人之基本權益，並維護金融之安定，依保險法規定保險業應設置(1)安定基金(2)業務發展基金(3)消費者保護基金(4)消費者補償基金。", "1", "維護金融之安定 故名 安定基金。"], ["法規", "第二章", 99, "有關人壽保險單示範條款復效通知之規定，何者有誤？(1)保險人於契約停效後至得申請復效之期限屆滿前一個月通知要保人復效權利(2)保險人以書面、電子郵件、簡訊或其他約定方式擇一通知(3)通知須載明未於期限屆滿前申請復效者，契約效力自期限屆滿之日翌日上午零時起終止(4)保險人依要保人最後留存之聯絡資料發出通知，視為已完成通知。", "1", "自109 年1月1日起，保險公司於申請復效期限屆滿前至少三個月將以書面、電子郵件、簡訊或其他約定方法擇一通知，要保人行使申請復效之權利。"], ["法規", "第二章", 100, "有關人壽保險單示範條款保險費自動墊繳之規定，下列何者為非(1)每次墊繳保險費的本息，應由保險公司出具憑證交予要保人(2)保單價值準備金不足墊繳一日之保險費時，自翌日起契約效力停止(3)自動墊繳係以墊繳當時之保單價值準備金扣除借款本息後之餘額辦理(4)自動墊繳經約定後仍可再變更。", "2", "保單價值準備金不足墊繳一日之保險費時，經催告到達後逾 30日仍未交付保險費時，契約效力停止。"], ["法規", "第二章", 101, "保險契約變更為繳清保險後，契約之保險種類(1)改變(2)不變(3)不一定(4)以上皆非。", "2", "減額繳清之效力：不需再繳保費、險種不變、保險期間不變、保險金額減少。"], ["法規", "第二章", 102, "保險契約改變為繳清保險以後，(1)不可以(2)二年內可以(3)一年內可以(4)隨時可以 申請恢復原契約。", "1", "減額繳清的保單保險金額僅會減少，且不得恢復。"], ["法規", "第二章", 103, "依人壽保險單示範條款規定，受益人喪失受益權時，(1)如無其他受益人受領保險金，該保險金作為被保險人遺產(2)要保人除聲明放棄處分權外，得於事故發生前通知保險人重新指定受益人(3)如有其他受益人受領保險金，喪失受益權之受益人原應得部分，按其他受益人原約定比例分歸其他受益人(4)以上皆是。", "4", "全選。"], ["法規", "第二章", 104, "要保人於保險契約停止效力之日起 6個月後申請恢復效力時，下列敘述何者正確A提出申請書；B繳清欠繳的保險費扣除停效期間的危險保險費；C 提供被保險人可保證明(1)BC(2)AB(3)ABC(4)AC。", "3", "六個月內的復效：補繳保費、扣除停效期間危險保費後的餘額及利息。六個月後的復效：上述條件之外，保險公司得於申請復效之日起五日內要求要保人提供被保險人可保證明。"], ["法規", "第二章", 105, "下列何者為人壽保險單示範條款載明之除外責任？(1)被保險人心神喪失所致事故(2)被保險人因飲酒後駕車所致事故(3)被保險人從事特技表演等競賽活動所致事故(4)要保人故意致被保險人於死。", "4", "人壽保險的除外責任：一、要保人故意致被保險人於死。二、被保險人故意自殺或自成失能。但自契約訂立或復效之日起二年後故意自殺致死者，本公司仍負給付身故保險金或喪葬費用保險金之責任。三、被保險人因犯罪處死或拒捕或越獄致死或失能。"], ["法規", "第二章", 106, "為防堵不良醫療院所配合保戶要求開立不實醫療證明或診斷書詐領保險金之行為，金管會修正住院醫療費用保險單示範條款，下列敘述何者正確？(1)保險公司得依其他醫生的第二意見決定理賠與否(2)108年度已簽發的醫療保險單，經保險公司寄送保單權益變更通知書後亦得適用(3)保險公司得憑該條款調閱被保險人的就醫紀錄，不須另外取得授權(4)以上皆是。", "1", "(2)108 年12月底前投保的舊保單不溯及既往(3)保險公司得基於審核保險金需要，徵詢其他醫師專業意見經受益人同意調閱被保險人之就醫相關資料。"], ["法規", "第二章", 107, "要保人以保險單為質向保險人借款，借款到期應將本息償還保險公司，逾期未償之本息超過保單價值準備金時，保險契約？(1)無效(2)立即失效(3)經書面通知到達後逾三十天仍未繳付時，保險契約之效力停止(4)立即停效。", "4", "借款本息如超過保單價值準備金時，保單效力即停止，保險公司應於停效日前 30日內以書面通知要保人。"], ["法規", "第二章", 108, "年金保險的保費一次繳清後，保險公司立即開始給付年金者稱為(1)遞延年金(2)即期年金(3)付清年金(4)躉繳年金。", "2", "即期年金：保險費躉繳 (一次繳清)，於契約生效後即進入年金給付期間。遞延年金：保險費分期交付，於繳費終了後或經過一定的期間或被保險人到達一定年齡才進入年金給付期間。"], ["法規", "第二章", 109, "利率變動型年金保險乙型，其給付期間第 2年度開始每年可領取之年金金額係以前1年度可領取之年金金額乘以當年度(1)調整係數 (2)浮動係數(3)風險係數 (4)變動係數 而得之。", "1", "給付期間第二年度開始每年可領取之年金金額係以前一年度可領取之年金金額乘以當年度「調整係數」而得之"], ["法規", "第二章", 110, "年金開始給付後，要保人即不得要求辦理(1)減額繳清保險(2)減少年金金額(3)終止契約或保險單借款(4)以上皆是。", "4", "全選。"], ["法規", "第二章", 111, "某甲於94年10月1日向某保險公司投保養老保險，同日繳納第一次保險費，並於次日接受體檢，同月 5日保險公司同意承保，據知某甲於承保前一日車禍而死，試問保險公司應(1)僅返還所繳保險費(2)不一定理賠，視個案而定(3)理賠(4)不理賠。", "3", "保險公司在同意承保前預收相當於第一期保險費，而在同意承保之意思表示前發生應予給付之保險事故時，保險公司仍負保險責任。"], ["法規", "第二章", 112, "契約撤銷權之規定適用於個人(1)十年期以上(2)兩年期以上(3)五年期以上(4)一年期 人身保險契約。", "2", "契約撤銷權之規定適用於自 84年4 月1日起簽訂之個人兩年期以上人身保險契約。"], ["法規", "第二章", 113, "利率變動型年金保險甲型為(1)變動年金金額(2)不固定年金金額(3)彈性年金金額(4)固定年金金額。", "4", "利率變動型年金保險甲型為固定年金金額。甲是固定的，乙是變動的。"], ["法規", "第二章", 114, "要保人終止保險契約，而保險費已付足一年以上者，保險人應於接到通知後一個月內償付解約金，其金額不得低於要保人應得保單價值準備金之(1)二分之一(2)四分之一(3)四分之三(4)三分之一。", "3", "要保人終止保險契約，而保險費已付足一年以上者，保險人應於接到通知後一個月內償付解約金，其金額不得低於要保人應得保單價值準備金之四分之三。"], ["法規", "第二章", 115, "某甲購買傷害險時任職於國中教師，兩年後轉任救生員一職，未告知保險公司，後來發生意外事故致死，則保險公司在傷害險部分(1)按原收保險費與應收保險費比例理賠(2)依原投保金額理賠(3)補足保費差額後理賠原保險金額(4)不予理賠。", "1", "意外險的費率看的是職業等級，被保險人職業變更，而致危險增加者，於危險發生前，按差額比例增收未滿期保險金；未通知而發生事故，危險發生後，按原收保費與應收保費比例折算保險金。"], ["法規", "第二章", 116, "復效的契約其保險費之計算(1)視個別契約而定(2)由要保人與保險公司重新約定(3)按原投保年齡標準(4)按復效時年齡計算。", "3", "復效的契約其保險費之計算，是依原保單的保單價值準備金及原投保年齡的標準繼續繳費。"], ["法規", "第二章", 117, "當要保人屆期未交保費，保險人自動墊繳其應繳保費及利息，若保單價值準備金之餘額不足墊繳一日的保險費且經催告到達後逾 30 天仍未繳費", "2", "自動墊繳保價金不足，沒有成功墊繳，等於保費沒有繳，只要保費沒有繳，就是走沒有繳費的流程："], ["法規", "第二章", 118, "責任準備金的提存與下列哪些費率因子有關？A預定死亡率 B預定營業費用率C 預定利率(1)AC(2)AB(3)BC(4)ABC。", "1", "責任準備金的提存與預定死亡率及預定利率有關。"], ["法規", "第二章", 119, "被保險人因犯罪處死或拒捕或越獄致死，如保險費付足 2年以上者，保險人(1)得給付申請部分保險金(2)不得給付保險金(3)應將其保單價值準備金返還予應得之人(4)以上皆非。", "3", "被保險人因犯罪處死或拒捕或越獄致死，如保險費付足 2年以上者，保險人應將其保單價值準備金返還予應得之人。"], ["法規", "第二章", 120, "依民法第八條第三項規定，失蹤人為遭遇特別災難者，得於特別災難終了滿(1)三年(2)七年(3)五年(4)一年 後，為死亡宣告。", "4", "特別災難失蹤 1年；一般失蹤7年；80歲以上3年。"], ["法規", "第二章", 121, "依據保單示範條款，保險公司應於保單申請復效期限屆滿前至少幾個月，通知要保人申請復效之權利？(1)1個月(2)2個月(3)3個月(4)6個月。", "3", "依據保單示範條款，保險公司應於保單申請復效期限屆滿前至少三個月，以書面、電子郵件、簡訊或其他方式通知要保人申請復效之權利。"], ["法規", "第二章", 122, "保險法第131條第2項有關意外傷害之要件，何者為是？A非由疾病引起；B單獨事故；C 外來事故；D突發事故(1)ABD(2)ACD(3)ABCD(4)ABC。", "2", "傷害保險契約的定義係指非由疾病引起之突發外來事故所致者。"], ["法規", "第二章", 123, "關於保單申請復效期限屆滿前之通知，以下敘述何者正確？(1)需於至少三個月前發出通知(2)屬於法定義務，並應註明於契約條款中(3)為保障保戶權益，應以雙掛號通知(4)以上皆是。", "1", "(2)屬強化服務，非法定義務(3)以書面、電子郵件、簡訊或其他約定方式擇一通知要保人申請復效之權利。"], ["法規", "第二章", 124, "壽險契約終止後(1)僅主契約部分可恢復(2)附約部分可恢復(3)雙方同意後可以恢復(4)不能恢復原契約。", "4", "契約終止為要保人提出解約，拿走了解約金，不能再恢復。"], ["法規", "第二章", 125, "李嗣以其子李玖為被保險人購買人身保險，當李嗣死亡時李玖未辦理變更要保人且其他利害關係人也未代為續繳保險費，若該保險單已累積有保單價值準備金，則該保單價值準備金應 (1)列入李嗣之遺產總額，申報遺產稅 (2)視為保險給付，但列入所得(3)由李玖申請領回(4)視為保險給付，不列入所得。", "1", "保單價值準備金給要保人領，要保人死亡，變成遺產，依法申報遺產稅。"], ["法規", "第二章", 126, "人壽保險保險事故發生前，要保人得變更受益人，但須經何人之書面承認者始生效力(1)受益人(2)保險人(3)被保險人(4)要保人。", "3", "受益人變更的聲請要件：未發生保險事故前、需被保險人同意。"], ["法規", "第二章", 127, "陳光華的父親曾於生前投保傷害保險貳百萬元，並以陳光華為死亡保險金受益人，但陳光華一直到父親因疾病死亡後二年，始知父親投保，此時保險公司(1)仍應如額給付保險金(2)陳光華須證明確係不知其父投保事實才延遲申請，否則保險公司仍得拒絕給付(3)僅給付保單價值準備金(4)以上皆非。", "4", "傷害保險契約的定義係指非由疾病引起之突發外來事故所致者。題目陳光華父親因疾病死亡故不理賠。"], ["法規", "第二章", 128, "保險人破產時，保險契約(1)不因之而失效(2)於破產宣告日終止(3)停效(4)保險人應返還全部保險費。", "2", "保險人破產時，保險契約於破產宣告日終止，其終止後之保費，已交付者，應返還之。"], ["法規", "第二章", 129, "有關傷害保險契約，下列敘述何者正確(1)僅得以自己為被保險人投保(2)以職業為危險估計的主要依據(3)契約效力自保單所載日時(4)契約效力自保單所載翌日零時起生效。", "2", "(1)只要符合保險利益均可；(3)(4)生效日同人壽保險"], ["法規", "第二章", 130, "投保旅行平安保險時，若僅有要保人知保險事故已發生者，保險公司(1)依事故比例退還部分保險費(2)加計利息退還保險費(3)僅退還所收保險費(4)不退還所收保險費。", "4", "僅有要保人知保險事故已發生者，契約無效且不退還所收保險費。"], ["法規", "第二章", 131, "保險業因業務或財務狀況顯著惡化，不能支付其債務或無法履行契約責任或有損被保險人之權益之虞時，下列何者非主管機關得為之處分(1)監管、接管(2)勒令停業清理(3)直接處分轉售(4)得為1、2 選項之處分。", "3", "主管機關得為之處分：監管、接管、勒令停業清理、命令解散。"], ["法規", "第二章", 132, "附保證期間之年金保險，被保險人於保險契約年金保證期間內尚未領取之金額稱為(1)年金保額(2)未支領年金餘額(3)生存年金金額(4)年金金額。", "2", "附保證期間之年金保險，被保險人於保險契約年金保證期間內尚未領取之金額稱為未支領年金餘額。"], ["法規", "第二章", 133, "某甲曾於五年前投保死亡保險 200萬元，後該保險因未繳保費於去年一月停效，今年十月又辦理復效完畢，某甲於復效兩個月後即跳海自殺身故，保險人對本案應如何處理？(1)不給付死亡保險金，但退還所繳保費(2)完全不給付(3)應照保險金額理賠(4)僅返還保單價值準備金。", "4", "被保險人故意自殺應自訂約或複效之日起二年後始生效力。此題複效僅二個月，保險人不付給付保險金之責，但保費付足二年以上者，保險公司應返還保單價值準備金於應得之人。"], ["法規", "第二章", 134, "有關實支實付型住院醫療費用保險之陳述何者正確？A具有損害填補的原則；B只要是住院醫療相關費用皆可給付；C 對於全民健保核付的費用不給付；D對於保險對象自行負擔之一定項目費用給付(1)B(2)ACD(3)ABCD(4)AB。", "2", "B被保險人住院期間所發生，且全民健康保險規定其保險對象應自行負責即不屬於全民健康保險給付範圍下一定項目之住院醫療費用及手術費用予以給付。"], ["法規", "第二章", 135, "有關保險法之規定何者正確？(1)傷害保險之受益人故意傷害被保險人未遂時，要保人得撤銷其受益權利(2)要保人故意致被保險人於死者，保險人雖不負給付保險金額之責，但仍應將保單價值準備金繳交國庫(3)人壽保險受益人故意致被保險人於死或雖未致死者，喪失其受益權(4)以上皆是", "3", "(1)受益人故意傷害被保險人未遂時，喪失其受益權，要保人不須要撤銷其受益權。(2)要保人故意致被保險人於死者，保險人雖不負給付保險金額之責，但仍應將保單價值準備金返還予應得之人。"], ["法規", "第二章", 136, "傷害保險的被保險人從事下列何種活動，致成死亡或傷害時，除契約另有約定外，保險公司不負給付保險金之責？A滑翔翼；B汽機車競賽或表演；C 跆拳道；D馬術 (1)AB(2)ABCD(3)BC(4)BCD。", "4", "傷害保險之不保事項：被保險人從事角力、摔跤、柔道、空手道、跆拳道、馬術、拳擊、特技表演、汽車、機車及自行車競賽或表演。"], ["法規", "第二章", 137, "有關長期照顧保險，下列何者錯誤？(1)被保險人身故時保險金尚有未完全給付者，以被保險人法定繼承人為受益人(2)被保險人身故時契約效力即行終止(3)各項保險金受益人皆為被保險人，保險人不受理指定或變更(4)要保人於契約有效期間不得申請減少保險金額。", "4", "(4)要保人於契約有效期間內，得申請減少保險金額。"], ["法規", "第二章", 138, "因違反告知而得解除契約之權利，自保險公司知有解除原因經過(1)二年(2)一年(3)一個月(4)二個月 不行使而消滅。", "3", "因違反告知而得解除契約之權利，自保險公司知有解除原因經過一個月不行使而消滅。"], ["法規", "第二章", 139, "有關契約撤銷權何者正確？A不論有無體檢保件之要保人均得主張行使；B各種人身保險契約皆適用；C 不論何時簽訂之人身保險契約皆適用；D保險公司應於簽收保單回條以明顯字體提醒保戶如何行使契約撤銷及效果(1)BCD(2)ABCD(3)AD(4)ABD。", "3", "B、C 適用於自81/4/1 起簽訂之個人 2年期以上人身保險契約。"], ["法規", "第二章", 140, "有關保險契約復效之陳述何者正確？A其保險費之計算重新約定；B 可維持原保險單歷年繳費的保單價值準備金；C 較重新投保更為有利(1)ABC(2)AB(3)AC(4)BC。", "4", "A保險費按照原投保年齡的標準繼續繳費。"], ["法規", "第二章", 141, "依保險法第43條規定，保險契約應以(1)要保書(2)保險單或暫保單(3)體檢報告書(4)送金單 為之。", "2", "依保險法第 43條規定，保險契約應以保險單或暫保單為之。"], ["法規", "第二章", 142, "傷害保險費率係按被保險人Ａ薪資；Ｂ性別；Ｃ職業；Ｄ工作環境，之不同作為主要的依據(1)BCD(2)CD(3)ABC(4)ABCD。", "2", "傷害保險費率係按被保險人的職業類別做區分。"], ["法規", "第二章", 143, "依個人傷害保險示範條款規定，附加日額給付醫療保險金之傷害保險，其每次傷害給付日數不得超過(1)180日(2)60日(3)90日(4)30日。", "3", "依個人傷害保險示範條款規定，附加日額給付醫療保險金之傷害保險，其每次傷害給付日數不得超過90日。"], ["法規", "第二章", 144, "年金保險不論被保險人生存與否，保險公司保證給付金額的年金保險稱為(1)保證期間年金保險(2)保證金額年金保險(3)遞延年金保險(4)即期年金保險。", "2", "年金保險不論被保險人生存與否，保險公司保證給付金額的年金保險稱為保證金額年金保險。"], ["法規", "第二章", 145, "依我國保險法第59條規定，保險契約內所載增加危險之情形，非由於要保人或被保險人之行為所致者，要保人或被保險人應於知悉後(1)十日內(2)三十日內(3)五日內(4)二十日內 通知保險人。", "1", "風險增加：不由要被保人所致者，10 日內通知保險人；風險增加由要被保人所致者，應於知悉後通知保險人。"], ["法規", "第二章", 146, "實支實付型住院醫療費用保險之給付內容，不包含下列哪項費用？(1)管灌飲食以外之膳食費(2)來往醫院之救護車費(3)超等住院之病房費差額(4)特別護士之護理費。", "4", "住院醫療費用保險單示範條款(實支實付型)每日病房費用保險金之給付 第五條被保險人因第四條之約定而以全民健康保險之保險對象身分住院診療時，本公司按被保險人住院期間內所發生，且依全民健康保險規定其保險對象應自行負擔及不屬全民健康保險給付範圍之下列各項費用核付。1. 超等住院之病房費差額。2. 管灌飲食以外之膳食費。3. 特別護士以外之護理費。住院醫療費用保險金之給付 第六條被保險人因第四條之約定而以全民健康保險之保險對象身分住院診療時，本公司按被保險人住院期間內所發生，且依全民健康保險規定其保險對象應自行負擔及不屬全民健康保險給付範圍之下列各項費"], ["法規", "第二章", 147, "保單如累積達有保單價值準備金且辦理解約時，依保險法規定保險公司應於接到通知後(1)一個月(2)二個月(3)十五天(4)二十天 內償付解約金。", "1", "要保人得隨時終止契約，保險費已付足一年以上或繳費累積達有保單價值準備金者，保險人應於接到通知一個月內償付解約金。"], ["法規", "第二章", 148, "下列何者非屬於傷害保險的除外責任(1)被保險人飲酒後駕(騎)車，其吐氣或血液所含酒精成份超過道路交通法令規定標準者(2)被保險人犯罪行為(3)要保人、被保險人的故意行為(4)以上皆非。", "4", "皆為傷害保險除外責任。"], ["法規", "第二章", 149, "現行人壽保險單示範條款規定，要保人或受益人應於知悉被保險人死亡或其他保險事故時(1)於十日內(2)依契約規定日期，不得少於五日內(3)三十日內(4)即時 通知保險公司。", "2", "人壽保險單示範條款第十條：要保人或受益人應於知悉本公司應負保險責任之事故後○○日(不得少於五日)內通知保險公司。"], ["法規", "第二章", 150, "要保人破產時，保險契約仍為(1)保險人(2)被保險人(3)要保人(4)破產債權人 之利益而存在。", "4", "要保人破產時，保險契約仍為破產債權人之利益而存在。"], ["法規", "第二章", 151, "保險法第34條規定保險人應付之賠償金額確定後，應於約定期限內給付之，無約定者應於接到通知後幾日內給付之(1)10日(2)30日(3)20日(4)15日。", "4", "保險法規定保險公司應於收齊所需文件後 15日內為給付，如因可歸責於保險公司之事由而逾期給付者，保險公司應按年利一分加計利息給付。"], ["法規", "第二章", 152, "利率變動型年金保險甲型為固定年金金額，在年金給付開始日，保險公司以當時所累積之年金保單價值準備金，依據當時(1)十年期公債殖利率(2)預定利率(3)宣告利率(4)定存利率 及年金生命表計算可以領取之年金金額。", "2", "利率變動型年金保險甲型為固定年金金額，在年金給付開始日，保險公司以當時所累積之年金保單價值準備金(如有保險單借款應扣除保險單借款及其應負利息後)，依據當時預定利率及年金生命表計算可以領取之年金金額。"], ["法規", "第二章", 153, "關於寬限期間之述敘，何者錯誤？A逾寬限期間仍未繳付保險費者，契約至寬限期間終了之翌日起終止效力；B如在寬限期間發生保險事故，保險公司仍負給付責任；C 年繳或半年繳件，自保單所載之交付日期之翌日起30日為寬限期間；D季繳或月繳件，至催告到達日期之翌日起 30日為寬限期間(1)ABCD(2)BCD(3)ACD(4)CD。", "3", "A人壽保險之保險費到期未交付者，除契約另有訂定外，經催告到達後屆30日仍不交付時，保險契約之效力停止；B年繳或半年繳者，自催告到達翌日起 OO日(不得低於 30日)內為寬限期；C 月繳或季繳者則不另為催告，自保險單所載交付日期之翌日起 OO日(不得低於 30日)為寬限期間。"], ["法規", "第二章", 154, "有關自動墊繳保險費利息之計算何者正確？(1)自寬限期限終了當日起算(2)按當時市場利率計算(3)自應繳日翌日起算(4)自寬限期間終了翌日起算。", "4", "墊繳保險費的利息，自寬限期間終了的翌日起，按當時保險公司公告的利率計算(不得超過本保單辦理保單借款的利率)。"], ["法規", "第二章", 155, "下列有關保險法第105 條規定之敘述何者為非(1)被保險人得隨時依本條為撤銷並通知要保人即生效力(2)被保險人依本條行使撤銷權時，視為要保人終止契約(3)由第三人訂立之死亡保險契約須經被保險人書面同意並約定保險金額，否則契約無效(4)被保險人得隨時依本條所為之同意得隨時撤銷。", "1", "撤銷之方式應以書面通知保險人及要保人。被保險人依前項規定行使其撤銷權者，視為要保人終止保險契約。"], ["法規", "第二章", 156, "有關住院醫療費用保險何者錯誤？(1)如有保證續保條款時，保險人不得拒絕續保及不得依續保當時之費率規定重新計算保費(2)被保險人於契約有效期間屆滿出院，因同一疾病於出院後 14日內於同一醫院再住院，保險人就再住院部分不給付保險金(3)保戶如前往非屬健保特約院所就醫，保險人於限額內得按實際支出費用不低於 65%給付(4)以上皆非。", "1", "(1)保證續保在續保時，保險公司可按續保當時費率重新起算；(2)(3)均正確。"], ["法規", "第二章", 157, "依保險法規定，關於未來事項之特約條款，於未屆履行期前危險已發生，或其履行為不可能，或在訂約地為不合法而未履行者，保險契約(1)因之失效(2)不因之而失效(3)停止效力(4)自始無效。", "2", "依「保險法第」69條：關於未來事項之特約條款，於未屆履行期 前危險已發生，或其履行為不可能，或在訂約地為不合法而未履行者，保險契約不因之而失效。"], ["法規", "第二章", 158, "保險公司接到要保人申請保險單借款，應於(1)一個月內(2)二個月內(3)三個月內(4)半年內 貸給可借之金額。", "1", "依「保險法」第 120 條第2項：保險人於接到要保人之借款通知後，得於一個月以內之期間，貸給可得質借之金額。"], ["法規", "第二章", 159, "有關健康保險何者為是？A保險費不得以訴訟方式請求交付；B利害關係人不得代要保人交付保險費；C 保險費到期未交付不適用寬限期間之規定；D由第三人訂立之契約，未經被保險人書面同意並約定保險金額者契約無效 (1)AC(2)ACD(3)ABD(4)D。", "4", "A健康保險、傷害保險未有規定不得訴訟請求；B利害關係人可代要保人交付保險費；C 保險費到期未交付適用寬限期間之規定。"], ["法規", "第二章", 160, "傷害保險中被保險人因同一意外事故致成失能等級表所列二項以上失能程度者，何者有誤？(1)保險人應給付失能程度較嚴重者，且最高以保險金額為限(2)意外事故合併以前的失能可領較嚴重項目失能保險金者，按較嚴重項目給付(3)若二項失能項目皆屬同一手但失能等級不同時，給付較嚴重項目失能保險金(4)若二項失能項目屬於同一手時，僅給付依項失能保險金。", "1", "(1)保險人應給付各該項失能保險金之和，且最高以保險金額為限。"], ["法規", "第二章", 161, "有關傷害保險受益人申請失能保險金，下列何者錯誤？(1)保險人基於審核保險金需要得對被保險人身體予以檢驗(2)保險人得經受益人同意調閱被保險人就醫相關資料(3)保險人得自付費用另徵詢其他醫師之醫學專業意見(4)受益人應檢具被保險人除戶戶籍謄本。", "4", "傷害保險受益人申請失能保險金，保險人基於審核保險金需要得對被保險人身體予以檢驗，另得徵詢其他醫師之醫學專業意見另並得經受益人同意調閱被保險人就醫相關資料因此所生費用由保險公司負擔 。"], ["法規", "第二章", 162, "下列何者為是？ A人壽保險之保險費可以訴訟方法請求交付；B利害關係人得代要保人交付保險費；C 受益人經指定後，要保人對其保險利益喪失處分權；D受益人得於部分條件下將其利益轉讓他人(1)BD(2)BCD(3)ABCD(4)B。", "1", "A人壽保險之保險費不得以訴訟方式請求交付；C受益人經指定後，要保人對其保險利益除聲明放棄處分權者外仍得以契約或遺囑處分之。"], ["法規", "第二章", 163, "要保人或被保險人對於保險人的書面詢問若有故意隱匿或因過失遺漏，或為不實之說明，足以變更或減少保險人對於危險之估計者，保險人得(1)停止契約(2)終止契約(3)撤銷契約(4)解除契約。", "4", "要保人或被保險人對於保險人的書面詢問應據實說明，要保人有故意隱匿或因過失遺漏，或為不實之說明，足以變更或減少保險人對於危險之估計者，保險人得解除契約；其危險發生後亦同。"], ["法規", "第二章", 164, "有關減額繳清保險之敘述，何者正確？A與原保險同一種類；B與原保險期間相同；C 與原保險之保險金額相同；D與原保險之繳費方式相同(1)A(2)ABC(3)AB(4)ABD。", "3", "C 與原保險金額不同；D已躉繳了，故繳費方式不同。"], ["法規", "第二章", 165, "旅行平安保險單示範條款有延長保險期間之規定，其要件不包括(1)被保險人須為乘客(2)該交通工具因故延遲抵達為被保險人所能控制(3)該交通工具之預定抵達時刻在保險契約期間內(4)搭乘之交通工具須領有載客執照。", "2", "如被保險人以乘客身分搭乘領有載客執照之交通工具，該交通工具之預定抵達時刻係在本契約的保險期間內，因故延遲抵達而非被保險人所能控制者，本保險單自動延長有效期限至被保險人終止乘客身分時為止，但延長之期限不得超過二十四小時。"], ["法規", "第二章", 166, "以下何者正確？A含保證給付的年金保險，受益人得申請貼現提前給付；B遞延年金保險在年金給付開始前如有保單借款，給付開始時應就當時年金保單價值準備金扣除保單借款本金計算年金金額；C 保險人為避免以不實醫療證明詐領保險金，得經要保人同意調閱被保險人就醫資料；D 住院醫療費用保險期間以一年為原則(1)ABCD(2)AD(3)BCD(4)ABC。", "2", "B遞延年金保險在年金給付開始前如有保單借款，給付開始時應就當時年金保單價值準備金扣除保險單借款及其應付利息計算年金金額；C 保險人為避免以不實醫療證明詐領保險金，得經受益人同意調閱被保險人就醫資料。"], ["法規", "第二章", 167, "保險公司對即期年金應負的保險責任由何時開始(1)要保人交付保費(2)保險人同意承保(3)保險人同意承保且送達保單(4)保險人同意承保且要保人繳付全部保險費。", "4", "保險公司應負責任的開始應自同意承保且收取全部保險費後負保險責任。如題目改遞延年金，應自同意承保且收取第一期保險費後負保險責任。"], ["法規", "第二章", 168, "以被保險人終身為期，不附生存條件之死亡保險契約，如保險費已付足二年以上而有不交付時，保險人(1)得以被保險人指定的方式處理(2)得解除契約(3)僅得減少保險金額(4)得終止契約。", "3", "以被保險人終身為期，不附生存條件之死亡保險契約，如保險費已付足二年以上而有不交付時，保險人僅得減少保險金額。"], ["法規", "第二章", 169, "要保人中途請求終止契約，如果交付的保險費累積達有保單價值準備金，可以領回(1)已繳全部保險費加計利息(2)已積存責任準備金之金額(3)由保險公司決定可領之金額(4)解約金表所列解約金額。", "4", "要保人中途請求終止契約，如果交付的保險費累積達有保單價值準備金，保險人應於接到通知一個月內償付解約金，其金額不得少於要保人應得保單價值準備金 3/4。"], ["法規", "第二章", 170, "有關復效規定之敘述何者為非？(1)停效後超過6個月之復效，如被保險人之危險程度有重大變更之情形者，保險人得拒絕其復效(2)約定復效之期限，自停止效力之日起不得低於 2年(3)停效後超過6 個月之復效，要保人填寫復效申請並繳清欠繳保險費、約定之利息及其他費用後，於翌日上午零時恢復其效力(4)停效後6個月內之復效於要保人繳清欠繳保險費、約定之利息及其他費用後，翌日上午零時恢復其效力。", "3", "(3)停效後超過 6個月之復效，保險公司得於申請復效之日 5日內要求要保人提供被保險人可保證明。"], ["法規", "第二章", 171, "傷害保險契約生效日(1)一律自保單所載始日零時起生效(2)保險人同意承保且交第一期保費時開始(3)不得由契約當事人約定生效時間(4)原則上自保險單所載始日午夜十二時起生效。", "2", "傷害保險契約生效日同人壽保險。"], ["法規", "第二章", 172, "依人壽保險單示範條款規定，約定以金融機構轉帳繳納保險費者，何種繳別須經催告程序以計算寬限期間(1)月繳(2)季繳(3)年繳(4)以上皆是。", "4", "如果第二期以後保險費的繳付是以金融機構轉帳，或是指定地點交付或保險公司派員前往收取以外的繳費方式，不管繳別為何均應催告。"], ["法規", "第二章", 173, "受益人變更，保險公司應(1)實地調查變更情形(2)僅就書面審核即可(3)除書面審核外，亦需實地調查(4)以上皆非。", "2", "受益人變更聲請方式：書面通知保險人。"], ["法規", "第二章", 174, "保險費的繳納方式有A向保險公司所在地或指定地點交付；B保險公司派員收取；C 約定以金融機構轉帳；D保險業務員墊繳(1)BCD(2)BD(3)AB(4)ABC。", "4", "保險費的繳納方式有：向保險公司所在地或指定地點交付、保險公司派員收取及約定以金融機構轉帳。"], ["法規", "第二章", 175, "下列何者不是保險人依保險法第 64條解除契約之要件(1)要保人隱匿或遺漏不為說明，或為不實之說明(2)須足以變更或減少保險人對於危險之估計(3)要保人之不實告知，須在契約訂立時(4)要保人之不實告知，須在保險事故發生時。", "4", "錯誤(4)：訂立契約時要保人或被保險人對於保險人之書面詢問應據實說明，要保人故意隱匿，或因過失，遺漏或為不實之說明，足以變更或減少保險人對危險之估計者，保險人得解除契約；其危險發生後亦同。"], ["法規", "第二章", 176, "發生保險事故以後發覺被保險人投保年齡不實而致短繳保險費，且其錯誤非可歸責於保險公司者，受益人可得之金額為(1)要保人不得要求補繳短繳保險費，僅按原繳保險費比例減少保險金額(2)原保險金額減掉應補繳之保費(3)已繳保費加計利息退還要保人(4)保險人無息退還所有已繳保費。", "1", "如於保險事故後始發覺短繳保險費者，保險公司得按原繳保費與應繳保險費之比例減少保險金額，而不得請求補足差額。"], ["法規", "第二章", 177, "有關完全失能等級之敘述，何者有誤？(1)永久喪失咀嚼機能係指因器質障害，除流質食物外不能攝取者(2)失明係指視力永久在萬國式視力表0.02以下(3)四肢機能永久完全喪失係指經 3個月以後，其機能仍完全喪失者 (4)喪失言語機能係指構成語言之四種語音機能，有三種以上不能構音。", "3", "(3)四肢機能永久完全喪失係指經六個月後其機能仍完全喪失者。"], ["法規", "第二章", 178, "雇主為員工投保團體人壽保險的好處是(1)可因此不必投保勞工保險(2)與壽險業建立良好關係，方便資金融通(3)降低員工流動率(4)以上皆非。", "3", "雇主為員工投保團體人壽保險的好處是降低員工流動率、增進員工福利。"], ["法規", "第二章", 179, "依據人壽保險單示範條款之規定，人壽保險契約約定有自動墊繳者，應以當時的(1)保險金 (2)保單責任準備金 (3)投保金額 (4)保單價值準備金自動墊繳其應繳的保險費及利息。", "4", "壽保險契約約定有自動墊繳者，應以當時的保單價值準備金自動墊繳其應繳的保險費及利息。"], ["法規", "第二章", 180, "下列何者為是？A傷害保險之保險費不得以訴訟請求交付；B利害關係人不得代要保人交付保險費；C 傷害保險之保險費到期未交付不適用寬限期間之規定；D由第三人訂立之傷害保險契約，未經被保險人書面同意並約保險金額者契約無效(1)ABCD(2)D(3)AD(4)AC。", "2", "A傷害保險之保險費得以訴訟請求交付；B利害關係人得代要保人交付保險費；C 傷害保險之保險費到期未交付適用寬限期間之規定。"], ["法規", "第二章", 181, "要保人故意致被保險人於死者，保險人(1)無須給付保險金，但應退還所繳保險費(2)須給付保險金(3)無須給付保險金，但應退還保單價值準備金予應得之人或解交國庫(4)無須給付保險金，退還保單加值準備金及所繳保險費。", "3", "要保人故意致被保險人於死者，保險人不負給付保險金之責。但保險費付足二年以上者，保險公司應將其保單價值準備金返還予應得之人。"], ["法規", "第二章", 182, "被保險人投保健康保險後，因疾病致成失能時，保險人(1)退還所繳保險費(2)應給付保險金(3)酌給慰問金(4)不給付保險金。", "2", "被保險人因疾病或傷害致成失能時，保險人應給付保險金。"], ["法規", "第二章", 183, "下列何者為保險契約構成部份 A附著之要保書；B批註書；C 廣告文宣；D保單條款(1)ABCD(2)ABD(3)AD(4)ACD。", "2", "保險契約構成不包括廣告文宣。"], ["法規", "第二章", 184, "由第三人訂立之年金保險契約，未經被保險人書面承諾，並約定保險金額，其保險契約(1)效力未定 (2)無效 (3)得撤銷 (4)有效。", "4", "由第三人訂立之年金保險契約，未經被保險人書面承諾，並約定保險金額，其保險契約有效。"], ["法規", "第二章", 185, "年金保險契約下列何者為是 A得由本人或第三人訂立之；B未經保險人書面承認並約定保險金額契約無效；C 利害關係人均得代要保人交付保險費；D保險人對於保險費得以訴訟請求交付(1)BC(2)AC(3)ABCD(4)ABC。", "2", "年金保險係以被保險人生存為給付條件故不會產生道德風險；保險法規定人壽/年金保險不得訴訟請求。"], ["法規", "第二章", 186, "人壽保險費除於簽訂保險契約時尚未確定者外，無論其交付方式為何應於何時交付 (1)契約生效後 (2)契約生效前 (3)契約生效時 (4)發生保險事故前。", "2", "壽保險費除於簽訂保險契約時尚未確定者外，無論其交付方式為何應於契約生效前交付。"], ["法規", "第三章", 187, "哪些情況繳納保險費,於繳納綜合所得稅時不得扣除?A 父母申報代繳成年子女壽險保 費，且子女已自行報稅 B 車險及火險的保費 C 申報代繳兄弟姊妹的壽險保費 D 為受其 扶養之直系血親尊親屬繳納之壽險保費(1)ABCD (2)BC (3)ABC (4)AD", "3", "下列情形之保費，不能以列舉方式扣除：(1)非直系親屬間如兄弟姐妹互為繳納保險費者(2)子女已成年並自行報稅者之父母代繳保險費(3)因個人綜合所得稅以「戶」為申報單位，而要保人與被保險人非同一戶申報戶內者(4)未經核准在台銷售之境外保單(5)汽車保險、火災保險、責任保險等非屬人身保險之保費"], ["法規", "第三章", 188, "死亡保險契約，要保人所指定之受益人如在被保險人死亡後才身故，且保險公司尚未 給付保險金時，則保險金應作為 (1)歸屬國庫 (2)被保險人之遺產 (3)受益人之遺產 (4)要保人之遺產", "3", "被保險人早於受益人身故，故此筆保險金應領之人為受益人，受益人身故後，成為受益人之遺產"], ["法規", "第三章", 189, "我國民法對於第一順位繼承人之見解，下列敘述何者錯誤？(1)母與父離婚，子女仍對 其父母有繼承權 (2)父死母再嫁者，子女仍對其母有繼承權 (3)男子入贅於妻家，將喪失其對父母之繼承權 (4)繼父母與繼子女之間，不得相互繼承", "3", "男子入贅仍保有其對父母之繼承權"], ["法規", "第三章", 190, "依遺產及贈與稅法第17 條規定，被繼承人僅遺有成年子女 1名及母親，扣除額合計為(1)223(2)173(3)180(4)140 萬元。", "4", "依遺贈稅法第 17條規定，子女扣除額是 40萬(已滿18 歲)、父母扣除額100萬，所以40+100=140 萬。"], ["法規", "第三章", 191, "依遺產及贈與稅法第17 條規定，配偶之扣除額為(1)400(2)500(3)350(4)493 萬元。", "1", "遺贈稅法第 17條規定，配偶扣除額為 400萬元。"], ["法規", "第三章", 192, "依遺產及贈與稅法第17 條規定，祖父母之扣除額為(1)40(2)45(3)100(4)50 萬元。", "1", "遺贈稅法第 17條規定，祖父母扣除額為 40萬元。"], ["法規", "第三章", 193, "依遺產及贈與稅法第17 條規定，成年子女之扣除額為(1)100(2)120(3)50(4)40 萬元。", "4", "遺贈稅法第 17條規定，成年子女之扣除額為 40萬元。"], ["法規", "第三章", 194, "老王去年度共有三次贈與，贈與其子 1棟房屋2000萬元，贈與其妻轎車200萬元，贈與其女出嫁禮金 80萬元，則老王今年度課稅贈與總額為(1)2280(2)2080(3)2200(4)2000 萬元。", "4", "贈與總額-免稅額-扣除額=課稅贈與淨額1.夫妻間之贈與不計入贈與總額。2.父母於子女婚嫁時所贈與之財務，總金額不超過100萬元也不計入。故贈與總額為 2000萬元"], ["法規", "第三章", 195, "關於遺產稅款之繳納方式有 A現金繳納；B實物抵繳；C 分期繳納；D部分現金繳納，部分實物一次抵繳(1)ABCD (2)AC (3)BCD (4)ABD。", "1", "以上皆可"], ["法規", "第三章", 196, "何者正確？A凡向產險公司投保之保費皆不得列舉扣除；B現行長期照顧特別扣除額為每人每年 12萬元；C 團體投資型保險每人每月保費 2 千元以內免視為被保險人薪資所得；D團體保單經驗分紅退費之給付免納所得稅。(1)ABCD(2)AD(3)BD(4)BCD。", "3", "A向產險公司投保之意外傷害險、健康險，該保費可扣除；C 團體壽險之保費，每人每月保費 2千元以內免視為被保險人薪資所得。"], ["法規", "第三章", 197, "下列何者正確？A滿期保險給付所含之利益所得，受益人享有免納利息所得之稅法優惠；B勞工退休請領勞退帳戶退休金時，屬退職所得須計入個人綜所稅總額；C 醫療費用支出曾受保險給付，得再以醫療費扣除額申報；D死亡保險金指定法定繼承人，各該繼承人領取保險金後須繳納遺產稅(1)ABC(2)ABD(3)AB(4)BD。", "3", "C 醫療費用支出曾受保險給付，不得再以醫療費扣除額申報；D死亡保險金指定法定繼承人，各該繼承人領取保險金無須繳納遺產稅。"], ["法規", "第三章", 198, "有關拋棄繼承何者錯誤？(1)繼承人中一人拋棄，其應繼分歸屬於其他繼承人(2)拋棄繼承無須開具遺產清冊但需書面呈報法院(3)遺屬在知悉得繼承之時起3個月內表示，且不得申請延長(4)屬單獨行為需經法院同意始生效。", "4", "(4)屬單獨行為，只要程序完整，無須法院同意。"], ["法規", "第三章", 199, "甲生前投保20萬元之死亡保險未指定受益人，但另有債務 25萬元，假設甲死後除了保險金外沒有其他財產，而僅有一子乙，又乙未向法院表示拋棄繼承，則乙(1)繼承保險金但無須償還任何債務(2)以保險金償還債務後仍餘債務5萬元須償還(3)僅就繼承之保險金償還債務即可(4)不繼承保", "3", "如乙未向法院表示拋棄繼承，則乙僅就繼承之保險金償還債務即可。"], ["法規", "第三章", 200, "下列的敘述何者有誤?(1)納稅義務人為自己投保之人身保險費可採列舉扣除額方式申報自綜合所得總額中扣除(2)配偶與子和女共同繼承時，配偶特留分為應繼分之1/2(3)配偶與子和女共同繼承時，配偶應繼分為遺產總額之1/2(4)死亡保險未指定身故受益人時，該死亡保險金作為被保險人遺產。", "3", "(3)配偶與子和女共同繼承時，應繼分按人數平均分配。"], ["法規", "第三章", 201, "下列敘述何者錯誤？(1)凡屬人身保險之保險給付，在一定條件下不論其項目名稱均得依法免納所得稅(2)軍公教保險之保險給付免納所得稅(3)人壽保險之解約金屬人身保險之保險給付範圍(4)壽險滿期保險金在一定條件下得享有免稅優惠。", "3", "人身保險、勞工保險、軍公教保險之保險給付及壽險滿期保險金在一定條件下免納所得稅。"], ["法規", "第三章", 202, "A謀求員工福利；B為員工退休或退職提存準備金；C 減輕雇主責任；D減免營利事業所得稅，上述何者是企業投保團體人壽保險之主要目的？(1)ABC(2)ACD(3)ABCD(4)BCD。", "3", "企業投保團體壽險主要目的：為謀員工的福利、為員工退休或退職提存準備金、為防意外災變影響員工生活並減輕雇主的責任、減免營利事業所得稅。"], ["法規", "第三章", 203, "依民法第八條對失蹤人為死亡宣告之期限，何者正確？A如遇特別災難於災難終了滿三年後；B 一般失蹤滿七年後；C 失蹤人為八十歲以上於失蹤滿一年後；D得由利害關係人向檢察官聲請宣告(1)B(2)BD(3)ABCD(4)ABC。", "1", "失蹤宣告：一般失蹤滿 7年；80歲以上失蹤人滿 3年；特別災難事故滿 1年。"], ["法規", "第三章", 204, "死亡保險金300萬未指定身故受益人，如被保險人僅有配偶和兄弟姊妹，該保險金應如何分配？(1)配偶200萬、兄弟姊妹100 萬(2)配偶100萬、兄弟姊妹200萬(3)配偶150萬、兄弟姊妹150萬(4)按人數平均分配。", "3", "應繼分：配偶 1/2，兄弟姊妹1/2。"], ["法規", "第三章", 205, "依現行遺產及贈與稅法規定，祖父母之扣除額為(1)100萬(2)56萬(3)111萬(4)445萬 元。", "2", "祖父母扣除額每人 56萬。"], ["法規", "第三章", 206, "依現行遺產稅及贈與稅法規定，直系血親卑親屬每人扣除額為？(1)45萬(2)56萬(3)55萬(4)40萬。", "2", "依現行遺產稅及贈與稅法規定，直系血親卑親屬每人扣除額為 56萬。"], ["法規", "第三章", 207, "依遺產及贈與稅法第12-1條規定，被繼承人遺有父母者，父母每人可扣除額為(1)100萬(2)138 萬(3)445萬(4)400萬。", "2", "依遺產及贈與稅法第 12-1條規定，被繼承人遺有父母者，父母每人可扣除額為 138萬。"], ["法規", "第三章", 208, "依現行遺產及贈與稅法規定，贈與稅之免稅額為(1)200萬(2)250萬(3)123萬(4)244萬 元。", "4", "遺產及贈與稅法條文第 22條：贈與稅納稅義務人，每年得自贈與總額中減除免稅額 244 萬元。"], ["法規", "第三章", 209, "依遺產及贈與稅法第12-1條規定，現行被繼承人之喪葬費用扣除額為(1)100萬 (2)50萬 (3)40 萬 (4)138萬 元。", "4", "依遺產及贈與稅法第 12-1條規定，現行被繼承人之喪葬費用扣除額為 138萬。"], ["法規", "第三章", 210, "(1)特留分(2)持分(3)法定繼承額(4)應繼分 乃法定繼承人對遺產依法得繼承之數額。", "4", "應繼分：各繼承人對於遺產上之一切權利義務所得繼承之比例。"], ["法規", "第三章", 211, "某甲一家投保人壽保險，全年所繳保費：某甲及其配偶合計為二萬四千元、成年長子二萬五千元、未成年次子一萬二千元，某甲於申報綜合所得稅時採用列舉扣除法，則一年可扣除的保險費為(1)八萬五千元(2)八萬四千元(3)六萬元(4)六萬一千元。", "3", "依所繳保費加總試算-每人最高扣除額為 24,00024,000+24,000(25,000 超過)+12,000=60,000"], ["法規", "第三章", 212, "遺產稅或贈與稅應納稅額在三十萬元以上，納稅義務人確有困難，不能一次繳納現金時，得於納稅期限內，向該管稽徵機關申請，分(1)十八期(2)六期(3)三十六期(4)二十四期 以內繳納。", "1", "遺產稅或贈與稅應納稅額在三十萬元以上，納稅義務人確有困難，不能一次繳納現金時，得於納稅期限內，向該管稽徵機關申請分 18期以內繳納，每次間隔以不超過 2個月為限。"], ["法規", "第三章", 213, "被保險人之法定繼承人可以拋棄繼承被保險人之債務，但應於知悉其得繼承之時起(1)二個月(2)一個月(3)三個月(4)六個月 內以書面向法院表示。", "3", "被保險人之法定繼承人可以拋棄繼承被保險人之債務，但應於知悉其得繼承之時起三個月內以書面向法院表示。"], ["法規", "第三章", 214, "以下何者得不計入贈與總額？A捐贈公有事業機構之財產；B扶養義務人為受扶養人支付之生活費；C 配偶相互贈與之財產；D父母於子女婚嫁時所贈與之財物，總金額不超過 200萬元(1)ACD(2)ABC(3)ABCD(4)AC。", "2", "D父母於子女婚嫁贈與財務，免稅額 100萬。"], ["法規", "第三章", 215, "依民法規定第一順位繼承人全部拋棄繼承，由其次親等人辦理繼承者，稱為(1)代位繼承(2)概括繼承(3)共同繼承(4)隔代繼承。", "4", "當所有第一順位繼承人全部拋棄繼承，由其直系親卑親屬隔代繼承。"], ["法規", "第三章", 216, "贈與人在一年內贈與他人之財產總值超過贈與稅免稅額時，應於超過免稅額之贈與行為發生後(1)二個月內(2)十日內(3)三十日內(4)二十日內，向贈與人戶籍所在地之稅捐機關申報。", "3", "贈與納稅義務人應於行為發生後 30 天內，向贈與人戶籍所在地之稅捐機關申報。"], ["法規", "第三章", 217, "李君以自己為被保險人，身故受益人欄位僅寫配偶及子女，投保當時育有一子，投保後再生育一子一女，李君死亡時，其妻、子、女皆生存，共有幾人可享有保險金受領權？(1)2人(2)3人(3)4人(4)5人。", "3", "繼承權利由當然繼承人(配偶)加上順位繼承人繼承，人數為其身故時之當然繼承人及順位繼承人數量分，此題有配偶 1人以及2子1女，共 4人。"], ["法規", "第三章", 218, "下列敘述何者錯誤？(1)經常居住國外之非中華民國國民，其在國內之贈與應課贈與稅(2)死亡事實或贈與行為發生前 2年內，被繼承人或贈與人自願喪失中華民國國籍，免課徵遺產稅或贈與稅(3)經常居住國外之中華民國國民，其在國內之贈與應課贈與稅(4)經常居住國內之中華民國國民，對於其在中華民國境外財產之贈與應課贈與稅。", "2", "(2)死亡事實或贈與行為發生前 2年內，被繼承人或贈與人自願喪失中華民國國籍，需課徵遺產稅或贈與稅。"], ["法規", "第三章", 219, "某甲身故後留有死亡保險金 1000萬元，因未指定身故受益人，若某甲沒有其他遺產，但立有遺囑將保險金全部歸配偶所有，在僅有配偶和父母之情形下，則該保險金，某甲父親可領到(1)333萬(2)125萬(3)250萬(4)500萬 元。", "2", "遺囑處份：立有遺囑時，依照被保險人遺囑分配，但必須考慮遺囑內容是否侵害到法定繼承人特留分應繼分 1000*1/2=500；特留分500*1/2=250；父親可領 125萬元。"], ["法規", "第三章", 220, "有關贈與稅敘述何者正確？(1)贈與人逾繳納期限尚未繳納，且在中華民國境內有財產可供執行，以受贈人為納稅義務人(2)贈與人行蹤不明者，仍應以贈與人為納稅義務人(3)贈與稅未繳清前得先行分割遺產或辦理移轉登記(4)贈與人死亡時贈與稅尚未核課者，以受贈人為納稅義務人。", "4", "(1)贈與人逾繳納期限尚未繳納，且在中華民國境內無財產可供執行，以受贈人為納稅義務人(2)贈與人行蹤不明者，以受贈人為納稅義務人(3)贈與稅未繳清前不得先行分割遺產或辦理移轉登記"], ["法規", "第三章", 221, "共同居住之家人投保人壽保險，全年所繳保費：阿公二萬元、父母共二萬四千元、未成年長子二萬五千元、未成年次子一萬二千元；若全家合併申報綜合所得稅且採用列舉扣除法，則一年可扣除的保險費為(1)十一萬七千元(2)八萬元(3)十二萬元(4)十萬四千元。", "2", "每人每年扣除數額以不超過新台幣 24,000 元為限。但全民健康保險之保險費不受金額限制。20,000+24,000+24,000+12,000=80,000"], ["法規", "第三章", 222, "保險金受領人為數人時，其受益之分配應詳載於保險單，如其數額尚未確定者應 (1)墊交保費之受益人可獨得(2)由受益人間彼此協商(3)平均分受其權利(4)依應繼分比例分配。", "3", "由多位受益人共同領取保險金，其受領之順序及比例詳載於保險單，否則未經確定者，應依民法第271條之規定由各受益人平均分受其權利。"], ["法規", "第三章", 223, "依據所得稅法第14條規定，員工依勞工退休條例自願提繳之退休金，合計在每月工資 (1)8%(2)5%(3)10%(4)6% 範圍內，不計入提繳年度薪資所得課稅。", "4", "依據所得稅法第 14條規定，員工依勞工退休條例自願提繳之退休金，合計在每月工資 6%範圍內，不計入提繳年度薪資所得課稅。"], ["法規", "第三章", 224, "依據民法繼承編之規定，A父母；B子女 ; C 兄弟姊妹 ; D祖父母，在繼承開始時之繼承順序為何(1)BADC(2)BACD(3)ABCD(4)BCAD。", "2", "法定繼承人的優先順序為當然繼承人(配偶)→第一順位(直系血親卑親屬)→第二順位(父母)→第三順位(兄弟姊妹)→第四順位(祖父母)。"], ["法規", "第三章", 225, "二人以上同時遇難，不能證明死亡之先後時，(1)視為同時死亡(2)推定年紀大者先死(3)推定同時死亡(4)由法院裁定。", "3", "民法第 11條規定，同時遇難，無法證明先後，推定為同時死亡。"], ["法規", "第三章", 226, "有關繼承的敘述何者正確？(1)繼父母與繼子女間為直系血親相互有繼承權(2)父死母再嫁者，子女對其母喪失繼承權(3)男子入贅妻家後喪失對父母之繼承權(4)非婚生子女經準正後對其生父有繼承權。", "4", "(1)繼父母與繼子女間之間是直系姻親而非血親，故其相互間無繼承問題(2)父死母再嫁者，子女仍對其親生父母有繼承權(3)男子入贅妻家後對原父母之繼承權不受影響。"], ["法規", "第三章", 227, "繼承人拋棄繼承時，下列敘述何者錯誤？(1)須經法院同意(2)須以書面呈報法院(3)書面通知因其拋棄而應為繼承之人(4)不繼承財產，亦不用負擔任何債務。", "1", "拋棄繼承為繼承人之單獨行為，只要程序完整，無須法院同意。"], ["法規", "第三章", 228, "遺產稅及贈與稅納稅義務人，應於稽徵機關送達核定納稅通知書之日起(1)二個月(2)一個月(3)半年(4)三個月 內，繳清應納稅款。", "1", "稅款得申請延長兩個月繳清稅款，超過 30萬以上得分 18期，以不超過2個月為限"], ["法規", "第三章", 229, "有關勞工自願提撥薪資一定百分比至個人勞退帳戶，何者正確？A提撥年度個人所得總額減少有減稅效果；B退休後請領該帳戶退休金屬退職所得，不計入個人綜合所得總額；C 退休後請領該帳戶退休金，應計入個人綜合所得總額；D該退休金屬人身保險給付，依所得稅法規定全額免稅", "2", "BD勞退退休金屬退職所得，計入個人綜合總額所得，故要課稅。勞保老年給付：屬人身保險給付全額免稅"], ["法規", "第三章", 230, "老王投保20萬元之死亡保險，受益人為小明，但另有債務 25萬元，假設老王除了保險金外沒有其他財產，而老王只有一子小明，小明向法院表示拋棄繼承，則小明(1)須償還債務5萬元(2)須償還債務 25 萬(3)僅領取20萬元保險金(4)不繼承保險金亦無須償還任何債務。", "3", "有指定受益人+拋棄繼承：領保險金且無須繼承負債；無指定受益人+拋棄繼承：不領保險金且無須繼承負債。"], ["法規", "第三章", 231, "依現行規定遺產及贈與稅法規定，遺產稅稅率最高課稅級距為？(1)10%(2)15% (3)20% (4)30%。", "3", "依現行規定遺產及贈與稅法規定，遺產稅稅率最高課稅級距為 20%。"], ["法規", "第三章", 232, "依遺產及贈與稅法規定，遺產總額包括被繼承人死亡前(1)五年(2)二年(3)六年(4)一年 內贈與配偶及子女、父母、兄弟姊妹、祖父母等法定繼承人及上述法定繼承人配偶的財產。", "2", "依遺產及贈與稅法規定，遺產總額包括被繼承人死亡前 2年內贈與配偶及直系血親卑親屬、父母、兄弟姊妹、祖父母等法定繼承人及上述法定繼承人配偶的財產。"], ["法規", "第三章", 233, "甲僅遺有子女乙與丙，甲死後遺留財產 1000萬元，甲於遺囑中表示將其遺產60%全數捐給慈善機構，僅留 40%由乙、丙平均分配，則依民法規定乙可繼承多少金額？(1)400 萬元(2)250萬元(3)200萬元(4)500萬元。", "2", "因60%遺產侵犯到特留分，因此要計算特留分。特留分為應繼分 1/2，因此先計算乙的應繼分乙的應繼分為 1000萬/2=500 萬乙的特留分為 500萬/2=250 萬"], ["法規", "第三章", 234, "繼承人中一人拋棄繼承，其應繼分歸屬於(1)國庫(2)次順位繼承人(3)其他繼承人(4)被繼承人。", "3", "繼承人中一人拋棄繼承，其應繼分歸屬於其他繼承人。"], ["法規", "第三章", 235, "若保險金在死亡保險中未指定身故受益人之受領順序及比例時，又被保險人僅列有子女和配偶，則該保險金應如何分配？(1)配偶、子女各二分之一(2)配偶三分之二、子女三分之一(3)按人數平均分配(4)配偶獨領。", "3", "若保險金在死亡保險中未指定身故受益人之受領順序及比例時，又被保險人僅列有子女和配偶，則該保險金按人數平均分配。"], ["法規", "第三章", 236, "遺囑人於不違反關於(1)特留分(2)應繼分(3)保留分(4)遺贈分 規定之範圍內，得以遺囑自由處分遺產。", "1", "被保險人立有遺囑時，依照被保險人的遺囑分配，但必須考慮被保險人的遺囑內容是否有侵害到法定繼承人的特留分。"], ["法規", "第三章", 237, "訂立要保人甲與被保險人乙為不同人之人壽保險，若變更要保人為丙，何者正確？A有保單價值準備金且超過贈與免稅額，甲須申報贈與稅；B有保單價值準備金且超過贈與免稅額，丙須申報贈與稅；C 丙非同時為受益", "4", "B有保單價值準備金且超過贈與免稅額，甲須申報贈與稅(贈與人為納稅義務人)；D丙同時為受益人者，不須將保險給付列入當年度基本所得額(非同"], ["法規", "第三章", 238, "依遺產及贈與稅法第17 條規定，被繼承人僅遺有17 歲子女 1 名及母親，扣除額合計為(1)223(2)173(3)180(4)140 萬元。", "3", "依遺產及贈與稅法第 17條規定，子女扣除額是 40萬、父母扣除額 100萬，由於子女未滿 18歲，故子女可再加扣 40萬，所以40+40+100=180 萬。"], ["法規", "第三章", 239, "按遺產及贈與稅法規定，約定被繼承人死亡時給付其所指定受益人之 A人壽保險之死亡保險金；B勞工保險之死亡保險金；C 軍公教保險之死亡保險金；D撫恤金；以上何者不計入遺產總額？(1)ABCD(2)BD(3)D(4)ABC。", "4", "依遺贈稅法第 16條第9款規定，約定於被繼承人死亡時，給付其所指定受益人之人壽保險金額，軍公教人員、勞工或農民保險之保險金額及互助金，皆不計入遺產總額。"], ["法規", "第三章", 240, "有關個人綜合所得稅之課徵何者正確？A 就個人綜合所得總額計徵之；B有中華民國來源所得之個人，應就其中華民國來源之所得，課徵綜合所得稅；C 非中華民國境內居住之個人一律免納所得稅(1)ABC(2)AB(3)B(4)BC。", "3", "A就個人綜合所得淨額計徵之；C 非中華民國境內居住之個人，而有中華民國來源所得者，其應納稅額，分別就源扣繳。"], ["法規", "第三章", 241, "甲父於去年1月及8月分別贈與其子共兩棟房子，各值新台幣 600萬元，甲父應計稅的贈與稅淨額為(1)956萬(2)1000萬(3)760萬(4)780萬元。", "1", "總贈與財產為 600萬*2=1200 萬贈與淨額為 1200萬-244萬(免稅額)=956 萬"], ["法規", "第三章", 242, "某公司三位員工投保團體人壽保險，其中甲員工每月之保險費為五千元，乙員工為三千元，丙員工為二千元，則試問該公司在新台幣多少元以內部分，可以免視為員工之薪資所得(1)六千元(2)三千元(3)四千元(4)五千元。", "1", "由營利事業負擔之團體壽險保險費，每人每月保險費在新台幣 2千元以內部份，免視為被保險人之薪資所得。2,000+2,000+2,000=6,000 元"], ["法規", "第三章", 243, "下列何者正確？(1) 拋棄繼承為求程序完整，得以書面向法院向法院申請延展期間(2) 拋棄繼承後，不繼承財產但負擔債務(3)拋棄繼承後，應以書面通知因其拋棄而應為繼承之人(4)當繼承人不只一人，拋棄繼承須共同為之。", "3", "(1) 拋棄繼承為求程序完整，得以書面向法院申請，不得申請延展期間(2)拋棄繼承後，不繼承財產亦不用負擔債務(4)當繼承人其中一人拋棄繼承，其應繼份歸屬於其他繼承人。"], ["法規", "第三章", 244, "遺產稅或贈與稅應納稅額在三十萬元以上，納稅義務人確有困難，不能一次繳納現金時，得於前項規定納稅期限內，向主管稽徵機關申請，分十八期以內繳納；每期間隔以不超過(1)二個月 (2)一個月 (3)半年 (4)三個月", "1", "遺產稅或贈與稅應納稅額在 30萬元以上，納稅義務人確有困難，不能一次繳納現金時，得於納稅期限內，向該管稽徵機關申請，分十八期以內繳納，"], ["法規", "第三章", 245, "某甲為自己及其父投保人壽保險，年繳保費各為二萬四千元及一萬五千元，但其父未受其扶養，則甲在申報綜合所得稅時如採用列舉扣除法時(1)不得申報扣除(2)得扣除一萬五千元(3)得扣除一萬二千元(4)得扣除二萬四千元。", "4", "依所得稅法規定，納稅義務人本人、配偶或受扶養直系親屬的人身保險費，得從個人所得總額中採列舉申報方式扣除，但每人每年扣除數額以不超過新台幣兩萬四千元為限。"], ["法規", "第三章", 246, "胎兒為繼承人時，非保留其(1)遺贈分(2)特留分(3)應繼分(4)保留分，他繼承人不得分割遺產。", "3", "胎兒為繼承人時，非保留其應繼分，他繼承人不得分割遺產。"], ["法規", "第三章", 247, "小華父親將一千萬的房子贈與小華後，沒有其他財產，以下敘述何者錯誤？(1)贈與人應就756 萬元計算繳納贈與稅(2)贈與稅之納稅義務人為小華父親(3)贈與總額為780 萬元(4)稽徵機關在一定條件下可向小華課稅。", "3", "(1)以贈與淨額課稅，贈與淨額=贈與總額 1000萬-免稅額 244萬-扣除額0=756 萬(2)對有贈與行為之贈與人課徵(3)贈與總額為房子價值 1000萬(4)一定條件指贈與人有下列情形以受贈人小華為納稅義務人：行蹤不明、逾繳納期限未繳且在境內無財產可供執行、死亡時贈與稅尚未核課。(111年更新)"], ["法規", "第三章", 248, "若保險契約涉及訴訟，要保人的住所不在中華民國境內時，其訴訟之管轄法院為(1)要保人以前住所(2)保險公司所在地(3)台北地區(4)雙方契約約定地方
