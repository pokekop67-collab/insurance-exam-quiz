法院為第一審管轄法院。", "4", "保險契約涉及訴訟，示範條款要求以要保人住所所在地為第一審管轄法院，但要保人的住所不在中華民國境內時，其訴訟之管轄法院由雙方於契約中約定。"], ["法規", "第三章", 249, "有關民法各順位繼承人之特留分之敘述，何者錯誤？(1)配偶的特留分是應繼分的二分之一(2)祖父母的特留分是應繼分的三分之一(3)父母的特留分是應繼分的二分之一(4)兄弟姊妹的特留分是應繼分的二分之一。", "4", "(4)兄弟姊妹的特留分為應繼分的三分之一。"], ["法規", "第三章", 250, "A滿期保險金；B醫療保險金；C 死亡保險金；D人壽保險單之紅利；上述何種保險給付在一定條件下免稅(1)ABCD(2)ABC(3)BCD(4)ACD。", "1", "滿期保險金、醫療保險金、死亡保險金、人壽保險單之紅利皆為免稅。"], ["法規", "第三章", 251, "有關贈與稅，何者陳述錯誤？(1)納稅義務人為贈與人(2)免稅額之計算係指一年之贈與(3)一年如有二次以上之贈與，不得分別計算(4)免稅額為123萬元。", "4", "(4)免稅額：贈與他人每年免稅額為 244 萬元。"], ["法規", "第三章", 252, "下列何者為是？A遺產及贈與稅法第 17 條規定，被繼承人遺有父母者，父母每人得自遺產總額中扣除 100萬元；B現行公告遺產稅之免稅額為1200萬元；C 財政部於每年 12月底應公告次年發生之繼承或贈與案件所應適用之各項金額 (1)AC(2)C(3)B(4)BC。", "1", "(B)113 年公告遺產稅之免稅額為 1333 萬元。"], ["法規", "第三章", 253, "直系血親卑親屬不包括？(1)乾子女(2)養子女(3)孫子女(4)以上皆是。", "1", "直系血親卑親屬不包括乾子女。"], ["法規", "第三章", 254, "依遺產及贈與稅法第17 條規定，遺產稅扣除項目之敘述，何者有誤(1)父母每人可扣除100萬元(2)被繼承人之喪葬費用可扣除100 萬元(3)被繼承人死亡前，依法應納之各項稅損、罰金及具有確實證明之未償債務可全額扣除(4)配偶之扣除額為 440萬元。", "4", "(4)配偶之扣除額為 400萬元。"], ["法規", "第三章", 255, "依遺產及贈與稅法第17 條規定，16 歲之未成年子女之扣除額應為(1)160萬 (2)120萬 (3)40 萬 (4)250萬 元。", "2", "遺產及贈與稅法第 17條規定，繼承人為直系血親卑親屬者，每人得自遺產總額中扣除四十萬元。其有未滿十八歲者，並得按其年齡距屆滿十八歲之年數，每年加扣四十萬元。直系血親卑親屬扣除額 40萬元+屆滿十八歲之年數×40 萬元=120 萬元。"], ["法規", "第三章", 256, "依遺產及贈與稅法第12-1條規定，被繼承人僅遺有配偶及成年子女 1名，該遺產扣除額合計為(1)450(2)440(3)500(4)609 萬元。", "4", "配偶扣除額：553萬；直系血親卑親屬扣除額：56萬。合計 609萬元。"], ["法規", "第三章", 257, "被繼承人死亡遺有財產者，納稅義務人應於被繼承人死亡之日起(1)六個月(2)一個月(3)三個月(4)二個月 內，向戶籍所在地主管稽徵機關依遺產及贈與稅法規定辦理遺產稅申報。", "1", "被繼承人死亡遺有財產者，納稅義務人應於被繼承人死亡之日起六個月內，向戶籍所在地主管稽徵機關依遺產及贈與稅法規定辦理遺產稅申報。"], ["法規", "第三章", 258, "依遺產及贈與稅法之規定，凡居住我國境內之我國國民遺有財產者，應(1)就其在我國境內、外全部財產(2)我國境內部分財產須要，國外部分財", "1", "凡經常居住中華民國境內之中華民國國民死亡時遺有財產者，就其在中華民國境內、境外全部遺產，"], ["法規", "第三章", 259, "甲僅遺有子女乙與丙，甲死後遺留財產五百萬元，甲於遺囑中表示將其遺產60%全數捐給慈善機構，僅留 40%由乙、丙平均分配，則依民法規定乙可繼承多少金額？(1)100 萬元(2)250萬元(3)125萬元(4)500萬元。", "3", "子女之應繼分為遺產之 1/2，特留分為應繼分之1/2，故子女一人可繼承 125萬元。"], ["法規", "第三章", 260, "下列的敘述何者有誤？(1)遺產及贈與稅法第12-1 條規定，成年子女的扣除額為每人新台幣56萬元 (2)納稅義務人為本人投保的人身保險費，得採標準扣除額之方式申報，自綜合所得總額中扣除 (3)配偶與兩名子女共同繼承時，配偶之應繼分為遺產總額之三分之一(4)要保人未指定身故受益人時，該筆之死亡保險金轉作被保險人遺產。", "2", "(2)納稅義務人為本人投保的人身保險費，得採列舉扣除額之方式申報，自綜合所得總額中扣除。"], ["法規", "第三章", 261, "依遺產及贈與稅法第17 條規定，被繼承人遺有受其扶養之兄弟姊妹者，每人得自遺產總額中扣除(1)50萬(2)100萬(3)45萬(4)40萬 元，免徵遺產稅。", "4", "依遺產及贈與稅法第 17條規定，被繼承人遺有受其扶養之兄弟姊妹者，每人得自遺產總額中扣除40萬元，免徵遺產稅。"], ["法規", "第三章", 262, "下列何者正確？(1)配偶相互贈與之財產應計入贈與總額(2)贈與稅之納稅義務人死亡時，贈與稅尚未核課者，無須繳納贈與稅(3)本國國民就其中華民國境外之財產為贈與，應課徵贈與稅(4)以上皆非。", "3", "(1)配偶相互贈與之財產，不須計入贈與總額(2)贈與稅之納稅義務人死亡時，贈與稅尚未核課者，須繳納贈與稅。"], ["法規", "第三章", 263, "死亡保險金一千萬且未指定身故受益人，被保險人遺有配偶、子女兩名和父母，則被保險人之父親可分配到(1)200萬(2)500萬(3)0萬(4)125萬元。", "3", "在繼承開始時有當然繼承人(配偶)得與第一順位繼承人同為繼承人，故父母無法分得遺產。"], ["法規", "第三章", 264, "張三(被繼承人)育有4子，其長子較張三早死，當張三死亡可由其孫 A、B代位其父繼承對張三之應繼分。如張三遺留保險金 1000 萬元，則其孫各可代位繼承(1)125萬(2)250萬(3)300萬(4)100萬。", "1", "張三之遺留保險金 1000萬分給四個孩子(1人250萬)，而長子早死，其子 A.B可代位繼承長子分得之財產，各可得 125萬元。"], ["法規", "第三章", 265, "下列何者係指被繼承人遺留的遺產總額減掉免稅額及扣除額後所剩的餘額為(1)遺囑繼承額(2)特留分(3)課稅遺產淨額(4)應繼分。", "3", "課稅遺產淨額=遺產總額-免稅額及-扣除額。"], ["法規", "第四章", 266, "有關酬金制度,下列何者正確？(1)業務人員離職,所領取之離職金會依照業績去計算(2)保險契約撤銷、無效、解除時,應按與業務人員簽訂之合約或其所適用之辦法規定追回已發放之酬金(3)金融服務業依據金消法規定訂定業務人員酬金制度並須提報股東大會(4)客戶保險契約成立後,保險公司應立即全數發放酬金給業務員", "2", "保險契約撤銷、無效、解除時,應按與業務人員簽訂之合約或其所適用之辦法規定追回已發放之酬金"], ["法規", "第四章", 267, "有關金融消費保護法，下列敘述何者錯誤？(1)與金融消費者訂立的契約條款顯失公平時，該部分條款無效(2)金融教育宣傳時如要引薦個別金融商品或服務需事先取得核可(3)金融服務業對金融消費者之責任，不可預先約定限制或免除(4)契約條款若有疑義時以有利金融消費者做解釋。", "2", "金融服務業與金融消費者訂立之契約條款顯失公平者，該部分條款無效，契約條款如有疑義時，應為有利於金融消費者之解釋。金消法亦明定金融服務業對金融消費者之責任，不得預先約定限制或免除，如有違反者，該限制或免責之約定無效。金融服務業亦不得藉金融教育宣導的方式，引薦個別金融商品或服務，使消費者產生誤解。"], ["法規", "第四章", 268, "「保險業防制洗錢及打擊資恐最佳實務指引」第四點列舉保險業常見之低風險交易情境，有哪些？A投保微型保險；B 團體醫療保險；C 年金；D客戶未有高洗錢集資恐風險之表徵，年繳費保費未逾一定金額三萬元(1)ABCD(2)ABD(3)ABC(4)BCD", "2", "列舉保險業常見之低風險交易清境，如：客戶投保不具有保單價值準備金之保險商品者（短年期人壽壽險、傷害保險、健康保險）；投保小額終老保險、微型保險；投保團體年金保險、團體定期壽險、團體傷害保險、團體健康保險、團體醫療保險；客戶未有高洗錢及資恐風險之表徵，年繳保費未逾一定金額（三萬元）或躉繳保費末逾一定金額（七萬五千元）；投保強制汽車責任保險、農業保險、小額財產保險（保險金額五萬元以下）及其他經保險公司依風險基礎方法認定為低風險交易之情形等，保險公司得進行簡化審査及持續監控措施。【說明】低洗錢風險的特性：沒保單價值、團體險、沒表徵且保費低（年繳 3萬以下、躉繳 7萬5以下）"], ["法規", "第四章", 269, "有關審閱期間規定之敘述何者為是？ (1)保戶得主動放棄審閱權 (2)未提供審閱期間 者契約一律無效 (3)壽險商品之審閱期間不得低於 5 日 (4)有提供審閱期間者無須提供契約撤銷權", "1", "(2)僅未提供審閱期間之定型化契約無效(3)壽險商品應提供至少 3日之審閱期間(4)應提供契約撤銷權"], ["法規", "第四章", 270, "金融消費評議成立後且評議書經法院核可者，何者錯誤？A 當事人就該事件得再行起 訴：B 當事人就該事件得再申請評議：C 評議書經法院核可後有依法無效之原因，當事人不得提起宣告評議無效或撤銷評議之訴：D 評議書內容如有牴觸法令而未予核可者， 法院應通知爭議處理機構及當事人 (1)ABC (2)AB (3)ABCD (4)BC", "1", "A、B不可就該事件再行起訴或評議C 評議書經法院核可後有依法無效之原因，當事人得提起宣告評議無效或撤銷評議之訴"], ["法規", "第四章", 271, "有關定型化契約敘述，何者有誤？(1)消保法對其權利義務的履行訂有相當完整的規範(2)是由企業經營者與消費者雙方面所共同議定(3)條款如有疑義時，應為有利於消費者之解釋(4)消費者只有簽訂與否的權利。", "2", "(2)是由企業經營者單方面所預先擬具。"], ["法規", "第四章", 272, "金管會列舉保險業常見之低風險交易情境，如：投保 A微型保險；B 具有保單價值準備金之保險商品；C 團體年金保險；D客戶無高洗錢及資恐風險之表徵，年繳保費未逾三萬元(1)ABC(2)AC(3)ABCD(4)ACD，保險公司得進行簡化審查及持續監控措施。", "4", "金管會列舉保險業常見之低風險交易情境，如：客戶投保不具有保單價值準備金之保險商品、微型保險、小額終老保險、團體年金/定期/傷害/健康/醫療保險、客戶無高洗錢及資恐風險之表徵，年繳保費未逾三萬元/躉繳未逾七萬五千元，強制汽車責任險、農業保險、小額財產保險，保險公司得進行簡化審查及持續監控措施。"], ["法規", "第四章", 273, "有關金融服務業公平待客原則，何者正確？(1)公司對商品銷售獎勵核給，在酬金與業績衡平原則下應注意僅以業績目標達成做為計算基礎(2)公司應於業務員一賣出商品就發給高額酬金以符合酬金與業績衡平原則(3)公司應該將該原則納入教育訓練課程每年至少 2小時，業務員未完成該訓練應辦理撤銷登錄(4)該原則共9大指標，並增訂第 10項董事會重視情況。", "4", "(1)公司對商品銷售獎勵核給，在酬金與業績衡平原則下不應僅以業績目標達成做為計算基礎(2)公司不應於業務員一賣出商品就發給高額酬金，而應將業務員所涉稽核缺失、客戶紛爭、KYC 等非財務指標納入考量(3)公司應該將該原則納入教育訓練課程每年至少 3小時，業務員未完成該訓練應辦理撤銷登"], ["法規", "第四章", 274, "金融業引進金融科技帶來產業創新，何者為非？(1)金融科技帶來公司追求經營效率最大化應兼顧公平待客及消費者保護(2)個人資料保護法立法目的皆禁止個人資料蒐集或無限制保護個人資料(3)政府近年來為遵循洗錢防制及打擊資恐相關規定，要求金融業強化辨識客戶資金來源及最終受益人身分(4)科技帶來的便利會犧牲個資權益，這些犧牲須以法律方式明訂。", "2", "(2)個人資料保護法立法目的是為了規範蒐集、處理及利用個人資料，以免人格權受侵害，並促進個人資料的合理利用。"], ["法規", "第四章", 275, "保險業核保理賠時需蒐集當事人之特種個資，除經當事人書面同意外，須符合法律明文規定使得為之，下列何者為保險業蒐集之特種個資?A 健康檢查；B病歷；C 指紋；D職業(1)ABD(2)BC(3)AB(4)ABC", "3", "保險業蒐集之特種個資包含病歷、醫療、基因、性生活、健康檢查及犯罪前科之個人資料。"], ["法規", "第四章", 276, "有關金融消費者保護法規定，何者有誤?A金融服務業對金融消費者之責任得預先約定限制；B 金融服務業對金融消費者之責任不得預先免除；C違反預先限制之約定無效；D金融服務業與金融消費者訂立契約條款顯失公平者契約無效(1)BCD(2)A(3)AD(4)BC。", "3", "A金融服務業對金融消費者之責任，不得預先約定限制或免除；D金融服務業與金融消費者訂立契約條款顯失公平者，該部分條款無效。"], ["法規", "第四章", 277, "為充分瞭解消費者屬性，金融服務業應 A銷售前做消費者適合度調查；B依不同商品建立差異化事前審查機制；C 考量消費者確實瞭解所交保費係用以購買保險商品；D 因投資型商品較複雜，得由業務員代為決定客戶投資屬性(1)AC(2)ABC(3)ACD(4)ABCD", "2", "D因投資型商品較複雜，不得由業務員代為決定客戶投資屬性。"], ["法規", "第四章", 278, "有關個人資料保護法，何者為非?(1)姓名、出生年月日、身分證字號、指紋及護照號碼等皆屬個人資料(2)非公務機關蒐集個人資料僅須符合指定目的即得為之(3)保險公司蒐集保戶資料係符合特定目的、與當事人有契約關係且已採取適當之安全措施及經當事人同意等要件(4)當事人可請求刪除、停止處理或利用該個人資料。", "2", "(2)非公務機關蒐集個人資料僅須符合指定目的外，應有特定目的，並符合下列情形之一：1.法律明文規定。2.與當事人有契約或類似契約之關係，且已採取適當之安全措施。3.當事人自行公開或其他已合法公開之個人資料。4.學術研究機構基於公共利"], ["法規", "第四章", 279, "非公務機關在蒐集個人資料時，除了須符合特定目的外，尚須具有下列何種情形之一，始得為之(1)當事人自行公開或其他已合法公開之個人資料(2)經當事人同意(3)與當事人有契約關係會類似契約關係(4)以上皆是。", "4", "非公務機關在蒐集個人資料時，除須符合特定目的外，尚須具有題目所述情形之一，始得為之。"], ["法規", "第四章", 280, "下列有關金融消費爭議處理之敘述何者錯誤？(1)消費者在評議成立後，得於不變期間內申請爭議處理機構將評議書送法院核可(2)金融服務業即使已依評議內容履行，爭議處理機構仍應將評議書送法院核可(3)爭議處理機構將評議書及卷證送請該機構事務所所在地之管轄法院核可(4)評議書經法院核可後，與民事確定判決有同一效力", "2", "(2)金融服務業已依評議成立內容完全履行者，免送請法院核可。"], ["法規", "第四章", 281, "依消保法規定，企業經營者與消費者訂立定型化契約前，應提供多久之合理期間以審閱全部條款？(1)10日內(2)7日內(3)15日內(4)30日內。", "4", "企業經營者與消費者訂立之一般消費之定型化契約，應提供消費者 30日內的合理期間，以審閱全部條款。"], ["法規", "第四章", 282, "下列何者應致力充實消費資訊提供消費者運用，俾能採取正確合理之消費行為，以維護其安全與權益(1)政府(2)企業經營者(3)消費者(4)以上皆是。", "4", "政府、企業經營者及消費者均應致力充實消費資訊。"], ["法規", "第四章", 283, "依消保法規定，定型化契約條款內容違反誠信原則，對消費者顯失公平者，應為(1)得撤銷(2)視為無記載(3)無效(4)有利於消費者解釋。", "3", "消費者保護法第 12條：定型化契約中之條款違反誠信原則，對消費者顯失公平者，無效。"], ["法規", "第四章", 284, "以下何者為金融消費評議中心之任務？A處理所有與金融消費有關之民事爭議；B辦理金融服務業及金融消費者之教育宣導；C 始金融服務業及消費者均能充分了解彼此權利義務；D受理各種型態之消費申訴(1)ABCD(2)AD(3)ABC(4)BC。", "3", "該中心主要業務包括：處裡所有與金融消費有關之爭議案件，及辦理對金融服務業及金融消費者之教育宣導，使金融服務業與金融消費者均能充分了解正確之金融消費觀念及金融消費關係之權利與義務，以有效預防金融消費爭議發生。"], ["法規", "第四章", 285, "有關金融機構確認客戶身分程序之敘述何者錯誤？(1)應以風險為基礎(2)留存確認客戶身分之程序資料，應自業務開始時起至少保存五年(3)審查範圍擴及實質受益人(4)臨時交易者留存確認程序之資料，應自臨時性交易終止時起至少保存五年。", "2", "(2)留存確認客戶身分之程序資料，應自業務關係終止時起至少保存五年。"], ["法規", "第四章", 286, "基於保護金融消費者之目的，下列何種情況需要在銷售過程中以錄音或錄影的方式保留紀錄？(1)銷售投資型保險商品予屆齡退休之客戶(2)銷售含解約金的商品予60歲以上之客戶(3)銷售複雜性高風險商品予 40 歲以上之客戶(4)以上皆非。", "3", "金融服務業提供之金融商品屬於複雜性高風險商品者，前開說明及接露除以非臨櫃之自動化通路交易或金融消費者不予同意情形外，應錄音或錄影。"], ["法規", "第四章", 287, "下列有關金融消費爭議處理之敘述何者錯誤？(1)消費者在評議成立後，得於不變期間內申請爭議處理機構將評議書送法院核可(2)金融服務業即使已依評議內容履行，爭議處理機構仍應將評議書送法院核可(3)評議書經法院核可後，與民事確定判決有同一效力(4)爭議處理機構應於受理申請之日起5日內，將評議書及卷證送請爭議處理機構事務所所在地之管轄地方法院核可。", "2", "爭議處理機構送請法院核可前，金融服務業已依評議成立內容完全履行者，免送請核可。"], ["法規", "第四章", 288, "除人身保險公司外，哪些單位於推出具有保單價值準備金之新產品或提供與金錢有關之服務前須進行洗錢及資恐風險評估？A個人執業保險經紀人；B專業再保險公司；C 保險代理人公司；D財產保險公司(1)ABCD(2)ABC(3)BD(4)BCD。", "1", "請參閱洗錢防制法適用之金融機構。"], ["法規", "第四章", 289, "依據住院醫療費用保險單示範條款規定，被保險人出院後幾日內於同一醫院再次住院時，視為一次住院辦理(1)30(2)15(3)10(4)14日。", "4", "同一疾病或傷害或因此引發之併發症，被保險人出院後 14日內於同一醫院再次住院時，視為一次住院辦理。"], ["法規", "第四章", 290, "傷害保險因同一意外傷害事故致成失能後身故的保險給付(1)失能及身故保險金的給付合計最高以保險金額為限(2)身故保險金最高以保險金額為限，失能保險金沒有限制(3)失能保險金最高以保險金額為限，身故保險金沒有限制(4)失能或身故保險金的給付分別最高以保險金額為限。", "1", "傷害保險因同一意外傷害事故致成失能後身故的保險給付，失能及身故保險金的給付總金額合計最高以保險金額為限。"], ["法規", "第四章", 291, "金融服務業違反金消法致消費者受有損害，何者錯誤？(1)金融服務業故意所致之損害，法院得依消費者請求依侵害情節酌定損害額三倍以上之懲罰性賠償(2)消費者依金消法求償時，無須舉證金融機構的過失(3)金融服務業過失所致之損害，法院得酌定損害額一倍以下之懲罰性賠償(4)金融服務業如能舉證損害發生原因非因其未說明或說明不實所致者，免負賠償責任。", "1", "(1)金融服務業故意所致之損害，法院得依消費者請求依侵害情節酌定損害額三倍以下之懲罰性賠償。"], ["法規", "第四章", 292, "依洗錢防制法規定金融機構對於一定金額以上通貨交易，應確認客戶身分及留存客戶之交易紀錄，並向指定機構申報所稱一定金額，係指新台幣(1)二百萬(2)一百萬(3)五十萬(4)二百五十萬 以上。", "3", "大額通貨交易之通報：金融機構或人員對於達新台幣50 萬元以上(或等值外幣)之通貨交易(現今收復或換鈔交易)，應向法務部調查局申報。"], ["法規", "第四章", 293, "下列何者有誤？(1)金融服務業刊登廣告不得有虛偽或其他足致他人誤信(2)金融服務業對金融消費者所提示之資料或說明，應確保內容真實(3)金融服務業對金融消費者所負擔之義務不得低於廣告內容(4)金融服務業得藉由金融教育宣導方式，對消費者引薦個別金融商品或服務。", "4", "金融服務業從事相關銷售活動時應遵循之原則，其一為不得藉金融教育宣導，引薦個別金融商品或服務。"], ["法規", "第四章", 294, "下列何者為洗錢防制法適用之非金融事業或人員？A會計師；B地政士；C 銀樓業；D不動產經紀業(1)BCD(2)ABCD(3)CD(4)ABC。", "2", "非金融機構或人員：銀樓業、地政士、不動產經紀業從事與不動產買賣交易有關行為；律師、公證人、會計師為客戶準備或進行特定交易時；信託及公司服務提供業、其他業務特性或交易型態易為洗錢犯罪利用之事業或從業人員。"], ["法規", "第四章", 295, "業務員於洗錢防治上應留意客戶異常行為並協助申報，何者屬於異常交易？A 大額保費非要保人或其他利害關係人支付，且無法提出合理說明；B客戶要求開立禁止背書轉讓支票，達特定金額且無法提出合理說明；C 躉繳大額保費後，短期內申請大額保單借款或終止契約，且無法提", "4", "B客戶要求開立取消禁止背書轉讓支票，達特定金額且無法提出合理說明。"], ["法規", "第四章", 296, "A騎樓下的信用卡推廣；B便利商店的購物型錄；C 逐戶拜訪的羊奶推銷；D電話行銷醫療險；E信箱中的購物傳單，請問上述行銷方式哪些為消保法中的訪問交易(1)BE(2)ACD(3)BD(4)AC。", "4", "通訊交易：B便利商店的購物型錄；D電話行銷醫療險；E信箱中的購物傳單訪問交易：A騎樓下的信用卡推廣；C 逐戶拜訪的羊奶推銷"], ["法規", "第四章", 297, "蒐集準保戶的資料，不包括(1)過去的違法紀錄(2)嗜好(3)家屬姓名、年齡(4)職業、地位。", "1", "特種資料定義：有關病例、醫療、基因、性生活、健康檢查及犯罪前科之個人資料，不得蒐集、處理或利用。"], ["法規", "第四章", 298, "下列何者應致力充實消費資訊提供消費者運用，俾能採取正確合理之消費行為，以維護其安全與權益？(1)企業經營者(2)消費者(3)政府(4)以上皆是。", "4", "立法目的，主要是為保護消費者的權益。"], ["法規", "第四章", 299, "業務員因銷售保險商品逕向要保人所蒐集之資料，下列敘述何者正確？(1)若依法律規定得免告知者，得免為告知(2)法律雖有規定但基於保護消費者，皆需為告知，不得免除(3)不需告知要保人使用目的(4)屬公務機關之資料蒐集。", "1", "非公務機關蒐集個人資料之告知，有以下情況之一者，得免為前開告知：1.依法律規定得免為告知。2.個人資料之蒐集係公務機關執行法定職務或非公務機關履行法定義務所必要。3.告知將妨害公務機關執行法定義務。4.告知將妨害公共利益。5.當事人明知應告知之內容。6.個人資料之蒐集非基於營利之目的，且當事人顯無不利之影響。"], ["法規", "第四章", 300, "保戶填寫要保書聲明同意保險人依個資法取得相關資料，即符合非公務機關於蒐集個資時，除符合特定目的外，亦符合 A法律明文規定；B 與當事人有契約關係且已採取適當安全措施；C 經當事人同意；D為增進公共利益所必要(1)AB(2)AD(3)ABCD(4)BC。", "3", "非公務機關蒐集個人資料時，除須符合特定目的外尚須具下列情形：1.法律明文規定 2.與當事人有契約關係且已採取適當安全措施 3.當事人自行公開或其他已合法公開之個人資料 4.學術研究機構基於公共利益為統計或學"], ["法規", "第四章", 301, "金融消費評議中心受理消費者申訴後，會先將案件移交受申訴之金融服務業處理，金融服務業應於收到申訴之日起(1)30(2)60(3)10 日(4)15日 內為適當之處理，並將處理結果回覆消費者。", "1", "金融消費評議中心受理消費者申訴後，會先將案件移交受申訴之金融服務業處理，金融服務業應於收到申訴之日起 30日內為適當之處理，並將處理結果回覆消費者。"], ["法規", "第四章", 302, "保險業應切實確認保險身品之相關佣金、獎金及營業費用不應超過(1)責任準備金(2)所收總保費(3)附加費用(4)保單價值準備金，而有費差損情事。", "3", "金融消費者保護法，訂定業務人員酬金制度：酬金制度須報董事會通過、佣金獎金不超過附加費用。"], ["法規", "第四章", 303, "人身保險的行銷通路中下列何者非屬於消費者保護法下的通訊交易？(1)電話行銷(2)DM 行銷(3)業務員行銷(4)電視行銷。", "3", "業務員行銷是訪問交易。"], ["法規", "第四章", 304, "何者屬於金融服務業公平待客原則之指標？A業務人員專業性原則；B廣告招攬真實原則；C 申訴優先處理原則；D商品或服務適合度原則；E酬金與業績衡平原則(1)ABD (2)ABCDE (3)BCD (4)ABDE。", "4", "金融服務業公平待客原則之指標：訂約公平誠信原則、注意與忠實義務原則、廣告招攬真實原則、商品或服務適合度原則、告知與揭露原則、複雜性高風險商品原則、酬金與業績衡平原則、申訴保障原則、業務人員專業性原則。"], ["法規", "第四章", 305, "下列之金融機構何者適用洗錢防制法？A證券商；B保險公司；C 信用卡公司；D郵政機構 (1)ABCD (2)AB (3)BD (4)BCD。", "1", "洗錢防制法金融機構包括：銀行、信用合作社、辦理儲金匯兌之郵政機構、票券金融公司、信用卡公司及信託業、證券商、證券投資信託事業、證券金融事業、證券投資顧問事業、證券集中保管事業、期貨商、保險公司、專業再保險公司及辦理簡易人壽保險業務之郵政機構、電子票證發行機構、電子支付機構、槓桿交易商、期貨信託事業、期貨經理"], ["法規", "第四章", 306, "主管機關為落實對於金融消費者保護的重視 ，要求金融服務業應把公平待客原則納入教育訓練課程，每年對於在職人員至少進行(1)10(2)3(3)12(4)5 小時 的公平待客教育訓練。", "2", "主管機關要求金融服務業應把公平待客原則納入教育訓練課程，每年對於在職人員至少進行 3小時的公平待客教育訓練。"], ["法規", "第四章", 307, "依金消法規定，金融服務業包括 A期貨業；B保險業；C 證券交易所；D證券集中保管事業 (1)AB(2)ABCD(3)BCD(4)ABC。", "1", "金融服務業包括：銀行業、證券業、期貨業、保險業、電子支付業及其他經主管機關公告之金融服務業；但不包括證交所、櫃買中心、集保事業、期交所及其他經主管機關公告之事業等。"], ["法規", "第四章", 308, "定型化契約條款若牴觸個別磋商條款之約定時，(1)該定型化契約條款全部無效(2)該定型化契約條款全部有效(3)該定型化契約條款牴觸部分無效(4)以上皆非。", "3", "定型化契約條款若牴觸個別磋商條款之約定者，其牴觸者部分無效。"], ["法規", "第四章", 309, "金消法規定之金融消費爭議係指辦理金融消費者與金融服務業間，因商品或服務所生之(1)行政爭議(2)民事爭議(3)刑事爭議(4)以上皆可，屬於金融消費爭議的適用範圍。", "2", "金融消費爭議定義：指金融消費者與金融服務業間因商品或服務所生之民事爭議，但不包括行政或刑事爭議的案件。"], ["法規", "第四章", 310, "依據金消法規定，金融消費者係指接受金融服務業提供金融商品或服務，但不包含 A專業投資機構；B符合一定財力之自然人；C 一般消費者；D專業能力之自然人 (1)AD(2)ABCD(3)BCD(4)ABD。", "4", "金融消費者指接受金融服務業提供金融商品或服務者。但不包括下列對象：專業投資機構、符合一定財力或專業能力之自然人或法人。"], ["法規", "第四章", 311, "洗錢防制法適用之金融機構，下列何者為非？(1)銀樓業(2)漁會信用部(3)證券投資顧問事業(4)全國農業金庫。", "1", "洗錢防制法非金融機構或人員：銀樓業；地政士及不動產經紀業從事與不動產買賣交易有關之行為；律師、公證人、會計師為客戶準備或進行特定交易時；信託及公司服務提供業為客戶準備或進行特定交易時；其他業務特性或交易型態易為洗錢犯罪利用之事業或從業人員。"], ["法規", "第四章", 312, "為保護金融消費者，金融服務業依據金消法規定訂定業務人員酬金制度並提報(1)股東大會(2)董(理)事會(3)主管機關(4)業務員代表大會 通過。", "2", "為保護金融消費者，金融服務業應訂定業務人員酬金制度並提報董(理)事會通過。"], ["法規", "第四章", 313, "金融機構自發現疑似洗錢或資恐交易日起(1)5個營業日(2)一個月(3)15個營業日(4)10個營業日 內，依申報格式簽報專責主管核定後立即申報。", "4", "不論金額多寡，只要符合洗錢表徵，應疑似洗錢或資恐交易之日 10個營業日內，向法務部調查局申報。"], ["法規", "第四章", 314, "保險業於有攸關消費大眾權益之重大訊息發生時，應於(1)5(2)7(3)10(4)2 日內以書面向主管機關報告，並主動公開說明。", "4", "消費大眾權益之重大訊息發生時應以 2日內以書面向主管機關報告，並主動公開說明。"], ["法規", "第四章", 315, "保險契約內容由保險公司決定，基於衡平原則，有何補救措施？(1)要保人可解除契約(2)契約條款內容要保人可要求法院公證(3)契約條款有疑義時，應做有利被保險人解釋(4)契約條款有疑義時，應由保險人斟酌實際情況決定。", "3", "根據消保法 11條：「定型化契約條款如有疑義，應為有利於消費者之解釋」。"], ["法規", "第四章", 316, "依保險法實施細則規定，人身保險業以計算保險契約簽單保險費之利率及危險發生率為基礎，並依主管機關規定方式計算之金額為(1)責任準備金(2)賠款準備金(3)保單價值準備金(4)解約金。", "3", "保單價值準備金以簽單保險費之利率及危險發生率為基礎。"], ["法規", "第五章", 317, "有關人身保險業務員資格測驗之敘述何者錯誤？(1)成年以上大陸地區配偶領有長期居留證且具有高中以上同等學歷者，得報名參加(2)曾受保險業務員管理規則第13條撤銷登錄者，可立即重新報名參加(3)曾受保險業務員管理規則第19條撤銷登錄者，可立即重新報名參加(4)以上皆非", "4", "曾受保險業務員管理規則第 13及19 條撤銷登錄者，需報名人身保險業務員資格測驗通過後，始得登錄。"], ["法規", "第五章", 318, "保險經紀人係基於(1)承保的保險業(2)保險人及被保險人(3)被保險人(4)要保人之利益，代向保險公司洽訂保險契約或提供服務而收取佣金之人。", "3", "保險經紀人係基於被保險人之利益，代向保險公司洽訂保險契約或提供服務而向保險公司收取佣金之人"], ["法規", "第五章", 319, "業務員參加外部共同法令遵循 6小時訓練課程，何者正確？(1)凡業務員資格測驗合格者，不論登錄與否皆須遵守該規定(2)該課程嚴禁冒名上課及測驗，違反業務員及代上課者皆予以撤銷登錄(3)由保險事業發展中心製作數位課程供業務員線上學習(4)以上皆是。", "3", "依據人身保險業務員教育訓練要點第 2條：法令遵循課程由財團法人保險事業發展中心（以下簡稱保發中心）製作， 以數位課程為主"], ["法規", "第五章", 320, "業務員應於登錄後，檢附參加所屬公司教育訓練合格證明(1)每4 年(2)每5年(3)每年(4)每3年 ，向所屬公司辦理換發登錄證手續。", "2", "依據人身保險業務員教育訓練通報暨換證作業規範第7 條：人身保險業務員每五年，完成規定之教育訓練課程及時數，並檢附原登錄證向所屬公司申請換證。故答案選擇(2)"], ["法規", "第五章", 321, "何種情況不得登錄為壽險業務員?A申請登錄文件有虛偽記載；B壽險受有停止招攬處分尚未期滿；C 產險受有停止招攬處分尚未期滿；D受破產宣告尚未復權(1)ACD (2)ABCD (3)ABD (4)BCD", "3", "依照保險業務員管理規則第 7條：二、申請登錄之文件有虛偽之記載者。六、受破產之宣告，尚未復權者。八、依第十九條規定在受經營同類保險業務之保險業、保險代理人公司、保險經紀人公司或銀行停止招攬行為期限內者。C 產險非屬於同類保險業務。"], ["法規", "第五章", 322, "業務員何時須先辦理再登錄始得招攬？A受處分公司依管理規則第 19 條第1項停止招攬處分期間屆滿後；B受處分公司撤銷登錄後；C 從原公司辦理註銷登錄後轉任其他公司時；D取得投資型測驗合格後欲招攬投資型保險商品時(1)ABD(2)AC(3)ABC(4)ACD。", "2", "再登錄：指 1.業務員經註銷登錄後，轉任其他公司或離職再任職原所屬公司，重新辦理登錄者；2.受經營同類保險業務之停止招攬處分期間屆滿後，重新辦理登錄者。"], ["法規", "第五章", 323, "想成為壽險業務員需登錄至 A一般壽險公司；B保險代理人公司或保險經紀人公司；C 兼營保險經紀人或保險代理人業務之銀行；D壽險公會(1)BCD(2)ABC(3)ABCD(4)ABD", "2", "想成為壽險業務員需登錄至一般壽險公司或保險代理人公司或保險經紀人公司或兼營保險經紀人或保險代理人業務之銀行。"], ["法規", "第五章", 324, "甲現為產險經紀人公司之業務員，取得人身保險業務員資格後 (1)需先辦理產險註銷登錄後使得登錄壽險(2)得無條件登錄於另一家壽險經紀人公司(3)得無條件登錄於另一家壽險公司或人身保險代理人公司(4)以上皆非。", "2", "產險經紀人公司之業務員，取得人身保險業務員資格後得無條件登錄於另一家壽險經紀人公司。"], ["法規", "第五章", 325, "業務員曾受保險業務員管理規則第 13條撤銷登錄者，應於撤銷後(1)重新參加業務員資格測驗合格(2)重新參加教育訓練(3)重新辦理登錄領取新的登錄證即可(4)選項1或 2 皆可 使得登錄。", "1", "業務員曾受保險業務員管理規則第 13 條撤銷登錄者，應於撤銷後重新參加業務員資格測驗合格。"], ["法規", "第五章", 326, "領有財產保險經紀人執業證照之保險經紀人，其業務員(1)僅得再登錄於另一家非經營同類保險業務之保險經紀人公司(2)完全不得再登錄於其他公司(3)僅得再登錄於另一家非經營同類保險業務之保險代理人公司(4)得再登錄於另一家財產保險公司。", "1", "領有財產保險經紀人執業證照之保險經紀人，其業務員僅得再登錄於另一家非經營同類保險業務之保險經紀人公司。"], ["法規", "第五章", 327, "傷害保險失能給付保險金，按失能程度原分為 11級79 項，經參考勞工保險及強制車險失能給付標準新增(1)鼻部缺損，致其機能永久遺存顯著障害(2)鼻未缺損，而鼻機能暫時喪失遺存顯著障礙(3)鼻部缺損，致其機能暫時喪失(4)鼻未缺損，而鼻機能永久遺存顯著障害 為80 項。", "4", "傷害保險失能給付保險金，按失能程度原分為 11級79 項，經參考勞工保險及強制車險失能給付標準新增鼻未缺損，而鼻機能永久遺存顯著障害為80項。"], ["法規", "第五章", 328, "業務員曾受第19條撤銷登錄處分者，應於撤銷期滿(1)重新參加業務員資格測驗合格(2)重新參加教育訓練(3)重新辦理登錄領取新的登錄證即可(4)選項1或2皆可 使得登錄。", "1", "業務員曾受第 19條撤銷登錄處分者，應於撤銷期滿重新參加業務員資格測驗合格始得登錄。"], ["法規", "第五章", 329, "下列何者具備保險業務員之資格(1)小張今年19 歲，剛從高職畢業，想參加壽險公會舉辦之人身保險業務員資格測驗(2)小陶向主管機關繳銷已領有之保險經紀人執業證書(3)老王今年35 歲，之前因犯詐欺罪被判緩刑，去年12月已緩刑期滿(4)小張、老王和小陶皆具備保險業務員資格。", "2", "(1)須成年且有行為能力(3)不得為受徒刑處分完畢或執行完畢、緩刑期滿或經赦免後未滿 3年者。"], ["法規", "第五章", 330, "招攬投資型保險商品業務員自完成投資型保險商品變更登錄日起應為之行為，下列何者為非？(1)業務員應參加所屬公司基金相關課程並通過課後測驗(2)測驗合格者須由所屬公司通報壽險公會備查(3)有關基金相關課程訓練時數每3年應完成 9小時(4)其中法規訓練時數至少 2小時。", "3", "(3)該課程訓練每 3年完成6小時，其中法規至少 2小時。"], ["法規", "第五章", 331, "主管機關規定凡保戶因不實之文宣、廣告而投保，之後產生疑義擬退保時，保險公司應(1)以和解金退還(2)至少加計利息退還當年度保險費(3)至少退還所繳全部保險費(4)至少加計利息退還所繳全部保險費。", "4", "凡保戶因不實之文宣、廣告而投保，嗣後產生疑義擬退保時，保險公司至少應加計利息退還所繳全部保險費。"], ["法規", "第五章", 332, "(1)教育訓練制度(2)登錄制度(3)審查制度(4)獎懲制度 係為各所屬公司加強對業務員管理，以謀保險業健全發展，業務員須依規定辦理始得招攬。", "2", "登錄制度之採行係為各所屬公司加強對業務員管理，以謀保險業健全發展，業務員須依規定辦理始得招攬。"], ["法規", "第五章", 333, "受停止招攬或撤銷登錄處分之業務員，對原處分公司之復查結果有異議，得於接獲受復查結果之日起三個月內以書面具名理由向何單位申請覆核？(1)所屬公司(2)主管機關(3)各有關公會組成之申訴委員會(4)金融消費評議中心。", "3", "業務員對原處分公司復查結果有異議者，得於收到復查結果之起三個月內以書面具明理由向各有關公會之申訴委員會申請覆核，並以一次為限。"], ["法規", "第五章", 334, "保險經紀人公司之業務員，可同時登錄於另一家非經營同類保險業務之(1)保險經紀人公司(2)保險公司(3)保險代理人公司(4)選項 1或3 皆可。", "1", "業務員經所屬公司同意，並取得相關資格後，保險業、保險代理人公司之業務員得登錄於另一家非經營同類保險業務之保險業或保險代理人公司。"], ["法規", "第五章", 335, "依「人身保險業務員教育訓練通報暨換證作業規範」規定，業務員教育訓練年度計算係以(1)註銷登錄(2)停職登錄(3)再登錄(4)初次登錄 日期為準。", "4", "訓練年度之計算，以業務員初次辦理登錄日期為準。"], ["法規", "第五章", 336, "何者為保險業務員應有之行為？(1)已通過投資型保險測驗合格尚未完成變更登錄及招攬投資型保險商品(2)自製強調保費預定利率之招攬文宣(3)於招攬之要保書上親自簽名並記載登錄字號(4)提醒保戶商品即將停售之訊息。", "3", "(1)已通過投資型保險測驗合格且向公會辦理變更登錄，取得資格後始可招攬投資型保險商品(2)(4)保險業務員管理規則第 19條：業務員為對要保人、被保險人或第三人以誇大不實之宣傳、廣告或其他不當方法招攬，予以一年以下停止招攬。"], ["法規", "第五章", 337, "參加人身保險業務員資格測驗，除年齡及學歷限制外，應具有何種身分報名？A台灣地區居留證；B外僑永久居留證；C 大陸地區配偶領有長期居留證；D港澳居民居留入出境證(1)BCD(2)CD(3)ABC(4)BC。", "3", "參加業務員測驗資格須成年且領有永久或是長期居留證。"], ["法規", "第五章", 338, "甲經醫生診斷已罹患肝癌，經乙業務員招攬投保防癌保險，投保時甲與乙共同隱瞞癌症之事實，甲於投保 1年6個月後死亡，甲之家屬向保險公司申請理賠時始發現事實，其中業務員乙之行為觸犯了？A 侵占行為；B背信行為；C 詐欺行為；D偽造文書行為(1)僅構成 B、C(2)僅構成A、D(3)僅構成C、D(4)僅構成A、B。", "1", "背信行為：刑法第 342條「為他人處理事務，意圖為自己或第三人不法之利益，或損害本人之利益，而違背其任務之行為，致生損害於本人之財產或其他利益者…」詐欺行為：刑法第 339條「意圖為自己或第三人不法之所有，以詐術使人將本人或第三人之物交付者…」。"], ["法規", "第五章", 339, "業務員以不同保險契約作不當之比較，可以予多久停止招攬行為的懲處?(1)一個月以上三個月以下(2)三個月以上六個月以下(3)三個月以上九個月以下(4)一年以下。", "4", "停止招攬：一年以下。"], ["法規", "第五章", 340, "業務員受停止招攬行為處分向原所屬公司繳銷登錄證者，是指(1)變更登錄(2)停止招攬登錄(3)註銷登錄(4)撤銷登錄。", "2", "業務員受停止招攬行為處分向原所屬公司繳銷登錄證者，是指停止招攬登錄。"], ["法規", "第五章", 341, "保險業務員於處理事務時，有可能因為一些特定的利益而違背其應盡之義務，而造成保險公司的損害，這時就可能觸犯了刑法上的(1)偽造文書(2)詐欺(3)侵占行為(4)背信。", "4", "背信行為判斷方式為，在明知公司規定的前提下，做出違反公司規定的行為。"], ["法規", "第五章", 342, "業務員未完成教育訓練，所屬公司及業務員應如何辦理？A公司應辦理註銷登錄；B公司應請其 1 年内補訓，如仍未完成者則辦理撤銷登錄；C 業務員經撤銷登錄後需重新通過資格測驗才能申請登錄；D業務員於懲處滿1年後，需重新通過資格測驗才能申請登錄(1)BD(2)AD(3)BC(4)AC。", "3", "A公司應辦理撤銷登錄；D業務員於五年內懲處累積2 年者將撤銷(懲處指停招)，需重新通過資格測驗才能申請登錄。"], ["法規", "第五章", 343, "業務員因離職、轉任而異動時，所屬公司應向壽險公會申報(1)註銷登錄(2)停止招攬登錄(3)變更登錄(4)撤銷登錄。", "1", "業務員因離職、轉任而異動時，所屬公司應向壽險公會申報註銷登錄。"], ["法規", "第五章", 344, "壽險業務員招攬時須出示登錄證，該登錄證由哪個單位製發(1)各登錄單位(2)壽險公會(3)登錄證即測驗合格證，由辦理測驗單位製發(4)以上皆非。", "1", "壽險業務員招攬時須出示登錄證，該登錄證由各登錄單位製發。"], ["法規", "第五章", 345, "各所屬公司對於業務員予以停止招攬行為或撤銷登錄時，應 A通知業務員本人；B通知主管機關；C 通知各有關公會；D刊登公報(1)AC(2)ABC(3)BC(4)ABCD。", "1", "各所屬公司對於業務員予以停止招攬行為或撤銷登錄時，應通知業務員本人及通知各有關公會。"], ["法規", "第五章", 346, "申請登錄之業務員若曾受偽造文書、侵占、詐欺、背信等徒刑處分執行完畢或經赦免未滿(1)三年(2)二年(3)五年(4)一年 者，不得申請登錄為業務員。", "1", "徒刑處分完畢、緩刑期滿或經赦免後未滿三年；組織犯罪五年。"], ["法規", "第五章", 347, "業務員招攬利率變動型年金保險前應完成哪些程序始得招攬？A參加公司至少3小時課程；B訓練完成後應測驗合格；C 合格成績報壽險公會備查；D合格成績存放公司備查(1)AB(2)ABC(3)BCD(4)ABD。", "2", "D受訓證明存放公司備查。"], ["法規", "第五章", 348, "有關銷售外幣收付非投資型保險商品應具備之資格及訓練，何者錯誤？(1)應參加匯率風險及外匯相關法規之教育訓練(2)銷售該商品之業務員須通過壽險公會舉辦之特別測驗並完成資格登錄(3)非登錄中業務員得報考該項特別測驗再完成資格登錄(4)訓練時數最少5小時。", "3", "(3)需登錄中業務員才能報考外幣測驗"], ["法規", "第五章", 349, "參加保險業務員資格測驗者之學歷至少為何？(1)國小以上學校畢業或同等學歷(2)國中以上學校畢業或同等學歷(3)高中以上學校畢業或同等學歷(4)大學以上學校畢業或同等學歷。", "3", "保險業務員資格測驗者之學歷規範：成年且具有高中職以上學校畢業或同等學歷。"], ["法規", "第五章", 350, "保戶委請業務員代為繳納保險費，當業務員拿到保險費後，因手頭不方便先拿去使用，2天後再將保險費繳回保險公司，其行為已涉及 A偽造文書行為；B詐欺行為；C 侵佔行為；D背信行為 (1)AB(2)CD(3)BC(4)BD。", "2", "背信：為他人處理事務，因其違背任務行為，導致利益損害；侵占：不法佔有他人之物。"], ["法規", "第五章", 351, "依保險法第八條之一規定，所謂保險業務員係指為下列之何者從事保險招攬之人？A保險業；B 保險經紀人公司；C 保險代理人公司；D兼營保險經紀人業務之銀行 (1) A (2)AB (3)ABC (4)ABCD。", "4", "依保險法第八條之一規定，所謂保險業務員係指保險業、保險經紀人公司、保險代理人公司或兼營保險代理人或保險經紀人業務之銀行，從事保險招攬之人。"], ["法規", "第五章", 352, "下列何者正確？A取得業務員資格即可招攬保險；B業務員之招攬行為僅應受所屬公司之獎懲辦法規範；C 業務員違規情事若有犯罪嫌疑，應移送法辦；D業務員有違反管理規則之情事，所屬公司應予以停止招攬登錄或撤銷登錄 (1)CD(2)ABCD(3)BD(4)BCD。", "1", "A須完成登錄程序；B 須受到保險業務員管理規則/刑法/個資法等相關法令規範。"], ["法規", "第五章", 353, "業務員於登錄後應於(1)每3年(2)每年(3)每5年(4)每4 年 完成規定之教育訓練課程及時數，並於期滿前辦妥換發登錄證手續。", "2", "業務員於登錄後每年參加所屬公司辦理之教育訓練。"], ["法規", "第五章", 354, "壽險公司現職業務員 (1)不可以 (2)領有經紀人資格證書才可以 (3)公司同意時才可以 (4)符合登錄資格就可以 申請保險經紀人執業證書。", "1", "業務員消極資格：不得為登錄二家經營同類保險業務之保險業者。"], ["法規", "第五章", 355, "業務員不參加所屬公司所舉辦之教育訓練者，所屬公司應為其辦理(1)註銷登錄(2)撤銷登錄(3)警告登錄(4)停止招攬登錄。", "2", "業務員不參加所屬公司所舉辦之教育訓練者，所屬公司應為其辦理撤銷登錄。"], ["法規", "第五章", 356, "保險公司對業務員的管理，下列何者為非？(1)業務員與公司間之勞務契約依民法及相關法令規定(2)出勤行為應依業務員與保險公司之勞務契約規定(3)業務員之所有行為皆應依保險業務員管理規則(4)招攬行為之管理應依保險業務員管理規則 辦理。", "3", "業務員之行為，除應依保險業務員管理規則辦理，還應依業務員所屬公司簽訂之勞務契約，依民法及相關法令規定辦理。"], ["法規", "第五章", 357, "依「人身保險業務員教育訓練通報暨換證作業規範」規定，業務員因註銷、停止招攬行為、撤銷等異動後，再辦理登錄，其間隔期間在(1)三年(2)一年(3)二年(4)四年 以上者，其教育訓練年度應重新計算。", "2", "依「人身保險業務員教育訓練通報暨換證作業規範」第 5條第2項：領有第一年至第五年度登錄證之業務員因註銷或停止招攬等異動，再登錄間隔期間超過一年以上者，其教育訓練年度之計算，以再登錄日期為準重新計算。"], ["法規", "第五章", 358, "業務員轉任其他保險公司時，依業務員管理規則規定，應(1)先重新參加業務員資格測驗(2)由所屬公司辦理變更登錄(3)通過所屬公司辦理一定課程之在職教育訓練始得依規定重新登錄(4)由所屬公司辦理重新登錄。", "4", "(1)不須重新參加資格測驗(2)由所屬公司辦理註銷登錄(3)可直接依規定重新登錄。"], ["法規", "第五章", 359, "業務員登錄後第二至第五年之教育訓練課程依規定，每年至少應有(1)30(2)15(3)12(4)16 小時之訓練。", "3", "第二至五年度共12種課程12小時之訓練。"], ["法規", "第五章", 360, "業務員不服受停止招攬登錄、撤銷登錄處分，得於受處分之通知到達之日起(1)一年(2)三年(3)三個月(4)一個月 內，向原處分公司提出申復。", "4", "業務員不服受停止招攬登錄、撤銷登錄處分，得於受處分之通知到達之日起一個月內，以書面具名理由向原處分公司提出申復。"], ["法規", "第五章", 361, "業務員收取要保人所繳納之現金保險費後，而再以自己或他人之信用卡刷卡繳交之行為，下列何者正確？A屬挪用保費之情事；B已符合侵佔罪的構成要件；C 所屬公司應依保險業務員管理規則第 19 條第 1 項規定予以懲處登錄；D所屬公司應逕予註銷登錄(1)ABCD(2)ABD(3)BC(4)ABC。", "4", "D應為停止招攬登錄。"], ["法規", "第五章", 362, "有關保險代理人、經紀人之敘述何者正確？(1)保險代理人、經紀人皆須投保責任保險及保證保險，始得經營業務(2)兼有保險代理人、經紀人資格者，均得申領執業證照(3)保險代理人公司、經紀人公司非加入商業同業公會不得營業(4)銀行經主管機關許可得同時兼營保險代理人及經紀人業務。", "3", "(1)保險代理人須投保責任保險；保險經紀人須投保責任保險及保證保險，使得經營業務(2)兼有保險代理人、經紀人資格者，僅得擇一申領執業證照(4)銀行得經主管機關許可擇一兼營保險代理人或保險經紀人業務。"], ["法規", "第五章", 363, "李小姐現為某產險公司之業務員，於取得人身保險業務員資格後(1)得登錄於另一家壽險公司或人身保險代理人公司(2)僅得登錄於另一家壽險公司(3)得另登錄於另一家壽險公司及人身保險代理人公司(4)得登錄於另一家人身保險經紀人公司。", "1", "保險業、保險代理人公司、兼營保險代理人業務之銀行之業務員則可同時於另一家非經營同類保險業務之保險業或保險代理人業務之銀行登錄為產險及壽險業務員。"], ["法規", "第五章", 364, "小王同時為甲壽險公司及乙產險公司之業務員，代收甲公司保戶繳交之保險費後，因先挪用繳交自家之水電費，就該行為陳述何者為是？A甲公司應辦理撤銷登錄；B乙公司受甲公司通知後辦理註銷登錄；C 僅甲公司應辦理撤銷登錄，乙公司之登錄則不受限制；D 甲及乙公司皆應辦理撤銷登錄(1)A(2)D(3)AC(4)AB。", "4", "因在甲公司違法，故甲公司應辦理撤銷登錄，乙公司無違法則受甲公司通知後辦理註銷登錄。"], ["法規", "第五章", 365, "保險業務員於登錄有效期間內，受停止招攬行為處分期間累計達多久，應予以撤銷其業務員登錄處分？(1)五年(2)二年(3)三年(4)一年。", "2", "保險業務員於登錄有效期間內，受停止招攬行為處分期間累計達兩年，應予以撤銷其業務員登錄處分。"], ["法規", "第五章", 366, "申請登錄業務員曾犯組織犯罪防制條例規定之罪，經有罪判刑確定，尚未執行完畢或執行完畢、緩刑期滿或赦免後尚未逾(1)三年(2)二年(3)五年(4)一年 者，不得申請登錄。", "3", "曾犯組織犯罪防制條例規定之罪，經有罪判刑確定，尚未執行完畢或執行完畢、緩刑期滿或赦免後尚未逾 5年，不得申請登錄。"], ["法規", "附錄", 367, "傷害保險被保險人如失蹤應如何處理？(1)依戶籍資料所載失蹤日起滿一年仍未尋獲，保險人應先行給付保險金(2)要保人或受益人能提出證明足認被保險人極可能因承保事故致死者，保險人應先行給付保險金(3)保險人先行給付保險金後發現被保險人生還，要保人或受益人應歸還保險人已領之退還已繳保費或身故保險金或喪葬費用保險金(4)以上皆是。", "4", "以上皆為傷害保險被保險人失蹤之處理。"], ["法規", "附錄", 368, "住院醫療費用保險單示範條款，住院係指 A被保險人經醫師診斷其疾病必須入院；B被保險人經醫師診斷其傷害必須入院；C 須正式辦理住院手續並確實在醫院接受診療；D可於契約條款明訂包含精神衛生法第 35 條之日間留院(1)ABCD(2)ABC(3)ACD(4)AC。", "1", "住院醫療費用保險單示範條款，住院係指被保險人經醫師診斷其疾病或傷害必須入住醫院，且正式辦理住院手續並確實在醫院接受診療者，包含精神衛生法第 35條之日間留院。"], ["法規", "附錄", 369, "有關團體人壽保險，何者正確？(1)要保人因所屬人員大批離職致參加保險人數不足時，保險人得終止保險契約並按日數比例退還未滿期保費(2)因業務種類變更致危險顯著增加時，要保人應於知悉後兩週內通知保險人(3)保險人接到危險增加之通知 30 日內，得根據危險增加的程度要求增加保費或終止契約(4)以上皆是。", "4", "以上皆為團體人壽保險有關之敘述。"], ["法規", "附錄", 370, "下列何者有誤？(1)保險公證人係辦理保險標的查勘、鑑定及估價而予證明之人(2)保險法所定各種準備金包含責任準備金、未滿期保費準備金、賠款準備金及保單價值準備金(3)外國保險業係指依外國法律組織登記並經主管機關許可，在本國境內經營保險之機構(4)合夥人為被保險人，其中一人讓與保險利益於他人，契約不因之而失效。", "2", "保險法所定各種準備金，包括責任準備金、未滿期保費準備金、特別準備金、賠款準備金及其他經主管機關規定之準備金。"], ["法規", "附錄", 371, "保險業務員管理規則係由主管機關依保險法第 177條訂定，並於民國(1)81年10月15日(2)80 年4月15 日(3)82年4月15 日(4)83年10 月15日 起實施，自此保險業務員邁入一個新的里程碑。", "3", "保險業務員管理規則係由主管機關依保險法第 177條訂定，民國 81年10月15日發布「保險業務員管理規則」，並於民國 82年4月15 日起實施。"], ["法規", "附錄", 372, "下列何者非屬團體保險條款規定受益人請領身故保險金時應檢具之文件(1)被保險人之除戶戶籍謄本(2)受益人之身分證明(3)被保險人死亡證明書及保險金申請書(4)保險金申請書、受益人之戶籍謄本及印鑑證明。", "4", "團體保險條款規定受益人請領身故保險金時應檢具之文件有：被保險人死亡證明及除戶戶籍謄本、保險金申請書、受益人之身分證明。"], ["法規", "附錄", 373, "保險業依保險法第141 條提存保證金之敘述何者正確?(1)應按資本或基金實收總額20%繳存於國庫(2)應按資本或基金實收總額20%繳存於安定基金(3)應按資本或基金實收總額 15%繳存於安定基金(4)應按資本或基金實", "4", "保險業依保險法第 141條提存保證金，應按資本或基金實收總額 15%繳存於國庫。"], ["法規", "附錄", 374, "有關團體保險之敘述，何者正確？(1)契約涉訟時得排除小額訴訟管轄法院之適用(2)要保人於保單屆滿日的 2週前與保險人議定續保條件，續保的始期以原契約屆滿日的翌日零時為準(3)所謂團體係指具有 5 人以上且以購買保險而組織之團體(4)被保險人異動申請加保時，被保險人資格自異動發生日翌日零時起生效。", "2", "(1) 團體傷害保險單示範條款中第 31 條：不得排除消費者保護法第 47條及民事訴訟法第 436條之九小額訴訟管轄法院(3) 「團體」是指具有五人以上且非以購買保險而組織之下列之一(4) 第９條：要保人因所屬人員異動而申請加保時，應以書面通知本公司，自通知到達之翌日零時起開始生效，如通知起保日期在後，則自該起保日零時起生效。"], ["法規", "附錄", 375, "保險業不動產之投資，以所投資不動產即時利用並有收益者為限；其投資總額除自用不動產外，不得超過其資金(1)20(2)30(3)25(4)35 %。", "2", "保險法第 146-2條，保險業對不動產之投資，以所投資不動產即時利用並有收益者為限；其投資總額，除自用不動產外，不得超過其資金百分之三十。"], ["法規", "附錄", 376, "保險法第37條，要保人故意不為複保險之通知或意圖不當得利而為複保險者，其契約 (1)無效(2)失效(3)停效(4)解約。", "1", "複保險，除另有約定外，要保人應將他保險人之名稱及保險金額通知各保險人；要保人故意不為前條之通知或意圖不當得利而為複保險者，其契約無效。"], ["法規", "附錄", 377, "在個人傷害保險契約中，被保險人於本契約有效期間內，因遭受意外傷害事故，致其身體蒙受傷害，自傷害事故發生之日起幾日以內致成死亡者，保險公司仍負保險責任(1)360 日(2)30日(3)90日(4)180日。", "4", "被保險人於契約有效期間內，因遭受意外傷害事故致其身體蒙受傷害，自傷害事故發生之日起 180天內致成死亡/失能者，保險公司負保險責任。"], ["法規", "附錄", 378, "保險業辦理其他與保險有關業務，涉及外匯業務經營者，須經(1)金管會保險局(2)中央銀行(3)金管會銀行局(4)台灣銀行 許可。", "2", "保險業辦理其他與保險有關業務，涉及外匯業務經營者，須經中央銀行許可。"], ["法規", "附錄", 379, "要保人對同一保險利益、同一保險事故與數保險公司分別訂立數個保險契約稱為(1)再保險(2)合保(3)複保險(4)分保。", "3", "要保人對同一保險利益、同一保險事故與數保險公司分別訂立數個保險契約稱為複保險。"], ["法規", "附錄", 380, "依保險法規定，人身保險合作社之預定社員人數不得低於(1)800(2)1000(3)500(4)100 人。", "3", "財產合作社 300人，人身合作社500 人。"], ["法規", "附錄", 381, "保險業於受接管期間內，主管機關得限制 A新業務之承接；B受理有效契約變更；C 受理有效契約終止；D受理要保人以保險契約為質之借款(1)ABCD(2)A(3)ABD(4)BCD。", "1", "接管期間，主管機關得限制：新業務承接、有效保單變更或終止、保單借款、解約金。"], ["法規", "附錄", 382, "依保險法第 141 條規定，保險業應按資本或基金實收總額之多少比例，繳存保證金於國庫？(1)5%(2)10%(3)15%(4)20%。", "3", "依保險法第 141 條規定，保險業應按資本或基金實收總額之 15%，繳存保證金於國庫。"], ["法規", "附錄", 383, "有關人身保險契約之保險金信託規定，何者有誤？(1)保險業為該保險金信託之受託人(2)要保人須於訂立保險契約時，同時洽訂信託契約(3)僅要保人與被保險人為同一人之保險契約得洽訂信託契約(4)僅死亡保險金及失能保險金得洽定信託契約。", "2", "(2)要保人於保險事故發生前預先洽定信託契約。"], ["法規", "附錄", 384, "下列敘述何者正確？A保險合作社簽訂之保險契約，得為分紅或不分紅保單；B保險公司簽訂之保險契約，以參加保單紅利者為限；C 保單紅利計算基礎及方法應於保險契約中明定；D保險合作社簽訂之保險契約，以參加保單紅利者為限(1)ABC(2)AC(3)CD(4)BCD。", "3", "保險業通則 140條A保險合作社簽訂之保險契約，以參加保單紅利者為限；B保險公司得簽訂參加保單紅利之保險契約。"], ["法規", "附錄", 385, "下列何者不是團體保險條款規定被保險人請領失能保險金應檢具之文件(1)被保險人印鑑證明書(2)保險金申請書(3)受益人身分證明(4)失能診斷書。", "1", "受益人申領失能保險金，應檢具下列文件：保險金申請書、受益人之身分證件、失能診斷書，但必要時本公司得要求提供意外傷害事故證明文件。"], ["法規", "附錄", 386, "依保險法第146條之1 規定保險業資金購得金融債券、可轉讓定期存單，其總額不得超過該保險業資金百分之(1)三十(2)四十五(3)三十五(4)四十。", "3", "金融債券、可轉讓定期存單、銀行承兌匯票、金融機構保證商業本票，其總額不得超過該保險業資金百分之三十五。"], ["法規", "附錄", 387, "團體保險被保險人由於工作場所變更，致危險有顯著增加時，應於何時通知保險公司(1)要保人應於知悉後兩週內(2)被保險人應於兩週內(3)要保人應於一個月內(4)要保人應於契約週年時。", "1", "要保人或被保險人由於工作場所，設備，業務種類或其他變更，致危險有顯著增加時要保人應於知悉後兩週內通知保險公司。"], ["法規", "附錄", 388, "保險業自有資本與風險資本比率不得低於 200%，若保險業有資本嚴重不足，係指資本適足率低於(1)100%(2)150%(3)10%(4)50% 或淨值低於零。", "4", "保險業自有資本與風險資本比率不得低於200%，，其中資本嚴重不足，指資本適足率低於百分之五十或保險業淨值低於零。"], ["法規", "附錄", 389, "我國保險法規定，保險業於完納一切稅捐後，分派盈餘時，應先提存多少為法定盈餘公積？(1)5%(2)10%(3)15%(4)20% ，但法定盈餘公積已達其資本總額或基金總額時，不在此限。", "4", "保險業於完納一切稅捐後，分派盈餘時，應先提百分之二十為法定盈餘公積。"]];

<script id="data-script"></script>
<script>
// ===== APP LOGIC =====
let allQuestions = [];
let currentFilter = { section: '全部', chapter: '全部' };
let currentMode = 'quiz'; // quiz, study, wrong
let currentIndex = 0;
let answered = false;
let selectedOption = null;

// Progress tracking (in-memory)
let stats = { correct: 0, wrong: 0, total: 0 };
let wrongQuestions = new Set();
let correctQuestions = new Set();

function getQId(q) { return `${q[0]}-${q[1]}-${q[2]}`; }

function getFilteredQuestions() {
  let filtered = allQuestions;
  if (currentFilter.section !== '全部') {
    filtered = filtered.filter(q => q[0] === currentFilter.section);
  }
  if (currentFilter.chapter !== '全部') {
    filtered = filtered.filter(q => q[1] === currentFilter.chapter);
  }
  if (currentMode === 'wrong') {
    filtered = filtered.filter(q => wrongQuestions.has(getQId(q)));
  }
  return filtered;
}

function getChapters() {
  let qs = allQuestions;
  if (currentFilter.section !== '全部') {
    qs = qs.filter(q => q[0] === currentFilter.section);
  }
  const chapters = [...new Set(qs.map(q => q[1]))];
  return chapters.sort();
}

function parseOptions(qText) {
  // Extract options from question text like (1)xxx(2)xxx(3)xxx(4)xxx
  const optionRegex = /\(([1-4])\)([^(]*?)(?=\([1-4]\)|$)/g;
  const options = [];
  let match;
  let questionBody = qText;
  
  // Find the LAST set of (1)...(2)...(3)...(4)...
  const allMatches = [...qText.matchAll(/\(([1-4])\)([^(]*?)(?=\([1-4]\)|$)/g)];
  
  if (allMatches.length >= 3) {
    // Get the last group of sequential options
    let lastGroup = [];
    let lastStart = allMatches.length - 1;
    
    // Walk backwards to find where (1) starts for the last set
    for (let i = allMatches.length - 1; i >= 0; i--) {
      if (allMatches[i][1] === '1') {
        lastStart = i;
        break;
      }
    }
    
    for (let i = lastStart; i < allMatches.length; i++) {
      lastGroup.push({
        num: allMatches[i][1],
        text: allMatches[i][2].trim()
      });
    }
    
    if (lastGroup.length >= 2) {
      // Get question body (everything before the last options)
      const firstOptIdx = qText.indexOf(`(${lastGroup[0].num})${lastGroup[0].text.substring(0, Math.min(5, lastGroup[0].text.length))}`);
      if (firstOptIdx > 0) {
        // Find the actual start of options more carefully
        const optStart = qText.lastIndexOf(`(1)`, firstOptIdx + 10) > -1 
          ? qText.lastIndexOf(`(1)`, firstOptIdx + 10)
          : qText.indexOf(`(${lastGroup[0].num})`);
        questionBody = qText.substring(0, qText.indexOf(`(${lastGroup[0].num})${lastGroup[0].text.substring(0, 1)}`)).trim();
      }
      return { body: questionBody, options: lastGroup };
    }
  }
  
  // Fallback: return whole text with no parsed options
  return { body: qText, options: [] };
}

function render() {
  const app = document.getElementById('app');
  const filtered = getFilteredQuestions();
  
  let html = `
    <div class="header">
      <h1>📋 保險業務員精選考題</h1>
      <div class="sub">114年6月版 ｜ 共 ${allQuestions.length} 題 ｜ 最高效備考</div>
    </div>
    
    <div class="stats-bar">
      <div class="stat-box purple"><div class="num">${stats.total}</div><div class="label">已作答</div></div>
      <div class="stat-box green"><div class="num">${stats.correct}</div><div class="label">正確</div></div>
      <div class="stat-box red"><div class="num">${stats.wrong}</div><div class="label">錯誤</div></div>
      <div class="stat-box orange"><div class="num">${stats.total > 0 ? Math.round(stats.correct / stats.total * 100) : 0}%</div><div class="label">正確率</div></div>
    </div>
    
    <div class="tabs">
      <button class="tab ${currentMode === 'quiz' ? 'active' : ''}" onclick="switchMode('quiz')">🎯 測驗模式</button>
      <button class="tab ${currentMode === 'study' ? 'active' : ''}" onclick="switchMode('study')">📖 速讀模式</button>
      <button class="tab ${currentMode === 'wrong' ? 'active' : ''}" onclick="switchMode('wrong')">❌ 錯題集 (${wrongQuestions.size})</button>
    </div>
    
    <div class="filter-bar">
      <button class="filter-btn ${currentFilter.section === '全部' ? 'active' : ''}" onclick="setFilter('section','全部')">全部</button>
      <button class="filter-btn ${currentFilter.section === '實務' ? 'active' : ''}" onclick="setFilter('section','實務')">保險實務</button>
      <button class="filter-btn ${currentFilter.section === '法規' ? 'active' : ''}" onclick="setFilter('section','法規')">保險法規</button>
    </div>
    <div class="filter-bar">
      <button class="filter-btn ${currentFilter.chapter === '全部' ? 'active' : ''}" onclick="setFilter('chapter','全部')">全部章節</button>`;
  
  const chapters = getChapters();
  chapters.forEach(ch => {
    html += `<button class="filter-btn ${currentFilter.chapter === ch ? 'active' : ''}" onclick="setFilter('chapter','${ch}')">${ch}</button>`;
  });
  html += `</div>`;
  
  if (filtered.length === 0) {
    html += `<div class="empty-state"><div class="emoji">🎉</div><p>${currentMode === 'wrong' ? '沒有錯題，太棒了！繼續保持！' : '此篩選條件下沒有題目'}</p></div>`;
  } else if (currentMode === 'study') {
    html += renderStudyMode(filtered);
  } else {
    html += renderQuizMode(filtered);
  }
  
  app.innerHTML = html;
}

function renderQuizMode(filtered) {
  if (currentIndex >= filtered.length) currentIndex = 0;
  const q = filtered[currentIndex];
  const parsed = parseOptions(q[3]);
  const qId = getQId(q);
  
  let html = `
    <div class="progress-wrap">
      <div class="progress-fill" style="width:${((currentIndex + 1) / filtered.length * 100)}%"></div>
    </div>
    <div class="q-card ${answered ? (selectedOption == q[4] ? 'correct' : 'wrong') : ''}">
      <div class="q-meta">
        <div class="q-badge">
          <span>${q[0] === '實務' ? '保險實務' : '保險法規'}</span>
          <span>${q[1]}</span>
          <span>#${q[2]}</span>
        </div>
        <div class="q-progress">${currentIndex + 1} / ${filtered.length}</div>
      </div>
      <div class="q-text">${parsed.body}</div>
      <div class="options">`;
  
  if (parsed.options.length > 0) {
    parsed.options.forEach(opt => {
      let cls = '';
      if (answered) {
        cls = 'disabled ';
        if (opt.num === q[4]) cls += 'correct-answer ';
        if (opt.num === selectedOption && opt.num !== q[4]) cls += 'wrong-answer ';
      }
      html += `<button class="option ${cls}" onclick="selectAnswer('${opt.num}')">
        <span class="opt-num">${opt.num}</span>
        <span>${opt.text}</span>
      </button>`;
    });
  } else {
    // Couldn't parse options, show raw text
    for (let i = 1; i <= 4; i++) {
      let cls = '';
      if (answered) {
        cls = 'disabled ';
        if (String(i) === q[4]) cls += 'correct-answer ';
        if (String(i) === selectedOption && String(i) !== q[4]) cls += 'wrong-answer ';
      }
      html += `<button class="option ${cls}" onclick="selectAnswer('${i}')">
        <span class="opt-num">${i}</span>
        <span>選項 ${i}</span>
      </button>`;
    }
  }
  
  html += `</div>`;
  
  if (answered) {
    html += `<div class="explanation">
      <div class="exp-title">💡 解析</div>
      ${q[5] || '答案為 (' + q[4] + ')'}
    </div>`;
  }
  
  html += `</div>
    <div class="nav-btns">
      <button class="nav-btn secondary" onclick="prevQuestion()">⬅ 上一題</button>
      ${answered ? `<button class="nav-btn primary" onclick="nextQuestion()">下一題 ➡</button>` : `<button class="nav-btn secondary" onclick="showAnswer()">顯示答案</button>`}
    </div>
    <div style="text-align:center;margin-top:12px;">
      <button class="nav-btn secondary" style="display:inline-block;width:auto;padding:8px 20px;" onclick="randomQuestion()">🎲 隨機跳題</button>
      <button class="nav-btn secondary" style="display:inline-block;width:auto;padding:8px 20px;margin-left:8px;${resetPending ? 'background:var(--red);color:white;border-color:var(--red);' : ''}" onclick="resetProgress()">${resetPending ? '⚠️ 確定重置？再按一次' : '🔄 重置進度'}</button>
    </div>`;
  
  return html;
}

function renderStudyMode(filtered) {
  let html = `<div class="q-list">`;
  filtered.forEach((q, idx) => {
    const isExpanded = false;
    html += `<div class="study-item" onclick="toggleStudyItem(this)">
      <div class="si-header">
        <div class="si-q">
          <span style="color:var(--text2);font-size:0.75em;">[${q[0] === '實務' ? '實務' : '法規'} ${q[1]} #${q[2]}]</span><br>
          ${q[3]}
        </div>
        <div class="si-ans">${q[4]}</div>
      </div>
      <div class="si-exp">💡 ${q[5] || '答案為 (' + q[4] + ')'}</div>
    </div>`;
  });
  html += `</div>`;
  return html;
}

function toggleStudyItem(el) {
  el.classList.toggle('expanded');
}

function selectAnswer(opt) {
  if (answered) return;
  answered = true;
  selectedOption = opt;
  
  const filtered = getFilteredQuestions();
  const q = filtered[currentIndex];
  const qId = getQId(q);
  
  stats.total++;
  if (opt === q[4]) {
    stats.correct++;
    wrongQuestions.delete(qId);
    correctQuestions.add(qId);
  } else {
    stats.wrong++;
    wrongQuestions.add(qId);
  }
  
  render();
}

function showAnswer() {
  answered = true;
  const filtered = getFilteredQuestions();
  const q = filtered[currentIndex];
  selectedOption = q[4]; // Show correct answer
  render();
}

function nextQuestion() {
  const filtered = getFilteredQuestions();
  currentIndex = (currentIndex + 1) % filtered.length;
  answered = false;
  selectedOption = null;
  resetPending = false;
  render();
  window.scrollTo(0, 0);
}

function prevQuestion() {
  const filtered = getFilteredQuestions();
  currentIndex = (currentIndex - 1 + filtered.length) % filtered.length;
  answered = false;
  selectedOption = null;
  render();
  window.scrollTo(0, 0);
}

function randomQuestion() {
  const filtered = getFilteredQuestions();
  currentIndex = Math.floor(Math.random() * filtered.length);
  answered = false;
  selectedOption = null;
  render();
  window.scrollTo(0, 0);
}

function switchMode(mode) {
  currentMode = mode;
  currentIndex = 0;
  answered = false;
  selectedOption = null;
  resetPending = false;
  render();
}

function setFilter(type, value) {
  currentFilter[type] = value;
  if (type === 'section') currentFilter.chapter = '全部';
  currentIndex = 0;
  answered = false;
  selectedOption = null;
  render();
}

let resetPending = false;

function resetProgress() {
  if (!resetPending) {
    resetPending = true;
    render();
    return;
  }
  // Second click confirms
  resetPending = false;
  stats = { correct: 0, wrong: 0, total: 0 };
  wrongQuestions.clear();
  correctQuestions.clear();
  currentIndex = 0;
  answered = false;
  selectedOption = null;
  render();
}

// ===== INIT =====
function init(data) {
  allQuestions = data;
  render();
}
init(DATA);
</script>
</body>
</html>
